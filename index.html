<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Sigma — Student Tracker</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
/* ── Reset & Base ───────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;overflow:hidden}
body{font-family:"SF Pro Display",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.18);border-radius:2px}
input,select,textarea,button{font-family:inherit;outline:none;border:none}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(1);opacity:.45;cursor:pointer}
select option{background:#12101e;color:white}

/* ── Keyframes ─────────────────────────────── */
@keyframes gradShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
@keyframes floatA{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-20px) scale(1.03)}}
@keyframes floatB{0%,100%{transform:translateY(0)}50%{transform:translateY(16px)}}
@keyframes drift{0%{transform:translate(0,0)}33%{transform:translate(28px,-16px)}66%{transform:translate(-18px,22px)}100%{transform:translate(0,0)}}
@keyframes twinkle{0%,100%{opacity:.08;transform:scale(1)}50%{opacity:.75;transform:scale(1.6)}}
@keyframes shootStar{0%{transform:translateX(0) translateY(0) rotate(215deg);opacity:1}100%{transform:translateX(-600px) translateY(300px) rotate(215deg);opacity:0}}
@keyframes wave{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes waveRise{0%,100%{transform:scaleY(1)}50%{transform:scaleY(1.08)}}
@keyframes slideUp{from{transform:translateY(42px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes slideDown{from{transform:translateY(-42px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes slideLeft{from{transform:translateX(54px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideRight{from{transform:translateX(-54px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{transform:scale(.78);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes popIn{from{transform:scale(.6) translateY(30px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
@keyframes sheetUp{from{transform:translateY(100%);opacity:.5}to{transform:translateY(0);opacity:1}}
@keyframes alarmPulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.6)}50%{box-shadow:0 0 0 24px rgba(239,68,68,0)}}
@keyframes bounce{0%{transform:scale(1)}30%{transform:scale(.91)}70%{transform:scale(1.06)}100%{transform:scale(1)}}
@keyframes checkPop{0%{transform:scale(0) rotate(-20deg);opacity:0}60%{transform:scale(1.3) rotate(5deg);opacity:1}100%{transform:scale(1) rotate(0);opacity:1}}
@keyframes fadeSlideOut{0%{opacity:1;transform:translateX(0) scale(1)}100%{opacity:0;transform:translateX(40px) scale(.9)}}
@keyframes toastIn{from{transform:translateY(70px) scale(.88);opacity:0}to{transform:translateY(0) scale(1);opacity:1}}
@keyframes toastOut{from{opacity:1;transform:scale(1)}to{opacity:0;transform:scale(.84)}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-7px)}40%,80%{transform:translateX(7px)}}
@keyframes fabBounce{0%{transform:scale(1)}40%{transform:scale(.88)}80%{transform:scale(1.08)}100%{transform:scale(1)}}
@keyframes fabOptionIn{from{transform:scale(0) translateY(20px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
@keyframes panicFlash{0%,100%{border-color:rgba(239,68,68,.4)}50%{border-color:rgba(239,68,68,.9)}}
@keyframes streakGlow{0%,100%{text-shadow:0 0 8px rgba(251,191,36,.4)}50%{text-shadow:0 0 20px rgba(251,191,36,.9)}}
@keyframes ringFill{from{stroke-dashoffset:var(--ring-full)}to{stroke-dashoffset:var(--ring-offset)}}
@keyframes glassShimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}

/* ── Animation Classes ─────────────────────── */
.su{animation:slideUp .4s cubic-bezier(.22,.61,.36,1) both}
.sd{animation:slideDown .4s cubic-bezier(.22,.61,.36,1) both}
.sl{animation:slideLeft .36s cubic-bezier(.22,.61,.36,1) both}
.sr{animation:slideRight .36s cubic-bezier(.22,.61,.36,1) both}
.fi{animation:fadeIn .3s ease both}
.sc{animation:scaleIn .36s cubic-bezier(.22,.61,.36,1) both}
.pi{animation:popIn .36s cubic-bezier(.34,1.56,.64,1) both}
.sheet{animation:sheetUp .38s cubic-bezier(.22,.61,.36,1) both}
.bounce{animation:bounce .35s ease both}
.shake{animation:shake .4s ease}
.check-pop{animation:checkPop .4s cubic-bezier(.34,1.56,.64,1) both}
.done-out{animation:fadeSlideOut .5s ease both}

/* ── Base UI ────────────────────────────────── */
.glass{background:rgba(0,0,0,.24);backdrop-filter:blur(32px) saturate(180%);border-bottom:1px solid rgba(255,255,255,.07)}
.card{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:16px;backdrop-filter:blur(12px)}
.card-sm{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:12px}
.card-lift{transition:transform .2s ease,box-shadow .2s ease,background .2s ease}
.card-lift:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(0,0,0,.4);background:rgba(255,255,255,.1)}
.inp{width:100%;padding:.75rem 1rem;border-radius:12px;border:1.5px solid rgba(255,255,255,.11);background:rgba(255,255,255,.07);color:white;font-size:15px;transition:border .2s,background .2s,box-shadow .2s;display:block}
.inp:focus{border-color:rgba(255,255,255,.32);background:rgba(255,255,255,.11);box-shadow:0 0 0 3px rgba(255,255,255,.05)}
.inp::placeholder{color:rgba(255,255,255,.28)}
.inp-err{border-color:#ef4444!important}
.btn{cursor:pointer;transition:transform .12s ease,box-shadow .2s ease,background .2s;display:inline-flex;align-items:center;justify-content:center}
.btn:active{transform:scale(.93)!important;animation:bounce .3s ease}
.btn-ghost{padding:.75rem 1rem;border-radius:12px;background:rgba(255,255,255,.08);color:rgba(255,255,255,.82);font-weight:600;border:1.5px solid rgba(255,255,255,.11)}
.btn-ghost:hover{background:rgba(255,255,255,.14)}
.btn-danger{padding:.75rem 1rem;border-radius:12px;background:rgba(239,68,68,.14);color:#f87171;font-weight:700;border:1.5px solid rgba(239,68,68,.28)}
.btn-danger:hover{background:rgba(239,68,68,.26)}

/* ── Panic Mode ────────────────────────────── */
.panic-dim{opacity:.15!important;pointer-events:none;filter:blur(1px);transition:opacity .4s,filter .4s}
.panic-alive{z-index:2;position:relative}

/* ── FAB ───────────────────────────────────── */
.fab-btn{position:fixed;bottom:1.5rem;right:1.25rem;z-index:90;width:58px;height:58px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:300;transition:transform .2s,box-shadow .3s}
.fab-btn:active{animation:fabBounce .35s ease}
.fab-option{position:fixed;right:1.25rem;z-index:89;width:52px;height:52px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:transform .15s ease;border:2px solid rgba(255,255,255,.15)}
.fab-option:active{transform:scale(.88)!important}
.fab-label{position:absolute;right:62px;background:rgba(12,10,24,.92);color:white;font-size:13px;font-weight:600;padding:.35rem .8rem;border-radius:20px;white-space:nowrap;border:1px solid rgba(255,255,255,.12);backdrop-filter:blur(12px)}

/* ── Streak ────────────────────────────────── */
.streak-glow{animation:streakGlow 2.5s ease-in-out infinite}

/* ── Ring Progress ─────────────────────────── */
.ring-anim{animation:ringFill .8s cubic-bezier(.22,.61,.36,1) forwards}

/* ── Smart Priority ────────────────────────── */
.priority-card{background:linear-gradient(135deg,rgba(99,102,241,.18),rgba(167,139,250,.08));border:1px solid rgba(167,139,250,.3);border-radius:16px;padding:1rem 1.1rem;margin-bottom:.65rem;transition:all .2s}
.priority-card:hover{background:linear-gradient(135deg,rgba(99,102,241,.28),rgba(167,139,250,.15));transform:translateX(3px)}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo}=React;

/* ─── Storage ────────────────────────────────────────── */
const A_KEY='sg_accounts_v2',S_KEY='sg_session_v2';
const D_KEY=u=>`sg_data_v2_${u}`;
function getAccts(){try{return JSON.parse(localStorage.getItem(A_KEY)||'{}')}catch{return{}}}
function saveAccts(a){localStorage.setItem(A_KEY,JSON.stringify(a))}
function loadUD(u){try{return JSON.parse(localStorage.getItem(D_KEY(u))||'null')}catch{return null}}
function saveUD(u,d){localStorage.setItem(D_KEY(u),JSON.stringify(d))}
function getSess(){return localStorage.getItem(S_KEY)||null}
function setSess(u){u?localStorage.setItem(S_KEY,u):localStorage.removeItem(S_KEY)}
function hashPw(s){let h=0;for(let i=0;i<s.length;i++)h=(Math.imul(31,h)+s.charCodeAt(i))|0;return'h'+Math.abs(h).toString(36)+s.length.toString(36)}

/* ─── Constants ──────────────────────────────────────── */
const BG=[
  {id:'aurora', name:'Aurora',   c1:'#0f0c29',c2:'#302b63',c3:'#24243e',ac:'#a78bfa',ac2:'#7c3aed', type:'default'},
  {id:'cosmic', name:'Cosmic',   c1:'#020617',c2:'#0f172a',c3:'#1e1b4b',ac:'#e879f9',ac2:'#a21caf', type:'space'},
  {id:'ocean',  name:'Ocean',    c1:'#071620',c2:'#0c2f3e',c3:'#0e3d54',ac:'#38bdf8',ac2:'#0284c7', type:'wave'},
  {id:'forest', name:'Forest',   c1:'#052e16',c2:'#14532d',c3:'#166534',ac:'#4ade80',ac2:'#16a34a', type:'default'},
  {id:'sunset', name:'Sunset',   c1:'#1c0a00',c2:'#7c2d12',c3:'#92400e',ac:'#fb923c',ac2:'#ea580c', type:'default'},
  {id:'cherry', name:'Cherry',   c1:'#1a0010',c2:'#4a0020',c3:'#7f1d1d',ac:'#fb7185',ac2:'#e11d48', type:'default'},
  {id:'glass',  name:'Glass',    c1:'#0d1117',c2:'#161b22',c3:'#21262d',ac:'#58a6ff',ac2:'#1f6feb', type:'glass'},
  {id:'ember',  name:'Ember',    c1:'#1c1007',c2:'#3d2100',c3:'#5e3300',ac:'#fbbf24',ac2:'#d97706', type:'default'},
];
const CC=['#a78bfa','#38bdf8','#4ade80','#fb923c','#f472b6','#facc15','#34d399','#818cf8','#f87171','#2dd4bf','#c084fc','#67e8f9'];
const ATYPES=['Homework','Quiz','Test','Project','Lab','Essay','Presentation','Other'];
const GRADES=['6th','7th','8th','9th','10th','11th','12th','College Fr.','College So.','College Jr.','College Sr.'];
const PRI=['Low','Medium','High'];

/* ─── Helpers ────────────────────────────────────────── */
const gid=()=>Math.random().toString(36).slice(2,11);
const dU=ds=>{if(!ds)return 999;const n=new Date();n.setHours(0,0,0,0);const d=new Date(ds+' ');d.setHours(0,0,0,0);return Math.round((d-n)/86400000)};
const fD=ds=>{if(!ds)return'';return new Date(ds+' ').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})};
const tPlus=n=>{const d=new Date();d.setDate(d.getDate()+n);return d.toISOString().slice(0,10)};
const todayStr=()=>new Date().toISOString().slice(0,10);
const initData=()=>({schoolInfo:null,classes:[],assignments:[],tasks:[],projects:[],goals:[],parentPw:'parent123',bgIdx:0,timeWindow:7,streak:{count:0,best:0,lastDate:null},submittedHistory:[]});

/* ─── Smart Priority Scorer ──────────────────────────── */
function scoreAssignment(a){
  const d=dU(a.dueDate);
  const urgency=d<0?200:d===0?100:d===1?70:d===2?45:d===3?28:d<=7?15:5;
  const pts=Math.min(a.points/10,20);
  const typeBonus=a.type==='Test'?10:a.type==='Project'?8:a.type==='Quiz'?4:0;
  const priBonus=a.priority==='High'?15:a.priority==='Low'?-5:0;
  return urgency+pts+typeBonus+priBonus;
}
function getNextTask(assignments){
  const pending=assignments.filter(a=>!a.submitted);
  if(!pending.length)return null;
  return [...pending].sort((a,b)=>scoreAssignment(b)-scoreAssignment(a))[0];
}
function getTopPriority(assignments,n=4){
  const pending=assignments.filter(a=>!a.submitted);
  return [...pending].sort((a,b)=>scoreAssignment(b)-scoreAssignment(a)).slice(0,n);
}

/* ─── Streak Logic ───────────────────────────────────── */
function updateStreak(streak,assignments){
  const today=todayStr();
  const missing=assignments.filter(a=>!a.submitted&&dU(a.dueDate)<0).length;
  if(streak.lastDate===today)return streak;
  const yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);
  const yStr=yesterday.toISOString().slice(0,10);
  let newCount=streak.count;
  if(missing>0){newCount=0;}
  else if(streak.lastDate===yStr){newCount=streak.count+1;}
  else if(!streak.lastDate){newCount=0;}
  else{newCount=0;}
  return{count:newCount,best:Math.max(newCount,streak.best||0),lastDate:today};
}

/* ─── Animated Backgrounds ───────────────────────────── */
function DefaultParticles({ac}){
  const blobs=useRef(Array.from({length:11},(_,i)=>({id:i,w:Math.random()*85+25,x:Math.random()*100,y:Math.random()*100,dur:Math.random()*10+6,del:Math.random()*-14,t:i%3}))).current;
  const stars=useRef(Array.from({length:50},(_,i)=>({id:i,x:Math.random()*100,y:Math.random()*100,dur:Math.random()*4+2,del:Math.random()*-9}))).current;
  return(
    <div style={{position:'fixed',inset:0,pointerEvents:'none',overflow:'hidden',zIndex:0}}>
      {blobs.map(b=><div key={b.id} style={{position:'absolute',left:`${b.x}%`,top:`${b.y}%`,width:b.w,height:b.w,borderRadius:'50%',background:`radial-gradient(circle,${ac}1e,transparent)`,animation:`${['floatA','floatB','drift'][b.t]} ${b.dur}s ${b.del}s ease-in-out infinite`}}/>)}
      {stars.map(s=><div key={s.id} style={{position:'absolute',left:`${s.x}%`,top:`${s.y}%`,width:2,height:2,borderRadius:'50%',background:'white',animation:`twinkle ${s.dur}s ${s.del}s ease-in-out infinite`}}/>)}
    </div>
  );
}

function SpaceBackground({ac}){
  const stars=useRef(Array.from({length:120},(_,i)=>({id:i,x:Math.random()*100,y:Math.random()*100,sz:Math.random()<.15?3:Math.random()<.4?2:1,dur:Math.random()*6+2,del:Math.random()*-12}))).current;
  const [shootIdx,setShootIdx]=useState(0);
  const shoots=useRef(Array.from({length:3},(_,i)=>({id:i,x:Math.random()*60+20,y:Math.random()*40,del:i*4}))).current;
  return(
    <div style={{position:'fixed',inset:0,pointerEvents:'none',overflow:'hidden',zIndex:0}}>
      {/* Nebula blobs */}
      {[{x:20,y:30,c:'#a78bfa'},{x:70,y:60,c:'#38bdf8'},{x:45,y:80,c:'#e879f9'}].map((n,i)=>(
        <div key={i} style={{position:'absolute',left:`${n.x}%`,top:`${n.y}%`,width:300,height:300,borderRadius:'50%',background:`radial-gradient(circle,${n.c}12,transparent 70%)`,animation:`floatA ${10+i*3}s ${-i*4}s ease-in-out infinite`}}/>
      ))}
      {/* Stars */}
      {stars.map(s=><div key={s.id} style={{position:'absolute',left:`${s.x}%`,top:`${s.y}%`,width:s.sz,height:s.sz,borderRadius:'50%',background:'white',animation:`twinkle ${s.dur}s ${s.del}s ease-in-out infinite`}}/>)}
      {/* Shooting stars */}
      {shoots.map(s=><div key={s.id} style={{position:'absolute',left:`${s.x}%`,top:`${s.y}%`,width:80,height:1.5,borderRadius:2,background:'linear-gradient(90deg,white,transparent)',animation:`shootStar 3s ${s.del}s ease-in infinite`}}/>)}
    </div>
  );
}

function WaveBackground({ac,ac2}){
  return(
    <div style={{position:'fixed',inset:0,pointerEvents:'none',overflow:'hidden',zIndex:0}}>
      {/* Deep glow */}
      <div style={{position:'absolute',bottom:'-10%',left:'10%',width:'80%',height:300,background:`radial-gradient(ellipse,${ac}14,transparent 70%)`,animation:'floatB 8s ease-in-out infinite'}}/>
      {/* Wave layers */}
      {[{h:160,y:'72%',op:.18,sp:22,c:ac},{h:130,y:'78%',op:.13,sp:18,c:ac2},{h:110,y:'84%',op:.22,sp:14,c:ac}].map((w,i)=>(
        <div key={i} style={{position:'absolute',top:w.y,left:0,width:'200%',height:w.h,opacity:w.op,animation:`wave ${w.sp}s ${-i*3}s linear infinite`}}>
          <svg viewBox="0 0 1440 160" preserveAspectRatio="none" style={{width:'50%',height:'100%',display:'inline-block'}}>
            <path d={`M0,80 C180,${40+i*20} 360,${120-i*20} 540,80 C720,${40+i*20} 900,${120-i*20} 1080,80 C1260,${40+i*20} 1440,${120-i*20} 1440,80 L1440,160 L0,160 Z`} fill={w.c}/>
          </svg>
          <svg viewBox="0 0 1440 160" preserveAspectRatio="none" style={{width:'50%',height:'100%',display:'inline-block'}}>
            <path d={`M0,80 C180,${40+i*20} 360,${120-i*20} 540,80 C720,${40+i*20} 900,${120-i*20} 1080,80 C1260,${40+i*20} 1440,${120-i*20} 1440,80 L1440,160 L0,160 Z`} fill={w.c}/>
          </svg>
        </div>
      ))}
      {/* Surface shimmer */}
      <DefaultParticles ac={ac}/>
    </div>
  );
}

function GlassBackground({ac}){
  return(
    <div style={{position:'fixed',inset:0,pointerEvents:'none',overflow:'hidden',zIndex:0}}>
      {[{x:10,y:20,s:400,c:'#58a6ff'},{x:60,y:50,s:350,c:'#1f6feb'},{x:30,y:75,s:280,c:'#388bfd'}].map((b,i)=>(
        <div key={i} style={{position:'absolute',left:`${b.x}%`,top:`${b.y}%`,width:b.s,height:b.s,borderRadius:'50%',background:`radial-gradient(circle,${b.c}15,transparent 70%)`,animation:`floatA ${12+i*4}s ${-i*5}s ease-in-out infinite`}}/>
      ))}
      {/* Glass grid lines */}
      <div style={{position:'absolute',inset:0,backgroundImage:'linear-gradient(rgba(88,166,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(88,166,255,.04) 1px,transparent 1px)',backgroundSize:'60px 60px'}}/>
    </div>
  );
}

function BgLayer({bg}){
  if(bg.type==='space')return<SpaceBackground ac={bg.ac}/>;
  if(bg.type==='wave')return<WaveBackground ac={bg.ac} ac2={bg.ac2}/>;
  if(bg.type==='glass')return<GlassBackground ac={bg.ac}/>;
  return<DefaultParticles ac={bg.ac}/>;
}

/* ─── Toast ──────────────────────────────────────────── */
function Toast({msg,type,onDone}){
  const[out,setOut]=useState(false);
  useEffect(()=>{const t=setTimeout(()=>{setOut(true);setTimeout(onDone,350)},2600);return()=>clearTimeout(t)},[]);
  const col=type==='error'?'#ef4444':type==='warn'?'#f59e0b':type==='save'?'#38bdf8':'#4ade80';
  const ic=type==='error'?'✕':type==='warn'?'!':type==='save'?'↑':'✓';
  return(
    <div style={{position:'fixed',bottom:'1.5rem',left:'50%',transform:'translateX(-50%)',zIndex:9999,animation:out?'toastOut .35s ease both':'toastIn .35s ease both',pointerEvents:'none'}}>
      <div style={{display:'flex',alignItems:'center',gap:10,padding:'.65rem 1.15rem',borderRadius:40,background:'rgba(15,12,28,.96)',border:`1px solid ${col}38`,backdropFilter:'blur(24px)',boxShadow:`0 8px 32px rgba(0,0,0,.5),0 0 0 1px ${col}18`,whiteSpace:'nowrap'}}>
        <span style={{width:20,height:20,borderRadius:'50%',background:`${col}22`,color:col,fontSize:11,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:800,flexShrink:0}}>{ic}</span>
        <span style={{color:'white',fontSize:14,fontWeight:500}}>{msg}</span>
      </div>
    </div>
  );
}
function useToast(){
  const[ts,setTs]=useState([]);
  const show=(msg,type='success')=>setTs(p=>[...p,{id:gid(),msg,type}]);
  const rm=id=>setTs(p=>p.filter(t=>t.id!==id));
  const TC=()=><>{ts.map(t=><Toast key={t.id} msg={t.msg} type={t.type} onDone={()=>rm(t.id)}/>)}</>;
  return{show,TC};
}

/* ─── Modal & PwModal ────────────────────────────────── */
function Modal({children,onClose,sheet}){
  useEffect(()=>{document.body.style.overflow='hidden';return()=>{document.body.style.overflow=''}},[]);
  return(
    <div style={{position:'fixed',inset:0,zIndex:500,background:sheet?'rgba(0,0,0,.6)':'rgba(0,0,0,.7)',display:'flex',alignItems:sheet?'flex-end':'center',justifyContent:'center',padding:sheet?0:'1rem',animation:'fadeIn .2s ease both',backdropFilter:'blur(6px)'}} onClick={e=>{if(e.target===e.currentTarget)onClose()}}>
      <div className={sheet?'sheet':'pi'} style={{width:'100%',maxWidth:sheet?'100%':480,maxHeight:sheet?'88vh':'90vh',overflowY:'auto',borderRadius:sheet?'22px 22px 0 0':'22px',background:'linear-gradient(155deg,#1e1a38,#13102a)',border:`1px solid rgba(255,255,255,${sheet?'.1':'.12'})`,padding:'1.75rem',boxShadow:'0 -20px 80px rgba(0,0,0,.6)'}}>
        {children}
      </div>
    </div>
  );
}
function PwModal({title,hint,onConfirm,onCancel,ac}){

/* ─── Ring Progress (SVG) ────────────────────────────── */
function RingProgress({pct,size=72,stroke=6,color,bg='rgba(255,255,255,.08)'}){
  const r=(size-stroke*2)/2;
  const circ=2*Math.PI*r;
  const offset=circ-(pct/100)*circ;
  return(
    <div style={{position:'relative',width:size,height:size,flexShrink:0}}>
      <svg width={size} height={size} style={{transform:'rotate(-90deg)'}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={bg} strokeWidth={stroke}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
          strokeDasharray={`${circ*pct/100} ${circ}`} strokeLinecap="round"
          style={{transition:'stroke-dasharray .7s cubic-bezier(.22,.61,.36,1)'}}/>
      </svg>
      <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column'}}>
        <span style={{color:pct>=100?'#4ade80':color,fontWeight:800,fontSize:pct>=100?11:13,lineHeight:1}}>{pct>=100?'✓':pct+'%'}</span>
      </div>
    </div>
  );
}

function Dashboard({user,classes,assignments,setAssignments,onClasses,onAdd,onAlarm,ac,timeWindow,setTimeWindow,toast,streak,panicMode,setPanicMode,onSmartPriority}){
  const[tab,setTab]=useState('all');const[dir,setDir]=useState('l');

  const chTab=t=>{if(t===tab)return;const ti=TABS.findIndex(x=>x[0]===t),ci=TABS.findIndex(x=>x[0]===tab);setDir(ti>ci?'l':'r');setTab(t)};
  const[doneFade,setDoneFade]=useState({});
  const markDone=id=>{
    setDoneFade(p=>({...p,[id]:true}));
    setTimeout(()=>{setAssignments(p=>p.map(x=>x.id===id?{...x,submitted:true}:x));toast('Submitted ✓')},460);
  };
  const miss=assignments.filter(a=>!a.submitted&&dU(a.dueDate)<0).length;
  const urg=assignments.filter(a=>!a.submitted&&dU(a.dueDate)>=0&&dU(a.dueDate)<=3).length;
  const done=assignments.filter(a=>a.submitted).length;
  const pct=assignments.length?Math.round(done/assignments.length*100):0;
  const filtered=assignments.filter(a=>{
    const d=dU(a.dueDate);
    if(panicMode)return!a.submitted&&(d<0||d<=3);
    if(tab==='all')return d<=timeWindow||d<0||a.submitted;
    if(tab==='missing')return!a.submitted&&d<0;
    if(tab==='soon')return!a.submitted&&d>=0&&d<=timeWindow;
    if(tab==='done')return a.submitted;
    return true;
  });
  const badge=a=>{if(a.submitted)return{l:'Submitted',c:'#4ade80'};const d=dU(a.dueDate);if(d<0)return{l:'Missing',c:'#ef4444'};if(d===0)return{l:'Due Today!',c:'#f97316'};if(d===1)return{l:'Tomorrow',c:'#fb923c'};if(d<=3)return{l:`${d}d left`,c:'#facc15'};return{l:`${d}d left`,c:'rgba(255,255,255,.4)'}};
  return(
    <div className="fi" style={{padding:'1rem',paddingBottom:'5rem'}}>

      {/* Greeting + streak */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'1.1rem'}}>
        <div>
          <h2 style={{color:'white',fontSize:20,fontWeight:700}}>Hey, {user.name.split(' ')[0]} 👋</h2>
          <p style={{color:'rgba(255,255,255,.38)',fontSize:13,marginTop:2}}>{user.grade} Grade{user.email?` · ${user.email}`:''}</p>
        </div>
        <StreakBadge streak={streak}/>
      </div>

      {/* Panic Mode Banner */}
      {panicMode&&(
        <div className="pi" style={{background:'linear-gradient(135deg,rgba(239,68,68,.22),rgba(239,68,68,.1))',border:'1px solid rgba(239,68,68,.5)',borderRadius:14,padding:'.85rem 1rem',marginBottom:'1rem',display:'flex',alignItems:'center',gap:'.75rem',animation:'panicFlash 1.5s ease-in-out infinite'}}>
          <span style={{fontSize:22}}>🚨</span>
          <div style={{flex:1}}>
            <div style={{color:'#f87171',fontWeight:700,fontSize:14}}>PANIC MODE ACTIVE</div>
            <div style={{color:'rgba(255,150,150,.65)',fontSize:12}}>Showing overdue + urgent only</div>
          </div>
          <button className="btn" onClick={()=>setPanicMode(false)} style={{padding:'.4rem .8rem',borderRadius:10,background:'rgba(239,68,68,.2)',color:'#f87171',fontWeight:700,fontSize:12}}>Exit</button>
        </div>
      )}

      {/* Stats */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'.6rem',marginBottom:'1rem'}}>
        {[{l:'Missing',v:miss,c:'#ef4444',tab:'missing'},{l:'Urgent',v:urg,c:'#facc15',tab:'soon'},{l:'Done',v:done,c:'#4ade80',tab:'done'}].map(s=>(
          <div key={s.l} className="card-sm card-lift" onClick={()=>!panicMode&&chTab(s.tab)} style={{padding:'.85rem .6rem',textAlign:'center',cursor:'pointer',border:`1px solid ${s.c}22`}}>
            <div style={{fontSize:24,fontWeight:800,color:s.c,lineHeight:1}}>{s.v}</div>
            <div style={{fontSize:11,color:'rgba(255,255,255,.4)',marginTop:3,fontWeight:500}}>{s.l}</div>
          </div>
        ))}
      </div>

      {/* Progress */}
      {assignments.length>0&&(
        <div className="card-sm" style={{padding:'.85rem',marginBottom:'1rem'}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:'.45rem'}}>
            <span style={{color:'rgba(255,255,255,.55)',fontSize:13}}>Completion</span>
            <span style={{color:ac,fontWeight:700,fontSize:14}}>{pct}%</span>
          </div>
          <div style={{background:'rgba(255,255,255,.08)',borderRadius:20,height:8,overflow:'hidden'}}>
            <div style={{width:`${pct}%`,height:'100%',background:`linear-gradient(90deg,${ac},${ac}bb)`,borderRadius:20,transition:'width .7s cubic-bezier(.22,.61,.36,1)'}}/>
          </div>
        </div>
      )}

      {/* Smart Priority + Panic Mode buttons */}
      <div style={{display:'flex',gap:'.6rem',marginBottom:'1rem'}}>
        <button className="btn" onClick={onSmartPriority} style={{flex:1,padding:'.75rem',borderRadius:13,background:`linear-gradient(135deg,rgba(99,102,241,.3),rgba(167,139,250,.2))`,color:'#c4b5fd',fontWeight:700,fontSize:13,border:'1px solid rgba(167,139,250,.3)',display:'flex',alignItems:'center',justifyContent:'center',gap:'.5rem'}}>
          👉 Tell me what to do
        </button>
        <button className="btn" onClick={()=>setPanicMode(p=>!p)} style={{flex:1,padding:'.75rem',borderRadius:13,background:panicMode?'linear-gradient(135deg,rgba(239,68,68,.3),rgba(239,68,68,.2))':'rgba(255,255,255,.07)',color:panicMode?'#f87171':'rgba(255,255,255,.6)',fontWeight:700,fontSize:13,border:`1px solid ${panicMode?'rgba(239,68,68,.4)':'rgba(255,255,255,.1)'}`,display:'flex',alignItems:'center',justifyContent:'center',gap:'.5rem',transition:'all .25s'}}>
          🚨 {panicMode?'Exit Panic':'Panic Mode'}
        </button>
      </div>

      {/* Time window (hidden in panic mode) */}
      {!panicMode&&(
        <div className="card-sm" style={{padding:'.8rem',marginBottom:'1rem',display:'flex',alignItems:'center',gap:'.75rem'}}>
          <span style={{color:'rgba(255,255,255,.45)',fontSize:12,whiteSpace:'nowrap',minWidth:48}}>Window</span>
          <input type="range" min={1} max={30} step={1} value={timeWindow} onChange={e=>setTimeWindow(+e.target.value)} style={{flex:1,accentColor:ac,cursor:'pointer'}}/>
          <span style={{color:ac,fontWeight:700,fontSize:13,minWidth:56,textAlign:'right'}}>{timeWindow===30?'1 month':`${timeWindow}d`}</span>
        </div>
      )}

      {/* Tabs (hidden in panic mode) */}
      {!panicMode&&(
        <div style={{display:'flex',gap:'.35rem',marginBottom:'1rem'}}>
          {TABS.map(([k,l])=>{
            const cnt=k==='missing'?miss:k==='soon'?urg:k==='done'?done:assignments.length;
            return(
              <button key={k} className="btn" onClick={()=>chTab(k)} style={{flex:1,padding:'.55rem .1rem',borderRadius:10,fontSize:12,fontWeight:700,background:tab===k?`linear-gradient(135deg,${ac}dd,${ac})`:'rgba(255,255,255,.07)',color:tab===k?'white':'rgba(255,255,255,.48)',position:'relative',transition:'all .28s'}}>
                {l}
                {k!=='all'&&cnt>0&&<span style={{position:'absolute',top:-5,right:-2,minWidth:16,height:16,borderRadius:8,background:k==='missing'?'#ef4444':k==='soon'?'#f59e0b':'#4ade80',fontSize:9,fontWeight:800,color:'white',display:'flex',alignItems:'center',justifyContent:'center',padding:'0 3px'}}>{cnt}</span>}
              </button>
            );
          })}
        </div>
      )}

      {/* Assignment list */}
      <div key={panicMode?'panic':tab} className={panicMode?'fi':dir==='l'?'sl':'sr'}>
        {filtered.length===0&&(
          <div style={{textAlign:'center',padding:'3.5rem 1rem',color:'rgba(255,255,255,.25)'}}>
            <div style={{fontSize:48,marginBottom:'.75rem'}}>{tab==='done'?'🏆':assignments.length===0?'📋':'📭'}</div>
            <p style={{fontSize:15,fontWeight:500,color:'rgba(255,255,255,.4)'}}>{panicMode?'No urgent work — great!':assignments.length===0&&tab==='all'?'No assignments yet':tab==='missing'?'No missing work!':tab==='soon'?'Nothing due soon':'Nothing here'}</p>
            {assignments.length===0&&tab==='all'&&<p style={{fontSize:13,marginTop:'.35rem',color:'rgba(255,255,255,.25)'}}>Use the + button to add your first assignment</p>}
          </div>
        )}
        {filtered.map((a,i)=>{
          const b=badge(a);const cl=classes.find(c=>c.id===a.classId)||{name:'Unknown',color:'#888'};
          const isPanic=panicMode&&!a.submitted&&(dU(a.dueDate)<0||dU(a.dueDate)<=3);
          return(
            <div key={a.id} className={`card-lift ${doneFade[a.id]?'done-out':'su'}`} style={{animationDelay:`${i*.045}s`,background:'rgba(255,255,255,.06)',borderRadius:14,padding:'1rem',marginBottom:'.6rem',borderLeft:`3px solid ${cl.color}`,border:`1px solid rgba(255,255,255,.08)`,borderLeftColor:cl.color,borderLeftWidth:3,boxShadow:isPanic?`0 0 20px ${b.c}22`:undefined}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:a.submitted?0:'.5rem'}}>
                <div style={{flex:1,marginRight:8}}>
                  <div style={{fontWeight:700,color:'white',fontSize:15,lineHeight:1.3}}>{a.title}</div>
                  <div style={{fontSize:12,color:'rgba(255,255,255,.4)',marginTop:3,display:'flex',gap:'6px 10px',flexWrap:'wrap'}}>
                    <span style={{display:'inline-flex',alignItems:'center',gap:3}}><span style={{width:7,height:7,borderRadius:'50%',background:cl.color,display:'inline-block'}}></span>{cl.name}</span>
                    <span>{a.type}</span><span>{a.points}pts</span><span>Due {fD(a.dueDate)}</span>
                    {a.priority&&a.priority!=='Medium'&&<span style={{color:a.priority==='High'?'#f87171':'#94a3b8'}}>{a.priority}</span>}
                  </div>
                  {a.notes&&<div style={{color:'rgba(255,255,255,.28)',fontSize:12,marginTop:3,fontStyle:'italic'}}>{a.notes}</div>}
                </div>
                <span style={{background:`${b.c}18`,color:b.c,fontSize:11,fontWeight:700,padding:'4px 10px',borderRadius:20,flexShrink:0,border:`1px solid ${b.c}30`}}>{b.l}</span>
              </div>
              {!a.submitted&&(
                <div style={{display:'flex',gap:'.45rem'}}>
                  <button className="btn" onClick={()=>markDone(a.id)} style={{flex:1,padding:'.42rem',borderRadius:9,background:doneFade[a.id]?'rgba(74,222,128,.3)':`${ac}18`,color:doneFade[a.id]?'#4ade80':ac,fontSize:13,fontWeight:600,transition:'all .2s'}}>
                    {doneFade[a.id]?<span className="check-pop">✓</span>:'✓ Submitted'}
                  </button>
                  {dU(a.dueDate)<=3&&dU(a.dueDate)>=0&&<button className="btn" onClick={()=>onAlarm(a)} style={{padding:'.42rem .7rem',borderRadius:9,background:'rgba(239,68,68,.14)',color:'#f87171',fontSize:13}}>🔔</button>}
                  <button className="btn" onClick={()=>{setAssignments(p=>p.filter(x=>x.id!==a.id));toast('Removed','warn')}} style={{width:32,borderRadius:9,background:'rgba(255,255,255,.07)',color:'rgba(255,255,255,.32)',fontSize:13}} onMouseOver={e=>e.currentTarget.style.background='rgba(239,68,68,.2)'} onMouseOut={e=>e.currentTarget.style.background='rgba(255,255,255,.07)'}>✕</button>
                </div>
              )}
            </div>
          );
        })}
      </div>

      <div style={{display:'flex',gap:'.7rem',marginTop:'1rem'}}>
        <button className="btn" onClick={onClasses} style={{flex:1,padding:'.82rem',borderRadius:14,background:'rgba(255,255,255,.08)',color:'white',fontWeight:600,border:'1px solid rgba(255,255,255,.1)',display:'flex',alignItems:'center',justifyContent:'center',gap:'.5rem'}} onMouseOver={e=>e.currentTarget.style.background='rgba(255,255,255,.14)'} onMouseOut={e=>e.currentTarget.style.background='rgba(255,255,255,.08)'}>
          📚 Classes <span style={{background:`${ac}28`,color:ac,fontSize:12,padding:'1px 7px',borderRadius:10,fontWeight:700}}>{classes.length}</span>
        </button>
        <button className="btn" onClick={onAdd} style={{flex:1,padding:'.82rem',borderRadius:14,background:`linear-gradient(135deg,${ac}dd,${ac})`,color:'white',fontWeight:700,boxShadow:`0 4px 20px ${ac}44`}} onMouseOver={e=>e.currentTarget.style.opacity='.85'} onMouseOut={e=>e.currentTarget.style.opacity='1'}>+ Add Work</button>
      </div>
    </div>
  );
}

/* ─── Classes View ───────────────────────────────────── */
function ClassesView({classes,setClasses,assignments,onSelect,onBack,ac,toast}){
  const[showAdd,setShowAdd]=useState(false);const[delId,setDelId]=useState(null);
  const[f,setF]=useState({name:'',teacher:'',color:CC[0]});
  const set=k=>v=>setF(p=>({...p,[k]:v}));
  const add=()=>{if(!f.name.trim()||!f.teacher.trim())return;setClasses(p=>[...p,{id:gid(),name:f.name.trim(),teacher:f.teacher.trim(),color:f.color}]);setF({name:'',teacher:'',color:CC[0]});setShowAdd(false);toast('Class added')};
  return(
    <div className="sl" style={{padding:'1rem',paddingBottom:'5rem'}}>
      <div style={{display:'flex',alignItems:'center',gap:'.75rem',marginBottom:'1.25rem'}}>
        <button className="btn btn-ghost" style={{width:38,height:38,padding:0,borderRadius:11,fontSize:18}} onClick={onBack}>←</button>
        <h2 style={{color:'white',flex:1,fontSize:20,fontWeight:700}}>My Classes</h2>
        <button className="btn" onClick={()=>setShowAdd(true)} style={{padding:'.48rem .9rem',borderRadius:10,background:`${ac}22`,color:ac,fontWeight:700,fontSize:14}} onMouseOver={e=>e.currentTarget.style.background=`${ac}44`} onMouseOut={e=>e.currentTarget.style.background=`${ac}22`}>+ Add</button>
      </div>
      {classes.length===0&&<div style={{textAlign:'center',padding:'3.5rem 1rem',color:'rgba(255,255,255,.3)'}}><div style={{fontSize:52,marginBottom:'.75rem'}}>📚</div><p style={{fontSize:16,fontWeight:500,color:'rgba(255,255,255,.45)'}}>No classes yet</p><p style={{fontSize:13,marginTop:'.4rem'}}>Tap "Add" to create your first</p></div>}
      {classes.map((c,i)=>{
        const cnt=assignments.filter(a=>a.classId===c.id).length;
        const pend=assignments.filter(a=>a.classId===c.id&&!a.submitted).length;
        const mis=assignments.filter(a=>a.classId===c.id&&!a.submitted&&dU(a.dueDate)<0).length;
        return(
          <div key={c.id} className="su card-lift" style={{animationDelay:`${i*.06}s`,background:'rgba(255,255,255,.06)',borderRadius:14,padding:'1rem',marginBottom:'.6rem',borderLeft:`4px solid ${c.color}`,display:'flex',alignItems:'center',gap:'.75rem',cursor:'pointer',border:'1px solid rgba(255,255,255,.08)',borderLeftColor:c.color,borderLeftWidth:4}} onClick={()=>onSelect(c)}>
            <div style={{width:42,height:42,borderRadius:12,background:`${c.color}22`,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,color:c.color,fontSize:17,fontWeight:800}}>{c.name.charAt(0)}</div>
            <div style={{flex:1}}>
              <div style={{fontWeight:700,color:'white',fontSize:15}}>{c.name}</div>
              <div style={{fontSize:12,color:'rgba(255,255,255,.4)',marginTop:2}}>👤 {c.teacher}</div>
            </div>
            <div style={{textAlign:'right',flexShrink:0}}>
              {mis>0&&<div style={{background:'rgba(239,68,68,.18)',color:'#f87171',fontSize:11,fontWeight:700,padding:'2px 8px',borderRadius:20,marginBottom:3}}>{mis} missing</div>}
              <div style={{color:'rgba(255,255,255,.38)',fontSize:12}}>{cnt} · {pend} pending</div>
            </div>
            <button className="btn" onClick={e=>{e.stopPropagation();setDelId(c.id)}} style={{width:30,height:30,borderRadius:8,background:'rgba(239,68,68,.1)',color:'#f87171',fontSize:12,flexShrink:0}} onMouseOver={e=>{e.stopPropagation();e.currentTarget.style.background='rgba(239,68,68,.26)'}} onMouseOut={e=>{e.stopPropagation();e.currentTarget.style.background='rgba(239,68,68,.1)'}}>✕</button>
          </div>
        );
      })}
      {showAdd&&(
        <Modal onClose={()=>setShowAdd(false)} sheet>
          <div style={{width:40,height:4,borderRadius:2,background:'rgba(255,255,255,.2)',margin:'-.5rem auto 1.25rem'}}/>
          <h3 style={{color:'white',marginBottom:'1.25rem',fontSize:18}}>Add Class</h3>
          <label style={{display:'block',color:'rgba(200,200,220,.6)',fontSize:12,fontWeight:600,marginBottom:5}}>Class Name</label>
          <input className="inp" style={{marginBottom:'1rem'}} placeholder="e.g. Algebra II, AP English…" value={f.name} onChange={e=>set('name')(e.target.value)} autoFocus/>
          <label style={{display:'block',color:'rgba(200,200,220,.6)',fontSize:12,fontWeight:600,marginBottom:5}}>Teacher</label>
          <input className="inp" style={{marginBottom:'1.25rem'}} placeholder="e.g. Mr. Smith" value={f.teacher} onChange={e=>set('teacher')(e.target.value)}/>
          <label style={{display:'block',color:'rgba(200,200,220,.6)',fontSize:12,fontWeight:600,marginBottom:'10px'}}>Color</label>
          <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:'1.5rem'}}>
            {CC.map(col=><button key={col} className="btn" onClick={()=>set('color')(col)} style={{width:32,height:32,borderRadius:'50%',background:col,border:`3px solid ${f.color===col?'white':'transparent'}`,boxShadow:f.color===col?`0 0 0 2px ${col}`:'none',transition:'all .2s'}}/>)}
          </div>
          <div style={{display:'flex',gap:'.75rem'}}>
            <button className="btn btn-ghost" style={{flex:1}} onClick={()=>setShowAdd(false)}>Cancel</button>
            <button className="btn" disabled={!f.name.trim()||!f.teacher.trim()} onClick={add} style={{flex:2,padding:'.8rem',borderRadius:12,background:`linear-gradient(135deg,${ac}dd,${ac})`,color:'white',fontWeight:700,opacity:(!f.name.trim()||!f.teacher.trim())?.4:1}}>Add Class</button>
          </div>
        </Modal>
      )}
      {delId&&(
        <Modal onClose={()=>setDelId(null)}>
          <div style={{textAlign:'center',padding:'.5rem 0'}}>
            <div style={{fontSize:44,marginBottom:'.75rem'}}>⚠️</div>
            <h3 style={{color:'white',marginBottom:'.5rem',fontSize:18}}>Delete this class?</h3>
            <p style={{color:'rgba(200,200,220,.5)',fontSize:14,marginBottom:'1.5rem',lineHeight:1.5}}>All assignments in this class will also be deleted.</p>
            <div style={{display:'flex',gap:'.75rem'}}>
              <button className="btn btn-ghost" style={{flex:1}} onClick={()=>setDelId(null)}>Cancel</button>
              <button className="btn btn-danger" style={{flex:1}} onClick={()=>{setClasses(p=>p.filter(c=>c.id!==delId));setDelId(null);toast('Class deleted','warn')}}>Delete</button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

/* ─── Class Detail ───────────────────────────────────── */
function ClassDetail({cls,assignments,setAssignments,onBack,onAddHere,ac,toast}){
  const mine=assignments.filter(a=>a.classId===cls.id);
  const[sort,setSort]=useState('date');
  const sorted=[...mine].sort((a,b)=>sort==='date'?new Date(a.dueDate)-new Date(b.dueDate):sort==='type'?a.type.localeCompare(b.type):b.points-a.points);
  const badge=a=>{if(a.submitted)return{l:'Done',c:'#4ade80'};const d=dU(a.dueDate);if(d<0)return{l:'Missing',c:'#ef4444'};if(d===0)return{l:'Today!',c:'#f97316'};if(d<=3)return{l:`${d}d`,c:'#facc15'};return{l:`${d}d left`,c:'rgba(255,255,255,.42)'}};
  const tot=mine.reduce((s,a)=>s+a.points,0);
  const ear=mine.filter(a=>a.submitted).reduce((s,a)=>s+a.points,0);
  return(
    <div className="sl" style={{padding:'1rem',paddingBottom:'5rem'}}>
      <div style={{display:'flex',alignItems:'center',gap:'.75rem',marginBottom:'1.25rem'}}>
        <button className="btn btn-ghost" style={{width:38,height:38,padding:0,borderRadius:11,fontSize:18}} onClick={onBack}>←</button>
        <div style={{flex:1}}><h2 style={{color:'white',fontSize:19,fontWeight:700}}>{cls.name}</h2><p style={{color:'rgba(255,255,255,.4)',fontSize:13,marginTop:1}}>👤 {cls.teacher}</p></div>
        <div style={{width:14,height:14,borderRadius:'50%',background:cls.color,boxShadow:`0 0 10px ${cls.color}88`}}/>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'.45rem',marginBottom:'1rem'}}>
        {[{l:'Total',v:mine.length,c:'#818cf8'},{l:'Pending',v:mine.filter(a=>!a.submitted).length,c:'#facc15'},{l:'Missing',v:mine.filter(a=>!a.submitted&&dU(a.dueDate)<0).length,c:'#ef4444'},{l:'Done',v:mine.filter(a=>a.submitted).length,c:'#4ade80'}].map(s=>(
          <div key={s.l} className="card-sm" style={{padding:'.65rem .35rem',textAlign:'center',border:`1px solid ${s.c}22`}}>
            <div style={{fontSize:19,fontWeight:800,color:s.c}}>{s.v}</div>
            <div style={{fontSize:10,color:'rgba(255,255,255,.4)',marginTop:1}}>{s.l}</div>
          </div>
        ))}
      </div>
      {tot>0&&<div className="card-sm" style={{padding:'.82rem',marginBottom:'1rem'}}>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:'.4rem'}}><span style={{color:'rgba(255,255,255,.5)',fontSize:12}}>Points Submitted</span><span style={{color:ac,fontWeight:700,fontSize:13}}>{ear}/{tot} pts</span></div>
        <div style={{background:'rgba(255,255,255,.07)',borderRadius:10,height:6,overflow:'hidden'}}><div style={{width:`${Math.round(ear/tot*100)}%`,height:'100%',background:`linear-gradient(90deg,${cls.color},${cls.color}99)`,borderRadius:10,transition:'width .6s'}}/></div>
      </div>}
      <div style={{display:'flex',gap:'.35rem',marginBottom:'1rem',alignItems:'center'}}>
        <span style={{color:'rgba(255,255,255,.38)',fontSize:12,marginRight:4}}>Sort:</span>
        {[['date','Date'],['type','Type'],['points','Pts']].map(([k,l])=>(
          <button key={k} className="btn" onClick={()=>setSort(k)} style={{padding:'.35rem .7rem',borderRadius:8,fontSize:12,fontWeight:600,background:sort===k?`${ac}28`:'rgba(255,255,255,.07)',color:sort===k?ac:'rgba(255,255,255,.5)',border:`1px solid ${sort===k?ac+'44':'transparent'}`,transition:'all .2s'}}>{l}</button>
        ))}
      </div>
      {mine.length===0&&<div style={{textAlign:'center',padding:'2.5rem 1rem',color:'rgba(255,255,255,.3)'}}><div style={{fontSize:40,marginBottom:'.5rem'}}>📝</div><p>No assignments yet</p></div>}
      {sorted.map((a,i)=>{const b=badge(a);return(
        <div key={a.id} className="su card-lift" style={{animationDelay:`${i*.05}s`,background:'rgba(255,255,255,.06)',borderRadius:12,padding:'.9rem',marginBottom:'.55rem',borderLeft:`3px solid ${cls.color}`,border:'1px solid rgba(255,255,255,.07)',borderLeftColor:cls.color,borderLeftWidth:3}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:8}}>
            <div style={{flex:1}}>
              <div style={{color:'white',fontWeight:600,fontSize:14}}>{a.title}</div>
              <div style={{color:'rgba(255,255,255,.38)',fontSize:12,marginTop:2}}>{a.type} · {a.points}pts · {fD(a.dueDate)}</div>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:6,flexShrink:0}}>
              <span style={{background:`${b.c}18`,color:b.c,fontSize:11,fontWeight:700,padding:'3px 9px',borderRadius:20,border:`1px solid ${b.c}30`}}>{b.l}</span>
              {!a.submitted&&<button className="btn" onClick={()=>{setAssignments(p=>p.map(x=>x.id===a.id?{...x,submitted:true}:x));toast('Submitted ✓')}} style={{width:28,height:28,borderRadius:8,background:`${ac}22`,color:ac,fontSize:13}} onMouseOver={e=>e.currentTarget.style.background=`${ac}44`} onMouseOut={e=>e.currentTarget.style.background=`${ac}22`}>✓</button>}
              <button className="btn" onClick={()=>{setAssignments(p=>p.filter(x=>x.id!==a.id));toast('Removed','warn')}} style={{width:28,height:28,borderRadius:8,background:'rgba(239,68,68,.1)',color:'#f87171',fontSize:12}} onMouseOver={e=>e.currentTarget.style.background='rgba(239,68,68,.26)'} onMouseOut={e=>e.currentTarget.style.background='rgba(239,68,68,.1)'}>✕</button>
            </div>

          <h3 style={{color:'white',marginBottom:'1.1rem',fontSize:18}}>Add Task</h3>

          <input className="inp" style={{marginBottom:'1.25rem'}} placeholder="e.g. Clean your room…" value={ft.title} onChange={e=>setFt(p=>({...p,title:e.target.value}))} autoFocus/>
          <div style={{display:'flex',gap:'.75rem'}}>
            <button className="btn btn-ghost" style={{flex:1}} onClick={()=>setModal(null)}>Cancel</button>
            <button className="btn" disabled={!ft.title.trim()} onClick={()=>ft.title.trim()&&askPw(()=>{setTasks(p=>[...p,{id:gid(),title:ft.title.trim(),completed:false,createdAt:new Date().toISOString()}]);setModal(null);toast('Task added')})} style={{flex:2,padding:'.8rem',borderRadius:12,background:`linear-gradient(135deg,${ac}dd,${ac})`,color:'white',fontWeight:700,opacity:ft.title.trim()?1:.4}}>Add Task</button>
          </div>
        </Modal>
      )}
      {modal==='project'&&(
        <Modal onClose={()=>setModal(null)} sheet>
          <div style={{width:40,height:4,borderRadius:2,background:'rgba(255,255,255,.18)',margin:'-.5rem auto 1.25rem'}}/>
          <h3 style={{color:'white',marginBottom:'1.1rem',fontSize:18}}>Add Project</h3>
          <label style={{display:'block',color:'rgba(200,200,220,.6)',fontSize:12,fontWeight:600,marginBottom:5}}>Title *</label>
          <input className="inp" style={{marginBottom:'1rem'}} placeholder="e.g. Create slides about travel…" value={ft.title} onChange={e=>setFt(p=>({...p,title:e.target.value}))} autoFocus/>
          <label style={{display:'block',color:'rgba(200,200,220,.6)',fontSize:12,fontWeight:600,marginBottom:5,marginTop:'0'}}>Description <span style={{color:'rgba(255,255,255,.28)',fontWeight:400}}>(optional)</span></label>
          <textarea className="inp" style={{resize:'none',height:60,marginBottom:'1rem'}} placeholder="Details…" value={ft.desc} onChange={e=>setFt(p=>({...p,desc:e.target.value}))}/>
          <label style={{display:'block',color:'rgba(200,200,220,.6)',fontSize:12,fontWeight:600,marginBottom:5}}>Due Date *</label>
          <input className="inp" type="date" style={{marginBottom:'1.25rem'}} value={ft.dueDate} onChange={e=>setFt(p=>({...p,dueDate:e.target.value}))}/>
          <div style={{display:'flex',gap:'.75rem'}}>
            <button className="btn btn-ghost" style={{flex:1}} onClick={()=>setModal(null)}>Cancel</button>
            <button className="btn" disabled={!ft.title.trim()||!ft.dueDate} onClick={()=>(ft.title.trim()&&ft.dueDate)&&askPw(()=>{setProjects(p=>[...p,{id:gid(),title:ft.title.trim(),desc:ft.desc,dueDate:ft.dueDate,completed:false,createdAt:new Date().toISOString()}]);setModal(null);toast('Project added')})} style={{flex:2,padding:'.8rem',borderRadius:12,background:`linear-gradient(135deg,${ac}dd,${ac})`,color:'white',fontWeight:700,opacity:(ft.title.trim()&&ft.dueDate)?1:.4}}>Add Project</button>
          </div>
        </Modal>
      )}
      {modal==='goal'&&(
        <Modal onClose={()=>setModal(null)} sheet>
          <div style={{width:40,height:4,borderRadius:2,background:'rgba(255,255,255,.18)',margin:'-.5rem auto 1.25rem'}}/>
          <h3 style={{color:'white',marginBottom:'1.1rem',fontSize:18}}>Add Goal</h3>
          <label style={{display:'block',color:'rgba(200,200,220,.6)',fontSize:12,fontWeight:600,marginBottom:5}}>Goal *</label>
          <input className="inp" style={{marginBottom:'1rem'}} placeholder="e.g. Read 5 books this month…" value={ft.title} onChange={e=>setFt(p=>({...p,title:e.target.value}))} autoFocus/>
          <label style={{display:'block',color:'rgba(200,200,220,.6)',fontSize:12,fontWeight:600,marginBottom:5}}>Notes <span style={{color:'rgba(255,255,255,.28)',fontWeight:400}}>(optional)</span></label>
          <textarea className="inp" style={{resize:'none',height:56,marginBottom:'1rem'}} placeholder="Details…" value={ft.desc} onChange={e=>setFt(p=>({...p,desc:e.target.value}))}/>
          <label style={{display:'block',color:'rgba(200,200,220,.6)',fontSize:12,fontWeight:600,marginBottom:5}}>Target Date *</label>
          <input className="inp" type="date" style={{marginBottom:'1.25rem'}} value={ft.dueDate} onChange={e=>setFt(p=>({...p,dueDate:e.target.value}))}/>
          <div style={{display:'flex',gap:'.75rem'}}>
            <button className="btn btn-ghost" style={{flex:1}} onClick={()=>setModal(null)}>Cancel</button>
            <button className="btn" disabled={!ft.title.trim()||!ft.dueDate} onClick={()=>(ft.title.trim()&&ft.dueDate)&&askPw(()=>{setGoals(p=>[...p,{id:gid(),title:ft.title.trim(),desc:ft.desc,dueDate:ft.dueDate,progress:0,createdAt:new Date().toISOString()}]);setModal(null);toast('Goal added')})} style={{flex:2,padding:'.8rem',borderRadius:12,background:`linear-gradient(135deg,${ac}dd,${ac})`,color:'white',fontWeight:700,opacity:(ft.title.trim()&&ft.dueDate)?1:.4}}>Add Goal</button>
          </div>
        </Modal>
      )}
      {modal==='changePw'&&(
        <Modal onClose={()=>setModal(null)}>
          <h3 style={{color:'white',marginBottom:'1.25rem',fontSize:18}}>Change Parent Password</h3>
          <label style={{display:'block',color:'rgba(200,200,220,.6)',fontSize:12,fontWeight:600,marginBottom:5}}>Current Password</label>
          <input type="password" className="inp" id="hcp" style={{marginBottom:'1rem'}} placeholder="Current password…"/>
          <label style={{display:'block',color:'rgba(200,200,220,.6)',fontSize:12,fontWeight:600,marginBottom:5}}>New Password</label>
          <input type="password" className="inp" id="hnp" style={{marginBottom:'1.25rem'}} placeholder="New password (min 4 chars)…"/>
          <div style={{display:'flex',gap:'.75rem'}}>
            <button className="btn btn-ghost" style={{flex:1}} onClick={()=>setModal(null)}>Cancel</button>
            <button className="btn" onClick={()=>{const c=document.getElementById('hcp')?.value;const n=document.getElementById('hnp')?.value;if(c===parentPw&&n&&n.length>=4){setParentPw(n);setModal(null);toast('Password updated')}else{const el=document.getElementById(c!==parentPw?'hcp':'hnp');if(el){el.classList.add('inp-err');setTimeout(()=>el.classList.remove('inp-err'),1000)}}}} style={{flex:2,padding:'.8rem',borderRadius:12,background:`linear-gradient(135deg,${ac}dd,${ac})`,color:'white',fontWeight:700}}>Update</button>
          </div>
        </Modal>
      )}
      {pwQ&&<PwModal title="Parent Confirmation" hint="Enter parent password to continue" ac={ac} onConfirm={checkPw} onCancel={()=>setPwQ(null)}/>}
    </div>
  );
}

/* ─── Settings Panel ─────────────────────────────────── */
function SettingsPanel({bgIdx,setBgIdx,ac,onClearAll,onLogout,onClose,username,displayName,streak}){
  const[cc,setCC]=useState(false);const[cl,setCL]=useState(false);
  return(
    <Modal onClose={onClose}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1.5rem'}}>
        <h3 style={{color:'white',fontSize:18,fontWeight:700}}>⚙️ Settings</h3>
        <button className="btn btn-ghost" style={{width:32,height:32,padding:0,borderRadius:10,fontSize:16}} onClick={onClose}>✕</button>
      </div>
      {/* Account */}
      <div className="card-sm" style={{padding:'1rem',marginBottom:'1rem',display:'flex',alignItems:'center',gap:'.85rem'}}>
        <div style={{width:44,height:44,borderRadius:14,background:`${ac}22`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,fontWeight:800,color:ac,flexShrink:0}}>{(displayName||username).charAt(0).toUpperCase()}</div>
        <div style={{flex:1}}>
          <div style={{color:'white',fontWeight:600,fontSize:15}}>{displayName}</div>
          <div style={{color:'rgba(255,255,255,.38)',fontSize:12,marginTop:1}}>@{username}</div>
        </div>
        {streak&&streak.count>0&&<StreakBadge streak={streak}/>}
      </div>
      {/* Streak info */}
      {streak&&(
        <div className="card-sm" style={{padding:'.9rem',marginBottom:'1rem',display:'flex',gap:'1.25rem'}}>
          {[{l:'Current Streak',v:streak.count,ic:'🔥'},{l:'Best Streak',v:streak.best||0,ic:'🏆'}].map(s=>(
            <div key={s.l} style={{flex:1,textAlign:'center'}}>
              <div style={{fontSize:20}}>{s.ic}</div>
              <div style={{color:'#fbbf24',fontWeight:800,fontSize:20}}>{s.v}</div>
              <div style={{color:'rgba(255,255,255,.38)',fontSize:11,marginTop:1}}>{s.l}</div>
            </div>
          ))}
        </div>
      )}
      {/* Theme */}
      <p style={{color:'rgba(200,200,220,.6)',fontSize:12,fontWeight:600,marginBottom:'.65rem',letterSpacing:'.04em'}}>THEME</p>
      <div style={{display:'flex',gap:'.35rem',flexWrap:'wrap',marginBottom:'1.5rem'}}>
        {BG.map((b,i)=><button key={b.id} className="btn" onClick={()=>setBgIdx(i)} style={{padding:'.42rem .82rem',borderRadius:20,fontSize:12,fontWeight:700,background:bgIdx===i?`linear-gradient(135deg,${b.ac}dd,${b.ac})`:'rgba(255,255,255,.08)',color:bgIdx===i?'white':'rgba(255,255,255,.5)',border:`1.5px solid ${bgIdx===i?b.ac+'55':'transparent'}`,transition:'all .22s'}}>{b.name}</button>)}
      </div>
      {/* Storage note */}
      <div className="card-sm" style={{padding:'.85rem',marginBottom:'1.25rem'}}>
        <p style={{color:'rgba(255,255,255,.45)',fontSize:13,lineHeight:1.5}}>💾 All data is saved automatically to this device's local storage. Persists across page refreshes.</p>
      </div>
      {/* Danger */}
      <p style={{color:'rgba(200,200,220,.6)',fontSize:12,fontWeight:600,marginBottom:'.65rem',letterSpacing:'.04em'}}>ACCOUNT</p>
      <div style={{display:'flex',flexDirection:'column',gap:'.6rem'}}>
        {!cl?<button className="btn btn-ghost" onClick={()=>setCL(true)} style={{textAlign:'left',display:'flex',alignItems:'center',gap:'.5rem'}}>🚪 Sign Out</button>:(
          <div style={{background:'rgba(251,191,36,.08)',borderRadius:12,padding:'1rem',border:'1px solid rgba(251,191,36,.22)'}}>
            <p style={{color:'#fbbf24',fontWeight:600,marginBottom:'.35rem',fontSize:14}}>Sign out?</p>
            <p style={{color:'rgba(255,220,120,.5)',fontSize:13,marginBottom:'1rem'}}>Data stays saved. Sign back in anytime.</p>
            <div style={{display:'flex',gap:'.6rem'}}>
              <button className="btn btn-ghost" style={{flex:1,padding:'.65rem'}} onClick={()=>setCL(false)}>Cancel</button>
              <button className="btn" onClick={onLogout} style={{flex:1,padding:'.65rem',borderRadius:12,background:'linear-gradient(135deg,rgba(251,191,36,.7),rgba(251,191,36,.9))',color:'#1a1a1a',fontWeight:700,fontSize:14}}>Sign Out</button>
            </div>
          </div>
        )}
        {!cc?<button className="btn btn-danger" onClick={()=>setCC(true)} style={{textAlign:'left',display:'flex',alignItems:'center',gap:'.5rem'}}>🗑️ Delete All My Data</button>:(
          <div style={{background:'rgba(239,68,68,.08)',borderRadius:12,padding:'1rem',border:'1px solid rgba(239,68,68,.22)'}}>
            <p style={{color:'#f87171',fontWeight:700,marginBottom:'.35rem',fontSize:14}}>⚠️ Cannot be undone</p>
            <p style={{color:'rgba(255,140,140,.5)',fontSize:13,marginBottom:'1rem'}}>All classes, assignments, tasks, projects, and goals will be permanently deleted.</p>
            <div style={{display:'flex',gap:'.6rem'}}>
              <button className="btn btn-ghost" style={{flex:1,padding:'.65rem'}} onClick={()=>setCC(false)}>Cancel</button>
              <button className="btn btn-danger" style={{flex:1,padding:'.65rem'}} onClick={()=>{onClearAll();setCC(false);onClose()}}>Delete All</button>
            </div>
          </div>
        )}
      </div>
    </Modal>
  );
}

/* ─── APP ROOT ───────────────────────────────────────── */
function App(){
  const[authUser,setAuthUser]=useState(null);
  const[authChecked,setAuthChecked]=useState(false);
  const[showSplash,setShowSplash]=useState(false);
  const[tab,setTab]=useState('school');
  const[tabFade,setTabFade]=useState(false);
  const[bgIdx,setBgIdx]=useState(0);
  const[showSettings,setShowSettings]=useState(false);
  const[showSmartPri,setShowSmartPri]=useState(false);
  const[sView,setSView]=useState('dashboard');
  const[selClass,setSelClass]=useState(null);
  const[addForClass,setAddForClass]=useState(null);
  const[timeWindow,setTimeWindow]=useState(7);
  const[alarm,setAlarm]=useState(null);
  const[lockMode,setLockMode]=useState(null);
  const[panicMode,setPanicMode]=useState(false);
  const[schoolInfo,setSchoolInfo]=useState(null);
  const[classes,setClasses]=useState([]);
  const[assignments,setAssignments]=useState([]);
  const[tasks,setTasks]=useState([]);
  const[projects,setProjects]=useState([]);
  const[goals,setGoals]=useState([]);
  const[parentPw,setParentPw]=useState('parent123');
  const[streak,setStreak]=useState({count:0,best:0,lastDate:null});
  const{show:toast,TC}=useToast();
  const saveRef=useRef(null);
  const bg=BG[bgIdx];

  /* ── Mount: restore session ──────────────────── */
  useEffect(()=>{
    const sess=getSess();
    if(sess){const accts=getAccts();if(accts[sess]){loadUD2(sess,accts[sess]);setAuthUser({username:sess,displayName:accts[sess].displayName});setShowSplash(true)}}
    setAuthChecked(true);
  },[]);

  const loadUD2=(uname)=>{
    const d=loadUD(uname)||initData();
    setSchoolInfo(d.schoolInfo||null);
    setClasses(d.classes||[]);
    setAssignments(d.assignments||[]);
    setTasks(d.tasks||[]);
    setProjects(d.projects||[]);
    setGoals(d.goals||[]);
    setParentPw(d.parentPw||'parent123');
    setBgIdx(d.bgIdx||0);
    setTimeWindow(d.timeWindow||7);
    setStreak(d.streak||{count:0,best:0,lastDate:null});
  };

  /* ── Auto-save (debounced 400ms) ─────────────── */
  const saveData=useCallback(()=>{
    if(!authUser)return;
    const newStreak=updateStreak(streak,assignments);
    if(newStreak.count!==streak.count)setStreak(newStreak);
    const d={schoolInfo,classes,assignments,tasks,projects,goals,parentPw,bgIdx,timeWindow,streak:newStreak,savedAt:new Date().toISOString()};
    saveUD(authUser.username,d);
  },[authUser,schoolInfo,classes,assignments,tasks,projects,goals,parentPw,bgIdx,timeWindow,streak]);

  useEffect(()=>{
    if(!authUser)return;
    clearTimeout(saveRef.current);
    saveRef.current=setTimeout(saveData,400);
    return()=>clearTimeout(saveRef.current);
  },[schoolInfo,classes,assignments,tasks,projects,goals,parentPw,bgIdx,timeWindow]);

  /* ── Alarm check ─────────────────────────────── */
  useEffect(()=>{
    if(!authUser||!schoolInfo||lockMode||alarm)return;
    const c=()=>{const h=assignments.find(a=>!a.submitted&&dU(a.dueDate)>=0&&dU(a.dueDate)<=3);if(h)setAlarm(h)};
    c();const t=setInterval(c,30000);return()=>clearInterval(t);
  },[assignments,authUser,schoolInfo,lockMode,alarm]);

  const handleAuth=(uname,acct)=>{
    setAuthUser({username:uname,displayName:acct.displayName});
    loadUD2(uname);setShowSplash(true);
    setSView('dashboard');setTab('school');setSelClass(null);setAddForClass(null);setAlarm(null);setLockMode(null);setPanicMode(false);
  };
  const handleLogout=()=>{
    saveData();setSess(null);setAuthUser(null);setShowSplash(false);
    setSchoolInfo(null);setClasses([]);setAssignments([]);setTasks([]);setProjects([]);setGoals([]);
    setParentPw('parent123');setBgIdx(0);setTimeWindow(7);setStreak({count:0,best:0,lastDate:null});
    setSView('dashboard');setTab('school');setShowSettings(false);toast('Signed out');
  };
  const clearAll=()=>{
    const d=initData();saveUD(authUser.username,d);
    setSchoolInfo(null);setClasses([]);setAssignments([]);setTasks([]);setProjects([]);setGoals([]);
    setParentPw('parent123');setBgIdx(0);setTimeWindow(7);setStreak({count:0,best:0,lastDate:null});
    setSView('dashboard');setSelClass(null);setAddForClass(null);setAlarm(null);setLockMode(null);setPanicMode(false);
    toast('All data deleted','warn');
  };
  const switchTab=t=>{if(t===tab)return;setTabFade(true);setTimeout(()=>{setTab(t);setTabFade(false)},240)};

  const sBadge=assignments.filter(a=>!a.submitted&&dU(a.dueDate)<0).length+assignments.filter(a=>!a.submitted&&dU(a.dueDate)>=0&&dU(a.dueDate)<=3).length;
  const hBadge=tasks.filter(t=>!t.completed).length;

  /* FAB callbacks */
  const fabAddAssignment=()=>{
    setTab('school');setAddForClass(null);
    if(!schoolInfo){toast('Set up school profile first','warn');return}
    if(classes.length===0){setSView('classes');return}
    setSView('addAssignment');
  };
  const fabAddClass=()=>{setTab('school');if(!schoolInfo){toast('Set up school profile first','warn');return}setSView('classes')};
  const fabAddTask=()=>{setTab('home')};
  const fabAddProject=()=>{setTab('home')};

  if(!authChecked)return null;
  if(!authUser)return<><AuthScreen onAuth={handleAuth}/><TC/></>;

  const bgCss={height:'100%',display:'flex',flexDirection:'column',background:`linear-gradient(145deg,${bg.c1},${bg.c2},${bg.c3})`,backgroundSize:'400% 400%',animation:'gradShift 12s ease infinite',position:'relative',overflow:'hidden'};

  const showFAB=(tab==='school'&&(sView==='dashboard'||sView==='classes'))||(tab==='home');

  return(
    <div style={bgCss}>
      {showSplash&&<Splash bg={bg} onDone={()=>setShowSplash(false)}/>}
      <BgLayer bg={bg}/>

      {/* Header */}
      <div className="glass sd" style={{position:'relative',zIndex:10,padding:'.82rem 1.2rem',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',gap:'.7rem'}}>
          <div style={{width:34,height:34,borderRadius:10,background:`linear-gradient(135deg,${bg.ac},${bg.ac2})`,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
            <span style={{color:'white',fontSize:15,fontWeight:900,letterSpacing:'-1px'}}>Σ</span>
          </div>
          <div>
            <div style={{color:'white',fontWeight:800,fontSize:17,letterSpacing:'-.4px',lineHeight:1}}>Sigma</div>
            {schoolInfo&&<div style={{color:'rgba(255,255,255,.35)',fontSize:11,marginTop:1}}>{schoolInfo.name} · {schoolInfo.grade}</div>}
          </div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:'.45rem'}}>
          <div style={{display:'flex',alignItems:'center',gap:4,padding:'3px 8px',borderRadius:20,background:'rgba(74,222,128,.08)',border:'1px solid rgba(74,222,128,.18)'}}>
            <div style={{width:6,height:6,borderRadius:'50%',background:'#4ade80'}}/>
            <span style={{color:'rgba(74,222,128,.7)',fontSize:11,fontWeight:500}}>Saved</span>
          </div>
          <button className="btn" onClick={()=>setShowSettings(true)} style={{width:36,height:36,borderRadius:10,background:'rgba(255,255,255,.08)',color:'rgba(255,255,255,.7)',fontSize:16,border:'1px solid rgba(255,255,255,.1)'}} onMouseOver={e=>e.currentTarget.style.background='rgba(255,255,255,.16)'} onMouseOut={e=>e.currentTarget.style.background='rgba(255,255,255,.08)'}>⚙️</button>
        </div>
      </div>

      {/* Tab bar */}
      <div className="glass" style={{position:'relative',zIndex:10,display:'flex',padding:'.62rem .9rem',gap:'.6rem',flexShrink:0}}>
        {[['school','🎓 School',sBadge],['home','🏠 Home',hBadge]].map(([t,l,badge])=>(
          <button key={t} className="btn" onClick={()=>switchTab(t)} style={{flex:1,padding:'.7rem',borderRadius:12,fontWeight:700,fontSize:15,background:tab===t?`linear-gradient(135deg,${bg.ac}dd,${bg.ac})`:'rgba(255,255,255,.07)',color:tab===t?'white':'rgba(255,255,255,.42)',boxShadow:tab===t?`0 4px 22px ${bg.ac}44`:'none',transition:'all .32s cubic-bezier(.22,.61,.36,1)',transform:tab===t?'scale(1.02)':'scale(1)',position:'relative',border:`1px solid ${tab===t?'transparent':'rgba(255,255,255,.08)'}`}}>
            {l}
            {badge>0&&<span style={{position:'absolute',top:-5,right:-3,minWidth:18,height:18,borderRadius:9,background:'#ef4444',fontSize:10,fontWeight:800,color:'white',display:'flex',alignItems:'center',justifyContent:'center',padding:'0 4px'}}>{badge}</span>}
          </button>
        ))}
      </div>

      {/* Content */}
      <div style={{flex:1,overflowY:'auto',position:'relative',zIndex:5,opacity:tabFade?0:1,transition:'opacity .22s ease'}}>
        {tab==='school'&&(
          <>
            {!schoolInfo&&<SchoolSetup onSave={info=>{setSchoolInfo(info);toast('School profile saved ✓')}} ac={bg.ac}/>}
            {schoolInfo&&sView==='dashboard'&&<Dashboard user={schoolInfo} classes={classes} assignments={assignments} setAssignments={setAssignments} onClasses={()=>setSView('classes')} onAdd={()=>{setAddForClass(null);setSView('addAssignment')}} onAlarm={setAlarm} ac={bg.ac} timeWindow={timeWindow} setTimeWindow={setTimeWindow} toast={toast} streak={streak} panicMode={panicMode} setPanicMode={setPanicMode} onSmartPriority={()=>setShowSmartPri(true)}/>}
            {schoolInfo&&sView==='classes'&&<ClassesView classes={classes} setClasses={setClasses} assignments={assignments} onSelect={c=>{setSelClass(c);setSView('classDetail')}} onBack={()=>setSView('dashboard')} ac={bg.ac} toast={toast}/>}
            {schoolInfo&&sView==='classDetail'&&selClass&&<ClassDetail cls={selClass} assignments={assignments} setAssignments={setAssignments} onBack={()=>setSView('classes')} onAddHere={()=>{setAddForClass(selClass);setSView('addAssignment')}} ac={bg.ac} toast={toast}/>}
            {schoolInfo&&sView==='addAssignment'&&<AddAssignment classes={classes} preClass={addForClass} onAdd={a=>{setAssignments(p=>[...p,a]);setAddForClass(null);setSView('dashboard')}} onBack={()=>{setAddForClass(null);setSView(selClass?'classDetail':'dashboard')}} ac={bg.ac} toast={toast}/>}
          </>
        )}
        {tab==='home'&&<HomeTab tasks={tasks} setTasks={setTasks} projects={projects} setProjects={setProjects} goals={goals} setGoals={setGoals} parentPw={parentPw} setParentPw={setParentPw} ac={bg.ac} toast={toast}/>}
      </div>

      {/* FAB */}
      <FAB ac={bg.ac} visible={showFAB} onAddAssignment={fabAddAssignment} onAddTask={fabAddTask} onAddProject={fabAddProject} onAddClass={fabAddClass}/>

      {/* Smart Priority */}
      {showSmartPri&&<SmartPriorityPanel assignments={assignments} classes={classes} onClose={()=>setShowSmartPri(false)} ac={bg.ac} toast={toast} setAssignments={setAssignments}/>}

      {/* Alarm */}
      {alarm&&!lockMode&&<AlarmOverlay asgn={alarm} cls={classes.find(c=>c.id===alarm.classId)} onLater={()=>{setAlarm(null);toast('Reminder set')}} onNow={()=>{setLockMode(alarm);setAlarm(null)}} onShutdown={()=>setAlarm(null)}/>}

      {/* Lock */}
      {lockMode&&<LockScreen asgn={lockMode} cls={classes.find(c=>c.id===lockMode.classId)} ac={bg.ac} toast={toast} onUnlock={()=>{setAssignments(p=>p.map(a=>a.id===lockMode.id?{...a,submitted:true}:a));setLockMode(null)}} onOverride={pw=>{if(pw===schoolInfo?.schoolId){setLockMode(null);return true}return false}}/>}

      {/* Settings */}
      {showSettings&&<SettingsPanel bgIdx={bgIdx} setBgIdx={setBgIdx} ac={bg.ac} onClearAll={clearAll} onLogout={handleLogout} onClose={()=>setShowSettings(false)} username={authUser.username} displayName={authUser.displayName} streak={streak}/>}

      <TC/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
