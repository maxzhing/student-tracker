<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student & Home Tracker</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    color: white;
}

.container {
    max-width: 600px;
    margin: auto;
    padding: 20px;
}

input, button, select {
    width: 100%;
    padding: 10px;
    margin: 6px 0;
    border-radius: 8px;
    border: none;
}

button {
    background: #7c3aed;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

.card {
    background: rgba(255,255,255,0.08);
    padding: 12px;
    border-radius: 10px;
    margin-bottom: 10px;
}
</style>
</head>

<body>

<div id="app"></div>

<script src="app.js"></script>
</body>
</html>
