/* ════════════════════════════════════════════════════
   APP ROOT
════════════════════════════════════════════════════ */
function App(){
  const[authUser,setAuthUser]=useState(null);
  const[authChecked,setAuthChecked]=useState(false);
  const[showSplash,setShowSplash]=useState(false);
  const[setupDone,setSetupDone]=useState(!!LS.get('sg_setup_done'));
  const[tab,setTab]=useState('school');
  const[tabFade,setTabFade]=useState(false);
  const[bgIdx,setBgIdx]=useState(0);
  const[showSettings,setShowSettings]=useState(false);
  const[sView,setSView]=useState('dashboard');
  const[selClass,setSelClass]=useState(null);
  const[addForClass,setAddForClass]=useState(null);
  const[timeWindow,setTimeWindow]=useState(7);
  const[alarm,setAlarm]=useState(null);
  const[lockMode,setLockMode]=useState(null);
  const[panicMode,setPanicMode]=useState(false);
  const[sprintAsgn,setSprintAsgn]=useState(undefined);
  const[lockDistr,setLockDistr]=useState(undefined);
  const[aiAsgn,setAiAsgn]=useState(undefined);
  const[schoolInfo,setSchoolInfo]=useState(null);
  const[classes,setClasses]=useState([]);
  const[assignments,setAssignments]=useState([]);
  const[gradeData,setGradeData]=useState({});
  const[tasks,setTasks]=useState([]);
  const[projects,setProjects]=useState([]);
  const[goals,setGoals]=useState([]);
  const[parentPw,setParentPw]=useState('parent123');
  const[extras,setExtras]=useState([]);
  const[habits,setHabits]=useState([]);
  const[streak,setStreak]=useState({count:0,best:0,lastDate:null});
  const{show:toast,TC}=useToast();
  const saveRef=useRef(null);
  const bg=BG[bgIdx];

  useEffect(()=>{
    const sess=getSess();
    if(sess){
      (async()=>{
        const accts=getLocalAccts();
        const acct=accts[sess]||await Cloud.getAcct(sess);
        if(acct){
          loadD(sess);
          setAuthUser({username:sess,displayName:acct.displayName});
          setShowSplash(true);
        }else setSess(null);
        setAuthChecked(true);
      })();
    }else setAuthChecked(true);
  },[]);

  const loadD=async(un)=>{
    const d=await Cloud.loadData(un)||initData();
    setSchoolInfo(d.schoolInfo||null);
    setClasses(d.classes||[]);
    setAssignments(d.assignments||[]);
    setGradeData(d.gradeData||{});
    setTasks(d.tasks||[]);
    setProjects(d.projects||[]);
    setGoals(d.goals||[]);
    setParentPw(d.parentPw||'parent123');
    setExtras(d.extras||[]);
    setHabits(d.habits||[]);
    setBgIdx(d.bgIdx||0);
    setTimeWindow(d.timeWindow||7);
    setStreak(d.streak||{count:0,best:0,lastDate:null});
  };

  const saveD=useCallback(()=>{
    if(!authUser)return;
    const ns=updateStreak(streak,assignments);
    if(ns.count!==streak.count)setStreak(ns);
    const d={schoolInfo,classes,assignments,gradeData,tasks,projects,goals,extras,habits,parentPw,bgIdx,timeWindow,streak:ns,savedAt:new Date().toISOString()};
    Cloud.saveData(authUser.username,d).catch(()=>{});
  },[authUser,schoolInfo,classes,assignments,gradeData,tasks,projects,goals,extras,habits,parentPw,bgIdx,timeWindow,streak]);

  useEffect(()=>{
    if(!authUser)return;
    clearTimeout(saveRef.current);
    saveRef.current=setTimeout(saveD,500);
    return()=>clearTimeout(saveRef.current);
  },[schoolInfo,classes,assignments,gradeData,tasks,projects,goals,extras,habits,parentPw,bgIdx,timeWindow]);

  useEffect(()=>{
    if(!authUser||!schoolInfo||lockMode||alarm)return;
    const c=()=>{const h=assignments.find(a=>!a.submitted&&dU(a.dueDate)>=0&&dU(a.dueDate)<=(a.alarmDays!=null?a.alarmDays:3)&&!a.alarmSnoozed);if(h)setAlarm(h)};
    c();const t=setInterval(c,30000);return()=>clearInterval(t);
  },[assignments,authUser,schoolInfo,lockMode,alarm]);

  const handleAuth=(un,acct,data)=>{
    setAuthUser({username:un,displayName:acct.displayName});
    if(data){
      setSchoolInfo(data.schoolInfo||null);setClasses(data.classes||[]);setAssignments(data.assignments||[]);setExtras(data.extras||[]);setHabits(data.habits||[]);
      setGradeData(data.gradeData||{});setTasks(data.tasks||[]);setProjects(data.projects||[]);
      setGoals(data.goals||[]);setParentPw(data.parentPw||'parent123');setBgIdx(data.bgIdx||0);
      setTimeWindow(data.timeWindow||7);setStreak(data.streak||{count:0,best:0,lastDate:null});
    }
    setShowSplash(true);setSView('dashboard');setTab('school');setSelClass(null);setAddForClass(null);setAlarm(null);setLockMode(null);setPanicMode(false);
  };

  const handleLogout=()=>{
    saveD();setSess(null);setAuthUser(null);setShowSplash(false);
    setSchoolInfo(null);setClasses([]);setAssignments([]);setGradeData({});setTasks([]);setProjects([]);setGoals([]);setExtras([]);setHabits([]);
    setParentPw('parent123');setBgIdx(0);setTimeWindow(7);setStreak({count:0,best:0,lastDate:null});
    setSView('dashboard');setTab('school');setShowSettings(false);toast('Signed out');
  };

  const clearAll=()=>{
    const d=initData();Cloud.saveData(authUser.username,d).catch(()=>{});
    setSchoolInfo(null);setClasses([]);setAssignments([]);setGradeData({});setTasks([]);setProjects([]);setGoals([]);
    setParentPw('parent123');setBgIdx(0);setTimeWindow(7);setStreak({count:0,best:0,lastDate:null});
    setSView('dashboard');setSelClass(null);setAddForClass(null);setAlarm(null);setLockMode(null);setPanicMode(false);
    toast('All data deleted','warn');
  };

  const switchTab=t=>{if(t===tab)return;setTabFade(true);setTimeout(()=>{setTab(t);setTabFade(false)},220)};

  const sBadge=assignments.filter(a=>!a.submitted&&(dU(a.dueDate)<0||dU(a.dueDate)<=3)).length;
  const hBadge=tasks.filter(t=>!t.completed).length;
  const fabVisible=(tab==='school'&&(sView==='dashboard'||sView==='classes'))||(tab==='home')||(tab==='grades');

  if(!setupDone)return<SetupWizard onDone={()=>setSetupDone(true)}/>;
  if(!authChecked)return null;
  if(!authUser)return<><AuthScreen onAuth={handleAuth}/><TC/></>;

  const bgStyle={height:'100%',display:'flex',flexDirection:'column',background:`linear-gradient(145deg,${bg.c1},${bg.c2},${bg.c3})`,backgroundSize:'400% 400%',animation:'gradShift 12s ease infinite',position:'relative',overflow:'hidden'};

  return(
    <div style={bgStyle}>
      {showSplash&&<Splash bg={bg} onDone={()=>setShowSplash(false)}/>}
      <BgLayer bg={bg}/>

      {sprintAsgn!==undefined&&<SprintMode asgn={sprintAsgn} cls={sprintAsgn?classes.find(c=>c.id===sprintAsgn.classId):null} ac={bg.ac} onDone={()=>{if(sprintAsgn)setAssignments(p=>p.map(a=>a.id===sprintAsgn.id?{...a,submitted:true}:a));setSprintAsgn(undefined);toast('Sprint done — submitted!')}} onExit={()=>setSprintAsgn(undefined)}/>}
      {lockDistr!==undefined&&<LockDistractions asgn={lockDistr||null} onUnlock={()=>setLockDistr(undefined)} ac={bg.ac}/>}
      {aiAsgn!==undefined&&<AIPanel asgn={aiAsgn||null} cls={aiAsgn?classes.find(c=>c.id===aiAsgn.classId):null} allAsgns={assignments} onClose={()=>setAiAsgn(undefined)} ac={bg.ac}/>}

      {/* Header */}
      <div className="glass sd" style={{position:'relative',zIndex:10,padding:'.76rem 1.15rem',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',gap:'.62rem'}}>
          <div style={{width:32,height:32,borderRadius:9,background:`linear-gradient(135deg,${bg.ac},${bg.ac2})`,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
            <span style={{color:'#fff',fontSize:14,fontWeight:900,letterSpacing:'-1px'}}>Σ</span>
          </div>
          <div>
            <div style={{color:'#fff',fontWeight:800,fontSize:16,letterSpacing:'-.4px',lineHeight:1}}>Sigma</div>
            {schoolInfo&&<div style={{color:'rgba(255,255,255,.32)',fontSize:11,marginTop:1}}>{schoolInfo.name} · {schoolInfo.grade}</div>}
          </div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:'.4rem'}}>
          <div style={{display:'flex',alignItems:'center',gap:3,padding:'3px 7px',borderRadius:20,background:'rgba(74,222,128,.07)',border:'1px solid rgba(74,222,128,.16)'}}>
            <div style={{width:5,height:5,borderRadius:'50%',background:'#4ade80'}}/>
            <span style={{color:'rgba(74,222,128,.65)',fontSize:11}}>Saved</span>
          </div>
          <button className="btn" onClick={()=>setShowSettings(true)} style={{width:34,height:34,borderRadius:9,background:'rgba(255,255,255,.08)',color:'rgba(255,255,255,.68)',fontSize:15,border:'1px solid rgba(255,255,255,.09)'}} onMouseOver={e=>e.currentTarget.style.background='rgba(255,255,255,.15)'} onMouseOut={e=>e.currentTarget.style.background='rgba(255,255,255,.08)'}>⚙️</button>
        </div>
      </div>

      {/* Content */}
      <div style={{flex:1,overflowY:'auto',position:'relative',zIndex:5,opacity:tabFade?0:1,transition:'opacity .2s ease',WebkitOverflowScrolling:'touch'}}>
        {tab==='school'&&(
          <>
            {!schoolInfo&&<SchoolSetup onSave={info=>{setSchoolInfo(info);toast('School profile saved ✓')}} ac={bg.ac}/>}
            {schoolInfo&&sView==='dashboard'&&<Dashboard user={schoolInfo} classes={classes} assignments={assignments} setAssignments={setAssignments} onClasses={()=>setSView('classes')} onAdd={()=>{setAddForClass(null);setSView('addAssignment')}} ac={bg.ac} timeWindow={timeWindow} setTimeWindow={setTimeWindow} toast={toast} streak={streak} panicMode={panicMode} setPanicMode={setPanicMode} onSprint={a=>setSprintAsgn(a)} onAI={(a)=>setAiAsgn(a)} onLock={a=>setLockDistr(a)}/>}
            {schoolInfo&&sView==='classes'&&<ClassesView classes={classes} setClasses={setClasses} assignments={assignments} onSelect={c=>{setSelClass(c);setSView('classDetail')}} onBack={()=>setSView('dashboard')} ac={bg.ac} toast={toast}/>}
            {schoolInfo&&sView==='classDetail'&&selClass&&<ClassDetail cls={selClass} assignments={assignments} setAssignments={setAssignments} onBack={()=>setSView('classes')} onAddHere={()=>{setAddForClass(selClass);setSView('addAssignment')}} ac={bg.ac} toast={toast} gradeData={gradeData} setGradeData={setGradeData}/>}
            {schoolInfo&&sView==='addAssignment'&&<AddAssignment classes={classes} preClass={addForClass} onAdd={a=>{setAssignments(p=>[...p,a]);setAddForClass(null);setSView('dashboard')}} onBack={()=>{setAddForClass(null);setSView(selClass&&sView==='addAssignment'?'classDetail':'dashboard')}} ac={bg.ac} toast={toast}/>}
          </>
        )}
        {tab==='home'&&<HomeTab tasks={tasks} setTasks={setTasks} projects={projects} setProjects={setProjects} goals={goals} setGoals={setGoals} extras={extras} setExtras={setExtras} habits={habits} setHabits={setHabits} parentPw={parentPw} setParentPw={setParentPw} ac={bg.ac} toast={toast}/>}
        {tab==='grades'&&<GradesTab classes={classes} gradeData={gradeData} setGradeData={setGradeData} ac={bg.ac}/>}
      </div>

      {/* Bottom Nav */}
      <div className="bnav" style={{zIndex:85}}>
        {[['school','🎓','School',sBadge],['grades','📊','Grades',0],['home','🏠','Home',hBadge]].map(([t,ic,l,badge])=>(
          <button key={t} className={`bnav-btn${tab===t?' act':''}`} onClick={()=>switchTab(t)} style={{color:tab===t?bg.ac:'rgba(255,255,255,.44)'}}>
            <span className="nav-ic">{ic}</span>
            <span style={{fontSize:11,fontWeight:tab===t?700:500,transition:'all .2s'}}>{l}</span>
            {badge>0&&<span style={{position:'absolute',top:6,left:'50%',marginLeft:6,minWidth:16,height:16,borderRadius:8,background:'#ef4444',fontSize:9,fontWeight:800,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',padding:'0 3px'}}>{badge}</span>}
          </button>
        ))}
      </div>

      {/* FAB */}
      <FAB ac={bg.ac} visible={fabVisible}
        onAddAssignment={()=>{setTab('school');if(!schoolInfo){toast('Set up school profile first','warn');return}if(classes.length===0){setSView('classes');return}setSView('addAssignment')}}
        onAddClass={()=>{setTab('school');if(!schoolInfo){toast('Set up school profile first','warn');return}setSView('classes')}}
        onAddTask={()=>setTab('home')}
        onAddProject={()=>setTab('home')}/>

      {alarm&&!lockMode&&<AlarmOverlay asgn={alarm} cls={classes.find(c=>c.id===alarm.classId)} onLater={(days)=>{if(alarm){setAssignments(prev=>prev.map(a=>a.id===alarm.id?{...a,alarmDays:days,alarmSnoozed:false}:a));}setAlarm(null);toast('Reminder in '+days+' day'+(days!==1?'s':'')+'!')}} onNow={()=>{setLockMode(alarm);setAlarm(null)}} onShutdown={()=>setAlarm(null)}/>}
      {lockMode&&<LockScreen asgn={lockMode} cls={classes.find(c=>c.id===lockMode.classId)} ac={bg.ac} toast={toast} onUnlock={()=>{setAssignments(p=>p.map(a=>a.id===lockMode.id?{...a,submitted:true}:a));setLockMode(null)}} onOverride={pw=>{if(pw===schoolInfo?.schoolId){setLockMode(null);return true}return false}}/>}
      {showSettings&&<SettingsPanel bgIdx={bgIdx} setBgIdx={setBgIdx} ac={bg.ac} onClearAll={clearAll} onLogout={handleLogout} onClose={()=>setShowSettings(false)} username={authUser.username} displayName={authUser.displayName} streak={streak}/>}
      <TC/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
