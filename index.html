              <div style={{color:'rgba(255,255,255,.3)',fontSize:12,marginTop:2}}>{t.completed?'✅ Completed':'⏳ Pending parent confirmation'}</div>
            </div>
            {!t.completed&&<button className="btn" onClick={()=>askPw(()=>{setTasks(p=>p.map(x=>x.id===t.id?{...x,completed:true}:x));toast('Done ✓')})} style={{padding:'.4rem .76rem',borderRadius:9,background:`${ac}18`,color:ac,fontSize:13,fontWeight:600,whiteSpace:'nowrap'}} onMouseOver={e=>e.currentTarget.style.background=`${ac}36`} onMouseOut={e=>e.currentTarget.style.background=`${ac}18`}>✓</button>}
            <button className="btn" onClick={()=>askPw(()=>{setTasks(p=>p.filter(x=>x.id!==t.id));toast('Removed','warn')})} style={{width:28,height:28,borderRadius:8,background:'rgba(239,68,68,.1)',color:'#f87171',fontSize:12,flexShrink:0}} onMouseOver={e=>e.currentTarget.style.background='rgba(239,68,68,.24)'} onMouseOut={e=>e.currentTarget.style.background='rgba(239,68,68,.1)'}>✕</button>
          </div>
        ))}
        <button className="btn" onClick={()=>{setFt({title:'',dueDate:'',desc:''});setModal('task')}} style={{width:'100%',padding:'.88rem',borderRadius:13,background:`linear-gradient(135deg,${ac}dd,${ac})`,color:'#fff',fontWeight:700,marginTop:'.5rem',boxShadow:`0 4px 17px ${ac}44`}} onMouseOver={e=>e.currentTarget.style.opacity='.85'} onMouseOut={e=>e.currentTarget.style.opacity='1'}>+ Add Task</button>
      </>}
      {sec==='projects'&&<>
        {projects.length===0&&<div style={{textAlign:'center',padding:'3rem 1rem',color:'rgba(255,255,255,.28)'}}><div style={{fontSize:46,marginBottom:'.55rem'}}>📋</div><p style={{fontSize:15,color:'rgba(255,255,255,.38)',fontWeight:500}}>No projects</p></div>}
        {projects.map((p,i)=>{const d=dU(p.dueDate);const bc=p.completed?'#4ade80':d<0?'#ef4444':d<=3?'#facc15':'#818cf8';return(
          <div key={p.id} className="su lift" style={{animationDelay:`${i*.05}s`,background:'rgba(255,255,255,.06)',borderRadius:13,padding:'.9rem',marginBottom:'.5rem',borderLeft:`3px solid ${bc}`,border:'1px solid rgba(255,255,255,.07)',borderLeftColor:bc,borderLeftWidth:3}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:p.completed?0:'.44rem'}}>
              <div style={{flex:1,marginRight:7}}>
                <div style={{color:p.completed?'rgba(255,255,255,.35)':'#fff',fontWeight:600,fontSize:15,textDecoration:p.completed?'line-through':'none',lineHeight:1.3}}>{p.title}</div>
                <div style={{color:'rgba(255,255,255,.36)',fontSize:12,marginTop:2}}>Due: {fD(p.dueDate)}{!p.completed?` · ${d<0?'Overdue':d===0?'Today!':d+'d left'}`:''}</div>
                {p.desc&&<div style={{color:'rgba(255,255,255,.26)',fontSize:12,marginTop:2,fontStyle:'italic'}}>{p.desc}</div>}
              </div>
              <span style={{background:`${bc}18`,color:bc,fontSize:11,fontWeight:700,padding:'3px 9px',borderRadius:20,flexShrink:0,border:`1px solid ${bc}28`}}>{p.completed?'Done':d<0?'Overdue':'Active'}</span>
            </div>
            {!p.completed&&<div style={{display:'flex',gap:'.4rem'}}>
              <button className="btn" onClick={()=>askPw(()=>{setProjects(prev=>prev.map(x=>x.id===p.id?{...x,completed:true}:x));toast('Done ✓')})} style={{flex:1,padding:'.4rem',borderRadius:9,background:`${ac}18`,color:ac,fontSize:13,fontWeight:600}} onMouseOver={e=>e.currentTarget.style.background=`${ac}36`} onMouseOut={e=>e.currentTarget.style.background=`${ac}18`}>✓ Complete</button>
              <button className="btn" onClick={()=>askPw(()=>{setProjects(prev=>prev.filter(x=>x.id!==p.id));toast('Removed','warn')})} style={{width:30,borderRadius:9,background:'rgba(239,68,68,.1)',color:'#f87171',fontSize:12}} onMouseOver={e=>e.currentTarget.style.background='rgba(239,68,68,.24)'} onMouseOut={e=>e.currentTarget.style.background='rgba(239,68,68,.1)'}>✕</button>
            </div>}
          </div>
        );})}
        <button className="btn" onClick={()=>{setFt({title:'',dueDate:tp(7),desc:''});setModal('project')}} style={{width:'100%',padding:'.88rem',borderRadius:13,background:`linear-gradient(135deg,${ac}dd,${ac})`,color:'#fff',fontWeight:700,marginTop:'.5rem',boxShadow:`0 4px 17px ${ac}44`}} onMouseOver={e=>e.currentTarget.style.opacity='.85'} onMouseOut={e=>e.currentTarget.style.opacity='1'}>+ Add Project</button>
      </>}
      {sec==='goals'&&<>
        {goals.length===0&&<div style={{textAlign:'center',padding:'3rem 1rem',color:'rgba(255,255,255,.28)'}}><div style={{fontSize:46,marginBottom:'.55rem'}}>🎯</div><p style={{fontSize:15,color:'rgba(255,255,255,.38)',fontWeight:500}}>No goals</p></div>}
        {goals.map((g,i)=>(
          <div key={g.id} className="su lift" style={{animationDelay:`${i*.05}s`,background:'rgba(255,255,255,.06)',borderRadius:13,padding:'.9rem',marginBottom:'.55rem',border:'1px solid rgba(255,255,255,.08)'}}>
            <div style={{display:'flex',gap:'.8rem',alignItems:'center',marginBottom:'.75rem'}}>
              <Ring pct={g.progress} size={62} sw={5} color={g.progress>=100?'#4ade80':ac}/>
              <div style={{flex:1}}>
                <div style={{color:'#fff',fontWeight:700,fontSize:15,lineHeight:1.3}}>{g.title}</div>
                <div style={{color:'rgba(255,255,255,.36)',fontSize:12,marginTop:2}}>Target: {fD(g.dueDate)}</div>
              </div>
              <button className="btn" onClick={()=>askPw(()=>{setGoals(p=>p.filter(x=>x.id!==g.id));toast('Removed','warn')})} style={{width:27,height:27,borderRadius:8,background:'rgba(239,68,68,.1)',color:'#f87171',fontSize:11,flexShrink:0,alignSelf:'flex-start'}} onMouseOver={e=>e.currentTarget.style.background='rgba(239,68,68,.24)'} onMouseOut={e=>e.currentTarget.style.background='rgba(239,68,68,.1)'}>✕</button>
            </div>
            <div style={{background:'rgba(255,255,255,.07)',borderRadius:20,height:6,overflow:'hidden',marginBottom:'.44rem'}}>
              <div style={{width:`${g.progress}%`,height:'100%',background:g.progress>=100?`linear-gradient(90deg,#4ade80,#22c55e)`:`linear-gradient(90deg,${ac},${ac}88)`,borderRadius:20,transition:'width .65s cubic-bezier(.22,.61,.36,1)'}}/>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:'.6rem'}}>
              <input type="range" min={0} max={100} step={5} value={g.progress} onChange={e=>setGoals(p=>p.map(x=>x.id===g.id?{...x,progress:+e.target.value}:x))} style={{flex:1,accentColor:ac,cursor:'pointer'}}/>
              {g.progress>=100&&<span className="check" style={{color:'#4ade80',fontWeight:700,fontSize:12,whiteSpace:'nowrap'}}>🎉 Done!</span>}
            </div>
          </div>
        ))}
        <button className="btn" onClick={()=>{setFt({title:'',dueDate:tp(30),desc:''});setModal('goal')}} style={{width:'100%',padding:'.88rem',borderRadius:13,background:`linear-gradient(135deg,${ac}dd,${ac})`,color:'#fff',fontWeight:700,marginTop:'.5rem',boxShadow:`0 4px 17px ${ac}44`}} onMouseOver={e=>e.currentTarget.style.opacity='.85'} onMouseOut={e=>e.currentTarget.style.opacity='1'}>+ Add Goal</button>
      </>}
      {sec==='settings'&&<div className="sc">
        <div className="card-sm" style={{padding:'1.1rem',marginBottom:'.9rem'}}>
          <div style={{display:'flex',alignItems:'center',gap:'.7rem',marginBottom:'.65rem'}}>
            <div style={{width:34,height:34,borderRadius:10,background:`${ac}22`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:17}}>🔐</div>
            <div><h3 style={{color:'#fff',fontSize:14,fontWeight:700}}>Parental Controls</h3><p style={{color:'rgba(255,255,255,.36)',fontSize:12}}>Default: <span style={{color:ac,fontWeight:700}}>parent123</span></p></div>
          </div>
          <button className="btn" onClick={()=>setModal('changePw')} style={{width:'100%',padding:'.8rem',borderRadius:11,background:`${ac}18`,color:ac,fontWeight:700,border:`1px solid ${ac}30`}} onMouseOver={e=>e.currentTarget.style.background=`${ac}36`} onMouseOut={e=>e.currentTarget.style.background=`${ac}18`}>Change Password</button>
        </div>
        <div className="card-sm" style={{padding:'1.1rem'}}>
          <h3 style={{color:'#fff',fontSize:14,fontWeight:700,marginBottom:'.85rem'}}>📊 Summary</h3>
          {[['Tasks',tasks.filter(t=>!t.completed).length,tasks.length],['Projects',projects.filter(p=>!p.completed).length,projects.length],['Goals',goals.filter(g=>g.progress<100).length,goals.length]].map(([k,pend,tot])=>(
            <div key={k} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'.5rem 0',borderBottom:'1px solid rgba(255,255,255,.05)'}}>
              <span style={{color:'rgba(255,255,255,.5)',fontSize:14}}>{k}</span>
              <div style={{display:'flex',gap:7,alignItems:'center'}}>
                {pend>0&&<span style={{background:`${ac}20`,color:ac,fontSize:11,fontWeight:700,padding:'2px 7px',borderRadius:9}}>{pend} pending</span>}
                <span style={{color:'rgba(255,255,255,.35)',fontSize:13}}>{tot} total</span>
              </div>
            </div>
          ))}
        </div>
      </div>}
    </div>
    {modal==='task'&&<Modal onClose={()=>setModal(null)} sheet>
      <h3 style={{color:'#fff',marginBottom:'1rem',fontSize:17}}>Add Task</h3>
      <label style={{display:'block',color:'rgba(200,200,220,.58)',fontSize:12,fontWeight:600,marginBottom:4}}>Task *</label>
      <input className="inp" style={{marginBottom:'1.2rem'}} placeholder="e.g. Clean your room…" value={ft.title} onChange={e=>setFt(p=>({...p,title:e.target.value}))} autoFocus/>
      <div style={{display:'flex',gap:'.65rem'}}>
        <button className="btn ghost" style={{flex:1}} onClick={()=>setModal(null)}>Cancel</button>
        <button className="btn" disabled={!ft.title.trim()} onClick={()=>ft.title.trim()&&askPw(()=>{setTasks(p=>[...p,{id:gid(),title:ft.title.trim(),completed:false}]);setModal(null);toast('Task added')})} style={{flex:2,padding:'.8rem',borderRadius:12,background:`linear-gradient(135deg,${ac}dd,${ac})`,color:'#fff',fontWeight:700,opacity:ft.title.trim()?1:.4}}>Add Task</button>
      </div>
    </Modal>}
    {modal==='project'&&<Modal onClose={()=>setModal(null)} sheet>
      <h3 style={{color:'#fff',marginBottom:'1rem',fontSize:17}}>Add Project</h3>
      <label style={{display:'block',color:'rgba(200,200,220,.58)',fontSize:12,fontWeight:600,marginBottom:4}}>Title *</label>
      <input className="inp" style={{marginBottom:'.9rem'}} placeholder="e.g. Create travel slides…" value={ft.title} onChange={e=>setFt(p=>({...p,title:e.target.value}))} autoFocus/>
      <label style={{display:'block',color:'rgba(200,200,220,.58)',fontSize:12,fontWeight:600,marginBottom:4}}>Notes <span style={{color:'rgba(255,255,255,.26)',fontWeight:400}}>(optional)</span></label>
      <textarea className="inp" style={{resize:'none',height:56,marginBottom:'.9rem'}} value={ft.desc} onChange={e=>setFt(p=>({...p,desc:e.target.value}))} placeholder="Details…"/>
      <label style={{display:'block',color:'rgba(200,200,220,.58)',fontSize:12,fontWeight:600,marginBottom:4}}>Due Date *</label>
      <input className="inp" type="date" style={{marginBottom:'1.2rem'}} value={ft.dueDate} onChange={e=>setFt(p=>({...p,dueDate:e.target.value}))}/>
      <div style={{display:'flex',gap:'.65rem'}}>
        <button className="btn ghost" style={{flex:1}} onClick={()=>setModal(null)}>Cancel</button>
        <button className="btn" disabled={!ft.title.trim()||!ft.dueDate} onClick={()=>(ft.title.trim()&&ft.dueDate)&&askPw(()=>{setProjects(p=>[...p,{id:gid(),title:ft.title.trim(),desc:ft.desc,dueDate:ft.dueDate,completed:false}]);setModal(null);toast('Project added')})} style={{flex:2,padding:'.8rem',borderRadius:12,background:`linear-gradient(135deg,${ac}dd,${ac})`,color:'#fff',fontWeight:700,opacity:(ft.title.trim()&&ft.dueDate)?1:.4}}>Add</button>
      </div>
    </Modal>}
    {modal==='goal'&&<Modal onClose={()=>setModal(null)} sheet>
      <h3 style={{color:'#fff',marginBottom:'1rem',fontSize:17}}>Add Goal</h3>
      <label style={{display:'block',color:'rgba(200,200,220,.58)',fontSize:12,fontWeight:600,marginBottom:4}}>Goal *</label>
      <input className="inp" style={{marginBottom:'.9rem'}} placeholder="e.g. Read 5 books…" value={ft.title} onChange={e=>setFt(p=>({...p,title:e.target.value}))} autoFocus/>
      <label style={{display:'block',color:'rgba(200,200,220,.58)',fontSize:12,fontWeight:600,marginBottom:4}}>Target Date *</label>
      <input className="inp" type="date" style={{marginBottom:'1.2rem'}} value={ft.dueDate} onChange={e=>setFt(p=>({...p,dueDate:e.target.value}))}/>
      <div style={{display:'flex',gap:'.65rem'}}>
        <button className="btn ghost" style={{flex:1}} onClick={()=>setModal(null)}>Cancel</button>
        <button className="btn" disabled={!ft.title.trim()||!ft.dueDate} onClick={()=>(ft.title.trim()&&ft.dueDate)&&askPw(()=>{setGoals(p=>[...p,{id:gid(),title:ft.title.trim(),desc:ft.desc,dueDate:ft.dueDate,progress:0}]);setModal(null);toast('Goal added')})} style={{flex:2,padding:'.8rem',borderRadius:12,background:`linear-gradient(135deg,${ac}dd,${ac})`,color:'#fff',fontWeight:700,opacity:(ft.title.trim()&&ft.dueDate)?1:.4}}>Add</button>
      </div>
    </Modal>}
    {modal==='changePw'&&<Modal onClose={()=>setModal(null)}>
      <h3 style={{color:'#fff',marginBottom:'1.1rem',fontSize:17}}>Change Parent Password</h3>
      <label style={{display:'block',color:'rgba(200,200,220,.58)',fontSize:12,fontWeight:600,marginBottom:4}}>Current</label>
      <input type="password" className="inp" id="hcp" style={{marginBottom:'.85rem'}} placeholder="Current password…"/>
      <label style={{display:'block',color:'rgba(200,200,220,.58)',fontSize:12,fontWeight:600,marginBottom:4}}>New (min 4 chars)</label>
      <input type="password" className="inp" id="hnp" style={{marginBottom:'1.2rem'}} placeholder="New password…"/>
      <div style={{display:'flex',gap:'.65rem'}}>
        <button className="btn ghost" style={{flex:1}} onClick={()=>setModal(null)}>Cancel</button>
        <button className="btn" onClick={()=>{const c=document.getElementById('hcp')?.value,n=document.getElementById('hnp')?.value;if(c===parentPw&&n?.length>=4){setParentPw(n);setModal(null);toast('Password updated')}else{const el=document.getElementById(c!==parentPw?'hcp':'hnp');if(el){el.classList.add('inp-err');setTimeout(()=>el.classList.remove('inp-err'),800)}}}} style={{flex:2,padding:'.8rem',borderRadius:12,background:`linear-gradient(135deg,${ac}dd,${ac})`,color:'#fff',fontWeight:700}}>Update</button>
      </div>
    </Modal>}
    {pwQ&&<PwModal title="Parent Confirmation" hint="Enter parent password" ac={ac} onConfirm={checkPw} onCancel={()=>setPwQ(null)}/>}
  </div>);
}

/* ══ SETTINGS PANEL ══════════════════════════════════ */
function SettingsPanel({bgIdx,setBgIdx,ac,onClearAll,onLogout,onClose,username,displayName,streak}){
  const[cc,setCC]=useState(false);const[cl,setCL]=useState(false);
  return(<Modal onClose={onClose}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1.35rem'}}>
      <h3 style={{color:'#fff',fontSize:17,fontWeight:700}}>⚙️ Settings</h3>
      <button className="btn ghost" style={{width:30,height:30,padding:0,borderRadius:9,fontSize:15}} onClick={onClose}>✕</button>
    </div>
    <div className="card-sm" style={{padding:'.9rem',marginBottom:'.9rem',display:'flex',alignItems:'center',gap:'.8rem'}}>
      <div style={{width:42,height:42,borderRadius:13,background:`${ac}22`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:19,fontWeight:800,color:ac,flexShrink:0}}>{(displayName||username).charAt(0).toUpperCase()}</div>
      <div style={{flex:1}}><div style={{color:'#fff',fontWeight:600,fontSize:15}}>{displayName}</div><div style={{color:'rgba(255,255,255,.36)',fontSize:12,marginTop:1}}>@{username}</div></div>
      {streak&&streak.count>0&&<div style={{display:'flex',alignItems:'center',gap:4,padding:'3px 9px',borderRadius:20,background:'rgba(251,191,36,.1)',border:'1px solid rgba(251,191,36,.25)',animation:'streakGlow 2.5s ease-in-out infinite'}}><span style={{fontSize:13}}>🔥</span><span style={{color:'#fbbf24',fontWeight:700,fontSize:13}}>{streak.count}</span></div>}
    </div>
    {streak&&<div className="card-sm" style={{padding:'.85rem',marginBottom:'.9rem',display:'flex',gap:'1.1rem'}}>
      {[{l:'Streak',v:streak.count,ic:'🔥'},{l:'Best',v:streak.best||0,ic:'🏆'}].map(s=>(
        <div key={s.l} style={{flex:1,textAlign:'center'}}>
          <div style={{fontSize:19}}>{s.ic}</div>
          <div style={{color:'#fbbf24',fontWeight:800,fontSize:19}}>{s.v}</div>
          <div style={{color:'rgba(255,255,255,.35)',fontSize:11,marginTop:1}}>{s.l}</div>
        </div>
      ))}
    </div>}
    <p style={{color:'rgba(200,200,220,.55)',fontSize:11,fontWeight:600,marginBottom:'.55rem',letterSpacing:'.04em'}}>THEME</p>
    <div style={{display:'flex',gap:'.3rem',flexWrap:'wrap',marginBottom:'1.3rem'}}>
      {BG.map((b,i)=><button key={b.id} className="btn" onClick={()=>setBgIdx(i)} style={{padding:'.4rem .8rem',borderRadius:20,fontSize:12,fontWeight:700,background:bgIdx===i?`linear-gradient(135deg,${b.ac}dd,${b.ac})`:'rgba(255,255,255,.08)',color:bgIdx===i?'#fff':'rgba(255,255,255,.48)',border:`1.5px solid ${bgIdx===i?b.ac+'55':'transparent'}`,transition:'all .2s'}}>{b.name}</button>)}
    </div>
    <div className="card-sm" style={{padding:'.82rem',marginBottom:'1.1rem'}}>
      <p style={{color:'rgba(255,255,255,.42)',fontSize:13,lineHeight:1.5}}>💾 All data saved automatically to this device's local storage. Persists across refreshes.</p>
    </div>
    <p style={{color:'rgba(200,200,220,.55)',fontSize:11,fontWeight:600,marginBottom:'.55rem',letterSpacing:'.04em'}}>ACCOUNT</p>
    <div style={{display:'flex',flexDirection:'column',gap:'.55rem'}}>
      {!cl?<button className="btn ghost" onClick={()=>setCL(true)} style={{textAlign:'left',display:'flex',alignItems:'center',gap:'.5rem'}}>🚪 Sign Out</button>:(
        <div style={{background:'rgba(251,191,36,.07)',borderRadius:11,padding:'.9rem',border:'1px solid rgba(251,191,36,.2)'}}>
          <p style={{color:'#fbbf24',fontWeight:600,marginBottom:'.3rem',fontSize:13}}>Sign out?</p>
          <p style={{color:'rgba(255,220,120,.45)',fontSize:12,marginBottom:'.85rem'}}>Data stays saved.</p>
          <div style={{display:'flex',gap:'.55rem'}}>
            <button className="btn ghost" style={{flex:1,padding:'.6rem'}} onClick={()=>setCL(false)}>Cancel</button>
            <button className="btn" onClick={onLogout} style={{flex:1,padding:'.6rem',borderRadius:11,background:'linear-gradient(135deg,rgba(251,191,36,.65),rgba(251,191,36,.85))',color:'#1a1a1a',fontWeight:700,fontSize:13}}>Sign Out</button>
          </div>
        </div>
      )}
      {!cc?<button className="btn danger" onClick={()=>setCC(true)} style={{textAlign:'left',display:'flex',alignItems:'center',gap:'.5rem'}}>🗑️ Delete All Data</button>:(
        <div style={{background:'rgba(239,68,68,.07)',borderRadius:11,padding:'.9rem',border:'1px solid rgba(239,68,68,.2)'}}>
          <p style={{color:'#f87171',fontWeight:700,marginBottom:'.3rem',fontSize:13}}>⚠️ Permanent — cannot be undone</p>
          <p style={{color:'rgba(255,140,140,.45)',fontSize:12,marginBottom:'.85rem'}}>All data will be deleted forever.</p>
          <div style={{display:'flex',gap:'.55rem'}}>
            <button className="btn ghost" style={{flex:1,padding:'.6rem'}} onClick={()=>setCC(false)}>Cancel</button>
            <button className="btn danger" style={{flex:1,padding:'.6rem'}} onClick={()=>{onClearAll();setCC(false);onClose()}}>Delete All</button>
          </div>
        </div>
      )}
    </div>
  </Modal>);
}

/* ══ ALARM + LOCK ════════════════════════════════════ */
function AlarmOverlay({asgn,cls,onLater,onNow,onShutdown}){
  const d=dU(asgn.dueDate);
  return(<div style={{position:'fixed',inset:0,zIndex:800,background:'rgba(0,0,0,.92)',display:'flex',alignItems:'center',justifyContent:'center',padding:'1.2rem',animation:'fi .25s ease both'}}>
    <div style={{width:'100%',maxWidth:380,background:'linear-gradient(145deg,#1e0808,#2c0f0f)',borderRadius:22,padding:'1.75rem',border:'2px solid #ef4444',boxShadow:'0 0 70px rgba(239,68,68,.28)',animation:'pulse 1.2s ease-in-out infinite',textAlign:'center'}}>
      <div style={{fontSize:50,marginBottom:'.8rem'}}>🚨</div>
      <h2 style={{color:'#f87171',fontSize:21,marginBottom:'.4rem',fontWeight:700}}>Due in {d} Day{d!==1?'s':''}!</h2>
      <div style={{background:'rgba(239,68,68,.12)',borderRadius:12,padding:'.9rem',marginBottom:'1.35rem',border:'1px solid rgba(239,68,68,.2)'}}>
        <div style={{color:'#fff',fontWeight:700,fontSize:15,marginBottom:3}}>{asgn.title}</div>
        <div style={{color:'rgba(255,180,180,.55)',fontSize:13,display:'flex',justifyContent:'center',gap:10,flexWrap:'wrap'}}><span>{cls?.name||'Unknown'}</span><span>·</span><span>{asgn.type}</span><span>·</span><span>{asgn.points}pts</span></div>
        <div style={{color:'#f87171',fontSize:13,marginTop:5,fontWeight:500}}>Due: {fD(asgn.dueDate)}</div>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:'.6rem'}}>
        <button className="btn" onClick={onNow} style={{padding:'.9rem',borderRadius:13,background:'linear-gradient(135deg,rgba(239,68,68,.8),#ef4444)',color:'#fff',fontWeight:700,fontSize:15}}>⚡ Do It Now — Lock App</button>
        <button className="btn ghost" onClick={onLater} style={{padding:'.8rem',borderRadius:13}}>⏰ Remind Me Later</button>
        <button className="btn" onClick={onShutdown} style={{padding:'.65rem',borderRadius:13,background:'transparent',color:'rgba(255,255,255,.3)',fontWeight:600,fontSize:12}}>🔒 Dead Shutdown</button>
      </div>
    </div>
  </div>);
}
function LockScreen({asgn,cls,onUnlock,onOverride,ac,toast}){
  const[showOv,setShowOv]=useState(false);
  return(<div style={{position:'fixed',inset:0,zIndex:700,background:'rgba(0,0,0,.97)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'1.5rem',animation:'fi .25s ease both'}}>
    <div style={{textAlign:'center',maxWidth:340,width:'100%'}}>
      <div style={{fontSize:58,marginBottom:'.9rem'}}>🔒</div>
      <h2 style={{color:'#fff',fontSize:21,fontWeight:700,marginBottom:'.4rem'}}>App Locked</h2>
      <p style={{color:'rgba(255,255,255,.38)',fontSize:14,marginBottom:'1.4rem',lineHeight:1.5}}>Submit your assignment to unlock.</p>
      <div style={{background:'rgba(255,255,255,.07)',borderRadius:16,padding:'1.1rem',marginBottom:'1.6rem',border:'1px solid rgba(255,255,255,.1)'}}>
        <div style={{color:'#fff',fontWeight:700,fontSize:15,marginBottom:3}}>{asgn.title}</div>
        <div style={{color:'rgba(255,255,255,.38)',fontSize:13}}>{cls?.name||'Unknown'} · Due {fD(asgn.dueDate)}</div>
      </div>
      <button className="btn" onClick={()=>{onUnlock();toast('App unlocked — great work!')}} style={{width:'100%',padding:'1rem',borderRadius:13,background:`linear-gradient(135deg,${ac},${ac}bb)`,color:'#fff',fontWeight:700,fontSize:16,marginBottom:'.9rem',boxShadow:`0 6px 26px ${ac}44`}} onMouseOver={e=>e.currentTarget.style.opacity='.85'} onMouseOut={e=>e.currentTarget.style.opacity='1'}>✅ I Submitted — Unlock</button>
      <button className="btn" onClick={()=>setShowOv(true)} style={{color:'rgba(255,255,255,.24)',fontSize:12,padding:'.4rem',background:'transparent'}}>Override with school ID</button>
    </div>
    {showOv&&<PwModal title="Override Lock" hint="Enter your school ID" ac={ac} onConfirm={pw=>{if(onOverride(pw)){toast('Unlocked');return true}return false}} onCancel={()=>setShowOv(false)}/>}
  </div>);
}

/* ══ APP ROOT ════════════════════════════════════════ */
function App(){
  const[authUser,setAuthUser]=useState(null);const[authChecked,setAuthChecked]=useState(false);
  const[showSplash,setShowSplash]=useState(false);
  const[tab,setTab]=useState('school');const[tabFade,setTabFade]=useState(false);
  const[bgIdx,setBgIdx]=useState(0);const[showSettings,setShowSettings]=useState(false);
  const[sView,setSView]=useState('dashboard');
  const[selClass,setSelClass]=useState(null);const[addForClass,setAddForClass]=useState(null);
  const[timeWindow,setTimeWindow]=useState(7);
  const[alarm,setAlarm]=useState(null);const[lockMode,setLockMode]=useState(null);
  const[panicMode,setPanicMode]=useState(false);
  const[sprintAsgn,setSprintAsgn]=useState(undefined);
  const[lockDistr,setLockDistr]=useState(null);
  const[aiAsgn,setAiAsgn]=useState(undefined);
  const[schoolInfo,setSchoolInfo]=useState(null);
  const[classes,setClasses]=useState([]);const[assignments,setAssignments]=useState([]);
  const[tasks,setTasks]=useState([]);const[projects,setProjects]=useState([]);const[goals,setGoals]=useState([]);
  const[parentPw,setParentPw]=useState('parent123');const[streak,setStreak]=useState({count:0,best:0,lastDate:null});
  const{show:toast,TC}=useToast();
  const saveRef=useRef(null);
  const bg=BG[bgIdx];

  useEffect(()=>{
    const sess=getSess();
    if(sess){const a=getAccts();if(a[sess]){loadD(sess);setAuthUser({username:sess,displayName:a[sess].displayName});setShowSplash(true)}}
    setAuthChecked(true);
  },[]);

  const loadD=u=>{
    const d=loadUD(u)||initData();
    setSchoolInfo(d.schoolInfo||null);setClasses(d.classes||[]);setAssignments(d.assignments||[]);
    setTasks(d.tasks||[]);setProjects(d.projects||[]);setGoals(d.goals||[]);
    setParentPw(d.parentPw||'parent123');setBgIdx(d.bgIdx||0);setTimeWindow(d.timeWindow||7);
    setStreak(d.streak||{count:0,best:0,lastDate:null});
  };

  const saveD=useCallback(()=>{
    if(!authUser)return;
    const ns=updateStreak(streak,assignments);
    if(ns.count!==streak.count)setStreak(ns);
    saveUD(authUser.username,{schoolInfo,classes,assignments,tasks,projects,goals,parentPw,bgIdx,timeWindow,streak:ns,savedAt:new Date().toISOString()});
  },[authUser,schoolInfo,classes,assignments,tasks,projects,goals,parentPw,bgIdx,timeWindow,streak]);

  useEffect(()=>{
    if(!authUser)return;
    clearTimeout(saveRef.current);
    saveRef.current=setTimeout(saveD,400);
    return()=>clearTimeout(saveRef.current);
  },[schoolInfo,classes,assignments,tasks,projects,goals,parentPw,bgIdx,timeWindow]);

  useEffect(()=>{
    if(!authUser||!schoolInfo||lockMode||alarm)return;
    const c=()=>{const h=assignments.find(a=>!a.submitted&&dU(a.dueDate)>=0&&dU(a.dueDate)<=3);if(h)setAlarm(h)};
    c();const t=setInterval(c,30000);return()=>clearInterval(t);
  },[assignments,authUser,schoolInfo,lockMode,alarm]);

  const handleAuth=(u,acct)=>{
    setAuthUser({username:u,displayName:acct.displayName});loadD(u);setShowSplash(true);
    setSView('dashboard');setTab('school');setSelClass(null);setAddForClass(null);setAlarm(null);setLockMode(null);setPanicMode(false);
  };
  const handleLogout=()=>{
    saveD();setSess(null);setAuthUser(null);setShowSplash(false);
    setSchoolInfo(null);setClasses([]);setAssignments([]);setTasks([]);setProjects([]);setGoals([]);
    setParentPw('parent123');setBgIdx(0);setTimeWindow(7);setStreak({count:0,best:0,lastDate:null});
    setSView('dashboard');setTab('school');setShowSettings(false);toast('Signed out');
  };
  const clearAll=()=>{
    saveUD(authUser.username,initData());
    setSchoolInfo(null);setClasses([]);setAssignments([]);setTasks([]);setProjects([]);setGoals([]);
    setParentPw('parent123');setBgIdx(0);setTimeWindow(7);setStreak({count:0,best:0,lastDate:null});
    setSView('dashboard');setSelClass(null);setAddForClass(null);setAlarm(null);setLockMode(null);setPanicMode(false);
    toast('All data deleted','warn');
  };
  const switchTab=t=>{if(t===tab)return;setTabFade(true);setTimeout(()=>{setTab(t);setTabFade(false)},220)};

  const sBadge=assignments.filter(a=>!a.submitted&&(dU(a.dueDate)<0||dU(a.dueDate)<=3)).length;
  const hBadge=tasks.filter(t=>!t.completed).length;

  const fabVisible=(tab==='school'&&(sView==='dashboard'||sView==='classes'))||(tab==='home');

  if(!authChecked)return null;
  if(!authUser)return<><AuthScreen onAuth={handleAuth}/><TC/></>;

  const bgCss={height:'100%',display:'flex',flexDirection:'column',background:`linear-gradient(145deg,${bg.c1},${bg.c2},${bg.c3})`,backgroundSize:'400% 400%',animation:'gradShift 12s ease infinite',position:'relative',overflow:'hidden'};

  return(<div style={bgCss}>
    {showSplash&&<Splash bg={bg} onDone={()=>setShowSplash(false)}/>}
    <BgLayer bg={bg}/>

    {/* Sprint Mode */}
    {sprintAsgn!==undefined&&<SprintMode asgn={sprintAsgn} cls={sprintAsgn?classes.find(c=>c.id===sprintAsgn.classId):null} ac={bg.ac}
      onDone={()=>{if(sprintAsgn)setAssignments(p=>p.map(a=>a.id===sprintAsgn.id?{...a,submitted:true}:a));setSprintAsgn(undefined);toast('Sprint done — submitted!')}}
      onExit={()=>setSprintAsgn(undefined)}/>}

    {/* Lock Distractions */}
    {lockDistr!==undefined&&<LockDistractions asgn={lockDistr} onUnlock={()=>setLockDistr(undefined)} ac={bg.ac}/>}

    {/* AI Panel */}
    {aiAsgn!==undefined&&<AIPanel asgn={aiAsgn} cls={aiAsgn?classes.find(c=>c.id===aiAsgn.classId):null} allAsgns={assignments} onClose={()=>setAiAsgn(undefined)} ac={bg.ac}/>}

    {/* Header */}
    <div className="glass sd" style={{position:'relative',zIndex:10,padding:'.78rem 1.15rem',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
      <div style={{display:'flex',alignItems:'center',gap:'.65rem'}}>
        <div style={{width:32,height:32,borderRadius:9,background:`linear-gradient(135deg,${bg.ac},${bg.ac2})`,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
          <span style={{color:'#fff',fontSize:14,fontWeight:900,letterSpacing:'-1px'}}>Σ</span>
        </div>
        <div>
          <div style={{color:'#fff',fontWeight:800,fontSize:16,letterSpacing:'-.4px',lineHeight:1}}>Sigma</div>
          {schoolInfo&&<div style={{color:'rgba(255,255,255,.33)',fontSize:11,marginTop:1}}>{schoolInfo.name} · {schoolInfo.grade}</div>}
        </div>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:'.4rem'}}>
        <div style={{display:'flex',alignItems:'center',gap:3,padding:'3px 7px',borderRadius:20,background:'rgba(74,222,128,.07)',border:'1px solid rgba(74,222,128,.16)'}}>
          <div style={{width:5,height:5,borderRadius:'50%',background:'#4ade80'}}/>
          <span style={{color:'rgba(74,222,128,.65)',fontSize:11}}>Saved</span>
        </div>
        <button className="btn" onClick={()=>setShowSettings(true)} style={{width:34,height:34,borderRadius:9,background:'rgba(255,255,255,.08)',color:'rgba(255,255,255,.68)',fontSize:15,border:'1px solid rgba(255,255,255,.09)'}} onMouseOver={e=>e.currentTarget.style.background='rgba(255,255,255,.15)'} onMouseOut={e=>e.currentTarget.style.background='rgba(255,255,255,.08)'}>⚙️</button>
      </div>
    </div>

    {/* Content */}
    <div style={{flex:1,overflowY:'auto',position:'relative',zIndex:5,opacity:tabFade?0:1,transition:'opacity .2s ease',WebkitOverflowScrolling:'touch'}}>
      {tab==='school'&&<>
        {!schoolInfo&&<SchoolSetup onSave={info=>{setSchoolInfo(info);toast('School profile saved ✓')}} ac={bg.ac}/>}
        {schoolInfo&&sView==='dashboard'&&<Dashboard user={schoolInfo} classes={classes} assignments={assignments} setAssignments={setAssignments} onClasses={()=>setSView('classes')} onAdd={()=>{setAddForClass(null);setSView('addAssignment')}} ac={bg.ac} timeWindow={timeWindow} setTimeWindow={setTimeWindow} toast={toast} streak={streak} panicMode={panicMode} setPanicMode={setPanicMode} onSprint={a=>setSprintAsgn(a)} onAI={(a,m)=>setAiAsgn(a)} onLock={a=>setLockDistr(a)}/>}
        {schoolInfo&&sView==='classes'&&<ClassesView classes={classes} setClasses={setClasses} assignments={assignments} onSelect={c=>{setSelClass(c);setSView('classDetail')}} onBack={()=>setSView('dashboard')} ac={bg.ac} toast={toast}/>}
        {schoolInfo&&sView==='classDetail'&&selClass&&<ClassDetail cls={selClass} assignments={assignments} setAssignments={setAssignments} onBack={()=>setSView('classes')} onAddHere={()=>{setAddForClass(selClass);setSView('addAssignment')}} ac={bg.ac} toast={toast}/>}
        {schoolInfo&&sView==='addAssignment'&&<AddAssignment classes={classes} preClass={addForClass} onAdd={a=>{setAssignments(p=>[...p,a]);setAddForClass(null);setSView('dashboard')}} onBack={()=>{setAddForClass(null);setSView(selClass?'classDetail':'dashboard')}} ac={bg.ac} toast={toast}/>}
      </>}
      {tab==='home'&&<HomeTab tasks={tasks} setTasks={setTasks} projects={projects} setProjects={setProjects} goals={goals} setGoals={setGoals} parentPw={parentPw} setParentPw={setParentPw} ac={bg.ac} toast={toast}/>}
    </div>

    {/* Bottom Nav */}
    <div className="bnav" style={{zIndex:85}}>
      {[['school','🎓','School',sBadge],['home','🏠','Home',hBadge]].map(([t,ic,l,badge])=>(
        <button key={t} className={`bnav-btn${tab===t?' active':''}`} onClick={()=>switchTab(t)} style={{color:tab===t?bg.ac:'rgba(255,255,255,.44)'}}>
          <span>{ic}</span>
          <span style={{fontSize:11,fontWeight:tab===t?700:500,transition:'all .22s'}}>{l}</span>
          {badge>0&&<span style={{position:'absolute',top:6,left:'50%',marginLeft:6,minWidth:16,height:16,borderRadius:8,background:'#ef4444',fontSize:9,fontWeight:800,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',padding:'0 3px'}}>{badge}</span>}
        </button>
      ))}
    </div>

    {/* FAB */}
    <FAB ac={bg.ac} visible={fabVisible}
      onAddAssignment={()=>{setTab('school');if(!schoolInfo){toast('Set up school profile first','warn');return}if(classes.length===0){setSView('classes');return}setSView('addAssignment')}}
      onAddClass={()=>{setTab('school');if(!schoolInfo){toast('Set up school profile first','warn');return}setSView('classes')}}
      onAddTask={()=>setTab('home')}
      onAddProject={()=>setTab('home')}/>

    {/* Alarm */}
    {alarm&&!lockMode&&<AlarmOverlay asgn={alarm} cls={classes.find(c=>c.id===alarm.classId)} onLater={()=>{setAlarm(null);toast('Reminder set')}} onNow={()=>{setLockMode(alarm);setAlarm(null)}} onShutdown={()=>setAlarm(null)}/>}

    {/* Lock */}
    {lockMode&&<LockScreen asgn={lockMode} cls={classes.find(c=>c.id===lockMode.classId)} ac={bg.ac} toast={toast} onUnlock={()=>{setAssignments(p=>p.map(a=>a.id===lockMode.id?{...a,submitted:true}:a));setLockMode(null)}} onOverride={pw=>{if(pw===schoolInfo?.schoolId){setLockMode(null);return true}return false}}/>}

    {/* Settings */}
    {showSettings&&<SettingsPanel bgIdx={bgIdx} setBgIdx={setBgIdx} ac={bg.ac} onClearAll={clearAll} onLogout={handleLogout} onClose={()=>setShowSettings(false)} username={authUser.username} displayName={authUser.displayName} streak={streak}/>}

    <TC/>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
