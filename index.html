<body><div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo}=React;

/* ── Storage helpers ────────────────────────────────── */
const LS={
  get(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null}catch{return null}},
  set(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}},
  del(k){try{localStorage.removeItem(k)}catch{}}
};
const AK='sg_accts_v5';
const SK='sg_sess_v5';
const DK=u=>`sg_data_v5_${u}`;
const getLocalAccts=()=>LS.get(AK)||{};
const saveLocalAccts=a=>LS.set(AK,a);
const loadLocalUD=u=>LS.get(DK(u));
const saveLocalUD=(u,d)=>LS.set(DK(u),d);
const getSess=()=>localStorage.getItem(SK)||null;
const setSess=u=>u?localStorage.setItem(SK,u):localStorage.removeItem(SK);
const hashPw=s=>{let h=0;for(let i=0;i<s.length;i++)h=(Math.imul(31,h)+s.charCodeAt(i))|0;return'h'+Math.abs(h).toString(36)+s.length.toString(36)};
const getFbUrl=()=>{try{return localStorage.getItem('sg_fb_url')||''}catch{return''}};
const saveFbUrl=u=>u?localStorage.setItem('sg_fb_url',u.replace(/\/$/,'')):localStorage.removeItem('sg_fb_url');
const getApiKey=()=>{try{return localStorage.getItem('sg_api_key')||''}catch{return''}};
const saveApiKey=k=>k?localStorage.setItem('sg_api_key',k):localStorage.removeItem('sg_api_key');

/* Firebase CRUD */
async function fbGet(path){
  const url=getFbUrl();if(!url)return null;
  try{const r=await fetch(`${url}/${path}.json`,{signal:AbortSignal.timeout(7000)});if(!r.ok)return null;return r.json()}
  catch{return null}
}
async function fbSet(path,data){
  const url=getFbUrl();if(!url)return false;
  try{const r=await fetch(`${url}/${path}.json`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data),signal:AbortSignal.timeout(7000)});return r.ok}
  catch{return false}
}

/* Cloud layer — tries Firebase first, falls back to localStorage */
const Cloud={
  async getAcct(un){
    const fb=await fbGet(`accounts/${un}`);
    if(fb)return fb;
    return getLocalAccts()[un]||null;
  },
  async createAcct(un,data){
    const existing=await this.getAcct(un);
    if(existing)return{ok:false,msg:'Username already taken — try another one'};
    if(getFbUrl()){const ok=await fbSet(`accounts/${un}`,data);if(!ok)return{ok:false,msg:'Firebase error. Check your DB URL and rules.'}}
    const local=getLocalAccts();local[un]=data;saveLocalAccts(local);
    return{ok:true};
  },
  async loadData(un){
    const fb=await fbGet(`userData/${un}`);
    if(fb){saveLocalUD(un,fb);return fb}
    return loadLocalUD(un);
  },
  async saveData(un,d){
    saveLocalUD(un,d);
    if(getFbUrl())fbSet(`userData/${un}`,d).catch(()=>{});
  }
};

/* ── AI call ────────────────────────────────────────── */
async function callAI(prompt){
  const key=getApiKey();
  if(!key)throw new Error('NO_KEY');
  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:900,messages:[{role:'user',content:prompt}]})
  });
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e?.error?.message||`HTTP ${res.status}`)}
  const d=await res.json();
  return d.content?.[0]?.text||'';
}

/* ── Constants ──────────────────────────────────────── */
const BG=[
  {id:'aurora', name:'Aurora',     c1:'#0f0c29',c2:'#302b63',c3:'#24243e',ac:'#a78bfa',ac2:'#7c3aed',type:'def'},
  {id:'cosmic', name:'🌌 Space',   c1:'#020617',c2:'#0f172a',c3:'#1e1b4b',ac:'#e879f9',ac2:'#a21caf',type:'space'},
  {id:'ocean',  name:'🌊 Ocean',   c1:'#071620',c2:'#0c2f3e',c3:'#0e3d54',ac:'#38bdf8',ac2:'#0284c7',type:'wave'},
  {id:'forest', name:'🌲 Forest',  c1:'#071a0a',c2:'#0d2e10',c3:'#0e3d15',ac:'#4ade80',ac2:'#16a34a',type:'forest'},
  {id:'sakura', name:'🌸 Sakura',  c1:'#1a0a12',c2:'#2d0f20',c3:'#3d1530',ac:'#f9a8d4',ac2:'#ec4899',type:'sakura'},
  {id:'rain',   name:'🌧 Rain',    c1:'#0a0f1a',c2:'#111827',c3:'#1a2540',ac:'#60a5fa',ac2:'#3b82f6',type:'rain'},
  {id:'snow',   name:'❄️ Snow',    c1:'#0d1520',c2:'#132036',c3:'#1a2d4d',ac:'#bfdbfe',ac2:'#93c5fd',type:'snow'},
  {id:'lava',   name:'🌋 Lava',    c1:'#1a0400',c2:'#3d0800',c3:'#5c0f00',ac:'#ff4500',ac2:'#ef4444',type:'lava'},
  {id:'matrix', name:'🖥 Matrix',  c1:'#000800',c2:'#000f00',c3:'#001200',ac:'#00ff41',ac2:'#22c55e',type:'matrix'},
  {id:'neon',   name:'💜 Neon',    c1:'#05001a',c2:'#0d0025',c3:'#120030',ac:'#c084fc',ac2:'#a855f7',type:'neon'},
  {id:'sunset', name:'🌅 Sunset',  c1:'#1c0a00',c2:'#7c2d12',c3:'#92400e',ac:'#fb923c',ac2:'#ea580c',type:'def'},
  {id:'glass',  name:'🧊 Glass',   c1:'#0d1117',c2:'#161b22',c3:'#21262d',ac:'#58a6ff',ac2:'#1f6feb',type:'glass'},
  {id:'cherry', name:'🍒 Cherry',  c1:'#1a0010',c2:'#4a0020',c3:'#7f1d1d',ac:'#fb7185',ac2:'#e11d48',type:'def'},
  {id:'ember',  name:'🔥 Ember',   c1:'#1c1007',c2:'#3d2100',c3:'#5e3300',ac:'#fbbf24',ac2:'#d97706',type:'def'},
  {id:'arctic', name:'🏔 Arctic',  c1:'#030b14',c2:'#071525',c3:'#0a1f36',ac:'#7dd3fc',ac2:'#0ea5e9',type:'arctic'},
  {id:'desert', name:'🏜 Desert',  c1:'#1a1000',c2:'#2d1f00',c3:'#3d2a00',ac:'#fcd34d',ac2:'#f59e0b',type:'desert'},
  {id:'galaxy', name:'🌀 Galaxy',  c1:'#04001a',c2:'#080030',c3:'#0c0045',ac:'#818cf8',ac2:'#6366f1',type:'galaxy'},
  {id:'cyber',  name:'⚡ Cyber',   c1:'#000814',c2:'#001122',c3:'#001833',ac:'#06b6d4',ac2:'#0891b2',type:'cyber'},
  {id:'candy',  name:'🍭 Candy',   c1:'#1a0a1e',c2:'#280f2e',c3:'#30103a',ac:'#f0abfc',ac2:'#e879f9',type:'candy'},
  {id:'volcano',name:'🌋 Volcano', c1:'#0d0000',c2:'#1a0000',c3:'#2a0000',ac:'#f97316',ac2:'#ea580c',type:'volcano'},
];
const CC=['#a78bfa','#38bdf8','#4ade80','#fb923c','#f472b6','#facc15','#34d399','#818cf8','#f87171','#2dd4bf','#c084fc','#67e8f9'];
const ATYPES=['Homework','Quiz','Test','Project','Lab','Essay','Presentation','Other'];
const GRADES=['6th','7th','8th','9th','10th','11th','12th','College Fr.','College So.','College Jr.','College Sr.'];
const SPRINT=25*60;

/* ── Pure helpers ───────────────────────────────────── */
const gid=()=>Math.random().toString(36).slice(2,11);
const dU=ds=>{if(!ds)return 999;const n=new Date();n.setHours(0,0,0,0);const d=new Date(ds+' ');d.setHours(0,0,0,0);return Math.round((d-n)/86400000)};
const fD=ds=>!ds?'':new Date(ds+' ').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
const tp=n=>{const d=new Date();d.setDate(d.getDate()+n);return d.toISOString().slice(0,10)};
const fmtSec=s=>`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
const clamp=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));
const todayStr=()=>new Date().toISOString().slice(0,10);

const initData=()=>({schoolInfo:null,classes:[],assignments:[],gradeData:{},tasks:[],projects:[],goals:[],extras:[],habits:[],parentPw:'parent123',bgIdx:0,timeWindow:7,streak:{count:0,best:0,lastDate:null}});

/* Grade calc (Grade Melon-style) */
function getLetter(p){if(p===null||p===undefined)return'—';if(p>=90)return'A';if(p>=80)return'B';if(p>=70)return'C';if(p>=60)return'D';return'F'}
function getGC(p){if(p===null||p===undefined)return'rgba(255,255,255,.35)';if(p>=90)return'#4ade80';if(p>=80)return'#38bdf8';if(p>=70)return'#facc15';if(p>=60)return'#fb923c';return'#ef4444'}
function calcGrade(items,weights){
  const w={PP:Number(weights?.PP)||10,AT:Number(weights?.AT)||90,SA:Number(weights?.SA)||0};
  const cats={PP:{e:0,p:0},AT:{e:0,p:0},SA:{e:0,p:0}};
  (items||[]).forEach(it=>{const c=cats[it.category];if(c){c.e+=Number(it.earned)||0;c.p+=Number(it.possible)||1}});
  const pcts={PP:cats.PP.p>0?cats.PP.e/cats.PP.p*100:null,AT:cats.AT.p>0?cats.AT.e/cats.AT.p*100:null,SA:cats.SA.p>0?cats.SA.e/cats.SA.p*100:null};
  let ws=0,wt=0;
  ['PP','AT','SA'].forEach(c=>{if(w[c]>0&&pcts[c]!==null){ws+=pcts[c]*(w[c]/100);wt+=w[c]/100}});
  return{overall:wt>0?ws/wt:null,cats,pcts,weights:w};
}
function whatIfCalc(items,weights,cat,earned,possible){
  return calcGrade([...(items||[]),{category:cat,earned:Number(earned)||0,possible:Number(possible)||1}],weights);
}
function neededCalc(items,weights,cat,possible,target){
  const pts=Number(possible)||100;
  const check=e=>whatIfCalc(items,weights,cat,e,pts).overall;
  if(check(pts)<Number(target))return null;
  let lo=0,hi=pts;
  for(let i=0;i<60;i++){const m=(lo+hi)/2;if(check(m)<Number(target))lo=m;else hi=m}
  return Math.min(Math.ceil(hi),pts);
}

/* Score & streak */
function scoreA(a){const d=dU(a.dueDate);return(d<0?200:d===0?100:d===1?65:d===2?42:d<=3?26:d<=7?12:4)+(Math.min((Number(a.points)||0)/10,18))+(a.type==='Test'?10:a.type==='Project'?7:a.type==='Quiz'?3:0)+(a.priority==='High'?14:a.priority==='Low'?-5:0)}
function topPri(asgns,n){return[...asgns.filter(a=>!a.submitted)].sort((a,b)=>scoreA(b)-scoreA(a)).slice(0,n||4)}
function updateStreak(streak,asgns){
  const today=todayStr();
  if((streak||{}).lastDate===today)return streak||{count:0,best:0,lastDate:today};
  const miss=asgns.filter(a=>!a.submitted&&dU(a.dueDate)<0).length;
  const yest=new Date();yest.setDate(yest.getDate()-1);
  const ys=yest.toISOString().slice(0,10);
  const prev=streak||{count:0,best:0};
  const nc=miss>0?0:(prev.lastDate===ys?(prev.count||0)+1:0);
  return{count:nc,best:Math.max(nc,prev.best||0),lastDate:today};
}

/* ── Backgrounds ────────────────────────────────────── */
function DefBg({ac}){
  const blobs=useRef(Array.from({length:10},(_,i)=>({id:i,w:Math.random()*78+22,x:Math.random()*100,y:Math.random()*100,dur:Math.random()*10+5,del:Math.random()*-14,t:i%3}))).current;
  const stars=useRef(Array.from({length:46},(_,i)=>({id:i,x:Math.random()*100,y:Math.random()*100,dur:Math.random()*4+2,del:Math.random()*-9}))).current;
  return(
    <div style={{position:'fixed',inset:0,pointerEvents:'none',overflow:'hidden',zIndex:0}}>

/* ── Toast ──────────────────────────────────────────── */
function Toast({msg,type,onDone}){
  const[out,setOut]=useState(false);
  useEffect(()=>{const t=setTimeout(()=>{setOut(true);setTimeout(onDone,320)},2600);return()=>clearTimeout(t)},[]);
  const col=type==='error'?'#ef4444':type==='warn'?'#f59e0b':type==='info'?'#38bdf8':'#4ade80';
  return(
    <div style={{position:'fixed',bottom:'5.5rem',left:'50%',transform:'translateX(-50%)',zIndex:9999,animation:out?'toastOut .32s ease both':'toastIn .32s ease both',pointerEvents:'none'}}>
      <div style={{display:'flex',alignItems:'center',gap:9,padding:'.6rem 1.1rem',borderRadius:40,background:'rgba(12,10,24,.97)',border:`1px solid ${col}33`,backdropFilter:'blur(22px)',whiteSpace:'nowrap'}}>
        <span style={{width:18,height:18,borderRadius:'50%',background:`${col}1e`,color:col,fontSize:10,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:800,flexShrink:0}}>{type==='error'?'✕':type==='warn'?'!':type==='info'?'i':'✓'}</span>
        <span style={{color:'#fff',fontSize:14,fontWeight:500}}>{msg}</span>
      </div>
    </div>
  );
}
function useToast(){
  const[ts,setTs]=useState([]);
  const show=(msg,type='success')=>setTs(p=>[...p.slice(-2),{id:gid(),msg,type}]);
  const rm=id=>setTs(p=>p.filter(t=>t.id!==id));
  const TC=()=>React.createElement(React.Fragment,null,...ts.map(t=>React.createElement(Toast,{key:t.id,...t,onDone:()=>rm(t.id)})));
  return{show,TC};
}

/* ── Ring progress ──────────────────────────────────── */
function Ring({pct,size=64,sw=5,color}){
  const r=(size-sw*2)/2,circ=2*Math.PI*r;

  return(

        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,.08)" strokeWidth={sw}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={sw} strokeDasharray={`${circ*p2/100} ${circ}`} strokeLinecap="round" style={{transition:'stroke-dasharray .65s cubic-bezier(.22,.61,.36,1)'}}/>
      </svg>
      <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center'}}>

}

/* ── GestureCard ────────────────────────────────────── */
function GestureCard({children,onSwipeRight,onSwipeLeft,onLongPress,style}){
  const tx=useRef(0),timer=useRef(null);
  const[off,setOff]=useState(0);const[cls2,setCls2]=useState('');const[hint,setHint]=useState('');
  const ts=e=>{tx.current=e.touches[0].clientX;timer.current=setTimeout(()=>{setOff(0);onLongPress&&onLongPress()},620)};
  const tm=e=>{clearTimeout(timer.current);const dx=e.touches[0].clientX-tx.current;setOff(dx);setHint(dx>30?'r':dx<-30?'l':'')};
  const te=()=>{
    clearTimeout(timer.current);
    if(off>80){setCls2('swr');setTimeout(()=>{onSwipeRight&&onSwipeRight();setCls2('');setOff(0)},340)}
    else if(off<-80){setCls2('swl');setTimeout(()=>{onSwipeLeft&&onSwipeLeft();setCls2('');setOff(0)},340)}
    else setOff(0);
    setHint('');
  };
  const animStyle=cls2==='swr'?{animation:'swR .36s ease both'}:cls2==='swl'?{animation:'swL .36s ease both'}:{transform:`translateX(${Math.sign(off)*Math.min(Math.abs(off)*.68,78)}px)`,transition:off!==0?'none':'.2s ease'};
  return(
    <div className={hint==='r'?'sw-r':hint==='l'?'sw-l':''} style={{...style,...animStyle,position:'relative',overflow:'hidden'}} onTouchStart={ts} onTouchMove={tm} onTouchEnd={te}>
      {hint==='r'&&<div style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',fontSize:16,opacity:.65,zIndex:1}}>✓</div>}
      {hint==='l'&&<div style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',fontSize:16,opacity:.65,zIndex:1}}>⏭</div>}
      {children}
    </div>
  );
}

function AuthScreen({onAuth}){
  const[mode,setMode]=useState('login');const[loading,setLoading]=useState(false);
  const[f,setF]=useState({u:'',p:'',c:'',dn:''});const[errs,setErrs]=useState({});
  const set=k=>v=>setF(p=>({...p,[k]:v}));const clr=k=>setErrs(p=>({...p,[k]:''}));
  const bg=BG[0];const isCloud=!!getFbUrl();

  const submit=async()=>{
    const e={};
    if(!f.u.trim())e.u='Required';
    else if(f.u.trim().length<3)e.u='Min 3 characters';
    else if(!/^[a-zA-Z0-9_]+$/.test(f.u.trim()))e.u='Letters, numbers, underscore only';
    if(mode==='register'&&!f.dn.trim())e.dn='Required';
    if(!f.p)e.p='Required';
    else if(mode==='register'&&f.p.length<6)e.p='Min 6 characters';
    if(mode==='register'&&f.p!==f.c)e.c='Passwords do not match';
    if(Object.keys(e).length){setErrs(e);return}
    const un=f.u.trim().toLowerCase();
    setLoading(true);
    try{
      if(mode==='login'){
        const acct=await Cloud.getAcct(un);
        if(!acct){setErrs({u:'No account found with that username'});setLoading(false);return}
        if(acct.pwHash!==hashPw(f.p)){setErrs({p:'Incorrect password'});setLoading(false);return}
        setSess(un);
        const data=await Cloud.loadData(un);
        onAuth(un,acct,data||initData());
      }else{
        const acctData={pwHash:hashPw(f.p),displayName:f.dn.trim(),createdAt:new Date().toISOString()};
        const res=await Cloud.createAcct(un,acctData);
        if(!res.ok){setErrs({u:res.msg});setLoading(false);return}
        const data=initData();
        await Cloud.saveData(un,data);
        setSess(un);
        onAuth(un,acctData,data);

      {errs[k]&&<p style={{color:'#f87171',fontSize:12,marginTop:3}}>✕ {errs[k]}</p>}

        <div className="sc" style={{textAlign:'center',marginBottom:'1.75rem'}}>
          <div style={{width:76,height:76,borderRadius:22,background:`linear-gradient(135deg,${bg.ac},${bg.ac2})`,margin:'0 auto .9rem',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:`0 0 56px ${bg.ac}44`}}>

          </div>
          <h1 style={{color:'#fff',fontSize:26,fontWeight:800,letterSpacing:'-.5px'}}>Sigma</h1>
          <p style={{color:'rgba(255,255,255,.38)',fontSize:13,marginTop:3}}>The tracker that thinks for you</p>
        </div>
        {!isCloud&&(

      <input className="inp" style={{marginBottom:'1rem'}} placeholder="Your full name" value={f.name} onChange={e=>set('name')(e.target.value)}/>
      <label style={lbl}>School Email <span style={{color:'rgba(255,255,255,.28)',fontWeight:400}}>(optional)</span></label>
      <input className="inp" type="email" style={{marginBottom:'1rem'}} placeholder="student@school.edu" value={f.email||''} onChange={e=>set('email')(e.target.value)}/>
      <label style={lbl}>School ID * <span style={{color:'rgba(255,255,255,.28)',fontWeight:400}}>(used to override app lock)</span></label>
      <input className="inp" style={{marginBottom:'1rem'}} placeholder="e.g. STU12345" value={f.schoolId} onChange={e=>set('schoolId')(e.target.value)}/>
      <label style={lbl}>Grade *</label>
      <select className="inp" style={{marginBottom:'1.5rem'}} value={f.grade} onChange={e=>set('grade')(e.target.value)}>
        <option value="">Select grade…</option>
        {GRADES.map(g=><option key={g} value={g}>{g} Grade</option>)}
      </select>
      <button className="btn" disabled={!valid} onClick={()=>valid&&onSave(f)} style={{width:'100%',padding:'1rem',borderRadius:13,fontSize:16,fontWeight:700,background:valid?`linear-gradient(135deg,${ac},${ac}bb)`:'rgba(255,255,255,.08)',color:valid?'#fff':'rgba(255,255,255,.22)',boxShadow:valid?`0 5px 22px ${ac}44`:'none',transition:'all .28s'}}>
        {existing?'Save Changes':'Continue →'}
      </button>
    </div>
  );
}

/* ── Grade Calculator ───────────────────────────────── */
function GradeCalc({cls,gradeData,setGradeData,ac}){
  const gd=gradeData[cls.id]||{weights:{PP:10,AT:90,SA:0},items:[]};
  const items=gd.items||[];
  const weights=gd.weights||{PP:10,AT:90,SA:0};

  const setItems=fn=>setGradeData(prev=>{
    const old=prev[cls.id]||{weights:{PP:10,AT:90,SA:0},items:[]};
    return{...prev,[cls.id]:{...old,items:typeof fn==='function'?fn(old.items||[]):fn}};
  });
  const setWeights=w=>setGradeData(prev=>{
    const old=prev[cls.id]||{weights:{PP:10,AT:90,SA:0},items:[]};
    return{...prev,[cls.id]:{...old,weights:w}};
  });

  const[subTab,setSubTab]=useState('grades');
  const[addModal,setAddModal]=useState(false);
  const[pasteModal,setPasteModal]=useState(false);
  const[form,setForm]=useState({title:'',category:'AT',earned:'',possible:'100'});
  const[pasteText,setPasteText]=useState('');
  const[pasteErr,setPasteErr]=useState('');
  const[wi,setWi]=useState({cat:'AT',pts:'100',scored:'',target:'90'});

  const result=calcGrade(items,weights);
  const overall=result.overall;
  const gc=getGC(overall);

  const catLbls={PP:'PP — Practice Prep',AT:'AT — All Tasks',SA:'SA — Summative / District'};
  const catStats=cat=>{const its=items.filter(i=>i.category===cat);const e=its.reduce((s,i)=>s+(Number(i.earned)||0),0);const p=its.reduce((s,i)=>s+(Number(i.possible)||0),0);return{count:its.length,earned:e,possible:p,pct:p>0?e/p*100:null}};

  const addGrade=()=>{
    if(!form.title.trim()||form.earned===''||!form.possible)return;
    setItems(prev=>[...prev,{id:gid(),title:form.title.trim(),category:form.category,earned:Number(form.earned),possible:Number(form.possible),createdAt:new Date().toISOString()}]);
    setForm({title:'',category:'AT',earned:'',possible:'100'});
    setAddModal(false);
  };

  const parsePaste=()=>{
    setPasteErr('');
    const lines=pasteText.trim().split('\n').filter(l=>l.trim());
    const parsed=[];const bad=[];
    lines.forEach((line,idx)=>{
      const parts=line.split(',').map(s=>s.trim());
      if(parts.length<3){bad.push(`Line ${idx+1}: needs Name, Category, Earned, Possible (or Earned/Possible)`);return}
      const[title,cat]=parts;
      const category=['PP','AT','SA'].includes((cat||'').toUpperCase())?(cat||'').toUpperCase():'AT';
      let earned,possible;
      if(parts[2]&&parts[2].includes('/')){const sp=parts[2].split('/');earned=Number(sp[0]);possible=Number(sp[1])}
      else{earned=Number(parts[2]);possible=Number(parts[3]||100)}
      if(isNaN(earned)||isNaN(possible)||possible<=0){bad.push(`Line ${idx+1}: invalid numbers`);return}
      parsed.push({id:gid(),title:title||`Item ${idx+1}`,category,earned,possible,createdAt:new Date().toISOString()});
    });
    if(bad.length){setPasteErr(bad.slice(0,4).join('\n')+(bad.length>4?`\n…and ${bad.length-4} more`:''));return}
    if(!parsed.length){setPasteErr('No valid rows found');return}
    setItems(prev=>[...prev,...parsed]);
    setPasteText('');setPasteModal(false);
  };

  /* Weights: keep sum=100 using proportional redistribution */
  const adjustWeight=(cat,newVal)=>{
    const v=clamp(Number(newVal)||0,0,100);
    const others=Object.keys(weights).filter(k=>k!==cat);
    const otherSum=others.reduce((s,k)=>s+(weights[k]||0),0);
    const remaining=100-v;
    const newW={...weights,[cat]:v};
    if(otherSum>0){
      others.forEach(k=>{newW[k]=Math.round((weights[k]||0)/otherSum*remaining)});
      // fix rounding
      const diff=100-Object.values(newW).reduce((s,x)=>s+x,0);
      if(diff!==0){const last=others[others.length-1];newW[last]=(newW[last]||0)+diff}
    }else{
      const each=Math.floor(remaining/others.length);
      others.forEach((k,i)=>{newW[k]=i===others.length-1?remaining-each*(others.length-1):each});
    }
    setWeights(newW);
  };

  const wSum=(weights.PP||0)+(weights.AT||0)+(weights.SA||0);

  /* What-if results */
  const wiResult=(wi.scored!==''&&wi.pts)?whatIfCalc(items,weights,wi.cat,Number(wi.scored),Number(wi.pts)):null;
  const wiNeeded=(wi.pts&&wi.target)?neededCalc(items,weights,wi.cat,Number(wi.pts),Number(wi.target)):null;

  return(
    <div className="fi">
      {/* Overall card */}
      <div style={{background:'rgba(255,255,255,.07)',borderRadius:18,padding:'1.25rem',marginBottom:'1rem',border:'1px solid rgba(255,255,255,.1)',textAlign:'center'}}>
        {overall===null?(
          <div style={{color:'rgba(255,255,255,.38)',fontSize:15,padding:'.5rem 0'}}>No grades entered yet</div>
        ):(
          <>
            <div style={{fontSize:44,fontWeight:900,color:gc,lineHeight:1,letterSpacing:'-1px'}}>{overall.toFixed(1)}%</div>
            <div style={{fontSize:26,fontWeight:800,color:gc,marginTop:'.25rem',letterSpacing:'-.5px'}}>{getLetter(overall)}</div>
            <div style={{color:'rgba(255,255,255,.32)',fontSize:12,marginTop:'.4rem'}}>{items.length} grade{items.length!==1?'s':''} · {cls.name}</div>
            <div style={{background:'rgba(255,255,255,.07)',borderRadius:20,height:7,overflow:'hidden',marginTop:'.75rem'}}>
              <div style={{width:`${clamp(overall,0,100)}%`,height:'100%',background:`linear-gradient(90deg,${gc},${gc}99)`,borderRadius:20,transition:'width .7s cubic-bezier(.22,.61,.36,1)',animation:'progIn .8s ease both'}}/>
            </div>
          </>
        )}
      </div>

      {/* Category cards */}
      {['PP','AT','SA'].filter(cat=>(weights[cat]||0)>0||catStats(cat).count>0).map(cat=>{
        const s=catStats(cat);const gc2=getGC(s.pct);
        return(
          <div key={cat} style={{background:'rgba(255,255,255,.055)',borderRadius:14,padding:'.82rem',marginBottom:'.5rem',border:'1px solid rgba(255,255,255,.07)',display:'flex',alignItems:'center',gap:'.72rem'}}>
            <Ring pct={s.pct!==null?Math.round(s.pct):0} size={52} sw={4} color={s.pct!==null?gc2:'rgba(255,255,255,.18)'}/>
            <div style={{flex:1}}>
              <div style={{color:'#fff',fontWeight:700,fontSize:13}}>{catLbls[cat]}</div>
              <div style={{color:'rgba(255,255,255,.38)',fontSize:12,marginTop:2}}>
                Weight: <span style={{color:ac,fontWeight:700}}>{weights[cat]||0}%</span>
                {s.count>0&&<> · {s.earned}/{s.possible} pts · {s.count} item{s.count!==1?'s':''}</>}
                {s.count===0&&<span style={{color:'rgba(255,255,255,.26)'}}> · No grades yet</span>}
              </div>
            </div>
            {s.pct!==null&&<div style={{textAlign:'right',flexShrink:0}}>
              <div style={{color:gc2,fontWeight:800,fontSize:15}}>{s.pct.toFixed(1)}%</div>
              <div style={{color:'rgba(255,255,255,.36)',fontSize:11}}>{getLetter(s.pct)}</div>
            </div>}
          </div>
        );
      })}

      {/* Sub-tabs */}
      <div className="tabs" style={{marginTop:'.75rem'}}>
        {[['grades','Grades'],['whatif','What-If?'],['weights','Weights']].map(([k,l])=>(
          <button key={k} className="tab-btn btn" onClick={()=>setSubTab(k)} style={{background:subTab===k?`linear-gradient(135deg,${ac}dd,${ac})`:'rgba(255,255,255,.07)',color:subTab===k?'#fff':'rgba(255,255,255,.44)',transition:'all .24s'}}>{l}</button>
        ))}
      </div>

      {/* GRADES tab */}
      {subTab==='grades'&&(
        <div key="g" className="sl">
          {items.length===0&&(
            <div style={{textAlign:'center',padding:'2rem 1rem',color:'rgba(255,255,255,.3)'}}>
              <div style={{fontSize:38,marginBottom:'.45rem'}}>📊</div>
              <p style={{color:'rgba(255,255,255,.38)',fontSize:14}}>No grades yet</p>
              <p style={{color:'rgba(255,255,255,.22)',fontSize:12,marginTop:'.3rem'}}>Paste: Name, PP/AT/SA, Earned, Possible</p>
            </div>
          )}
          {items.map((it,i)=>{
            const pct=Number(it.possible)>0?Number(it.earned)/Number(it.possible)*100:0;
            const gc3=getGC(pct);
            return(
              <div key={it.id} className="su lift" style={{animationDelay:`${i*.045}s`,background:'rgba(255,255,255,.055)',borderRadius:12,padding:'.8rem',marginBottom:'.46rem',border:'1px solid rgba(255,255,255,.07)',display:'flex',alignItems:'center',gap:'.62rem'}}>
                <div style={{width:8,height:36,borderRadius:4,background:it.category==='PP'?ac:it.category==='AT'?cls.color:'#e879f9',flexShrink:0}}/>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{color:'#fff',fontWeight:600,fontSize:14,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{it.title}</div>
                  <div style={{color:'rgba(255,255,255,.36)',fontSize:12,marginTop:1}}>
                    <span style={{background:'rgba(255,255,255,.08)',padding:'1px 7px',borderRadius:10,fontSize:11,marginRight:6}}>{it.category}</span>
                    {it.earned}/{it.possible} pts
                  </div>
                </div>
                <div style={{textAlign:'right',flexShrink:0}}>
                  <div style={{color:gc3,fontWeight:700,fontSize:14}}>{pct.toFixed(1)}%</div>
                  <div style={{color:'rgba(255,255,255,.36)',fontSize:11}}>{getLetter(pct)}</div>
                </div>
                <button className="btn" onClick={()=>setItems(prev=>prev.filter(x=>x.id!==it.id))} style={{width:26,height:26,borderRadius:7,background:'rgba(239,68,68,.1)',color:'#f87171',fontSize:12,flexShrink:0}} onMouseOver={e=>e.currentTarget.style.background='rgba(239,68,68,.24)'} onMouseOut={e=>e.currentTarget.style.background='rgba(239,68,68,.1)'}>✕</button>
              </div>
            );
          })}
          <div style={{display:'flex',gap:'.48rem',marginTop:'.6rem'}}>
            <button className="btn" onClick={()=>setAddModal(true)} style={{flex:1,padding:'.76rem',borderRadius:13,background:`linear-gradient(135deg,${ac}dd,${ac})`,color:'#fff',fontWeight:700,boxShadow:`0 4px 16px ${ac}44`}}>+ Add Grade</button>
            <button className="btn ghost" onClick={()=>setPasteModal(true)} style={{flex:1,padding:'.76rem',borderRadius:13,fontSize:13}}>📋 Paste Many</button>
          </div>
        </div>
      )}

      {/* WHAT-IF tab */}
      {subTab==='whatif'&&(
        <div key="wi" className="sl">
          <div style={{background:'rgba(255,255,255,.055)',borderRadius:14,padding:'1rem',marginBottom:'.7rem',border:'1px solid rgba(255,255,255,.08)'}}>
            <p style={{color:'rgba(200,200,220,.6)',fontSize:12,fontWeight:600,marginBottom:'.7rem'}}>PREVIEW: IF I GET…</p>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'.42rem',marginBottom:'.7rem'}}>
              <div>
                <label style={{display:'block',color:'rgba(200,200,220,.5)',fontSize:11,marginBottom:3}}>Category</label>
                <select className="inp" style={{padding:'.52rem .55rem',fontSize:13}} value={wi.cat} onChange={e=>setWi(p=>({...p,cat:e.target.value}))}>
                  {['PP','AT','SA'].map(c=><option key={c} value={c}>{c}</option>)}
                </select>
              </div>
              <div>
                <label style={{display:'block',color:'rgba(200,200,220,.5)',fontSize:11,marginBottom:3}}>I score</label>
                <input className="inp" type="number" style={{padding:'.52rem .55rem',fontSize:13}} placeholder="85" value={wi.scored} onChange={e=>setWi(p=>({...p,scored:e.target.value}))}/>
              </div>
              <div>
                <label style={{display:'block',color:'rgba(200,200,220,.5)',fontSize:11,marginBottom:3}}>Out of</label>
                <input className="inp" type="number" style={{padding:'.52rem .55rem',fontSize:13}} placeholder="100" value={wi.pts} onChange={e=>setWi(p=>({...p,pts:e.target.value}))}/>
              </div>
            </div>
            {wi.scored!==''&&wi.pts&&wiResult&&wiResult.overall!==null&&(()=>{
              const gc4=getGC(wiResult.overall);
              return(
                <div style={{background:'rgba(255,255,255,.06)',borderRadius:11,padding:'.72rem',textAlign:'center',border:`1px solid ${gc4}28`}}>
                  <div style={{color:'rgba(255,255,255,.45)',fontSize:12,marginBottom:4}}>If you score {wi.scored}/{wi.pts} on a {wi.cat}:</div>
                  <div style={{fontSize:24,fontWeight:800,color:gc4}}>{wiResult.overall.toFixed(1)}% — {getLetter(wiResult.overall)}</div>
                  {overall!==null&&<div style={{color:'rgba(255,255,255,.36)',fontSize:12,marginTop:3}}>{wiResult.overall>overall?`+${(wiResult.overall-overall).toFixed(1)}%`:`${(wiResult.overall-overall).toFixed(1)}%`} change</div>}
                </div>
              );
            })()}
          </div>

          <div style={{background:'rgba(255,255,255,.055)',borderRadius:14,padding:'1rem',border:'1px solid rgba(255,255,255,.08)'}}>
            <p style={{color:'rgba(200,200,220,.6)',fontSize:12,fontWeight:600,marginBottom:'.7rem'}}>WHAT SCORE DO I NEED?</p>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'.42rem',marginBottom:'.7rem'}}>
              <div>
                <label style={{display:'block',color:'rgba(200,200,220,.5)',fontSize:11,marginBottom:3}}>Category</label>
                <select className="inp" style={{padding:'.52rem .55rem',fontSize:13}} value={wi.cat} onChange={e=>setWi(p=>({...p,cat:e.target.value}))}>
                  {['PP','AT','SA'].map(c=><option key={c} value={c}>{c}</option>)}
                </select>
              </div>
              <div>
                <label style={{display:'block',color:'rgba(200,200,220,.5)',fontSize:11,marginBottom:3}}>Total pts</label>
                <input className="inp" type="number" style={{padding:'.52rem .55rem',fontSize:13}} placeholder="100" value={wi.pts} onChange={e=>setWi(p=>({...p,pts:e.target.value}))}/>
              </div>
              <div>
                <label style={{display:'block',color:'rgba(200,200,220,.5)',fontSize:11,marginBottom:3}}>Target %</label>
                <input className="inp" type="number" style={{padding:'.52rem .55rem',fontSize:13}} placeholder="90" value={wi.target} onChange={e=>setWi(p=>({...p,target:e.target.value}))}/>
              </div>
            </div>
            {wi.pts&&wi.target&&(()=>{
              const n=wiNeeded;const col=n===null?'#ef4444':getGC(n/Number(wi.pts)*100);
              return(
                <div style={{background:'rgba(255,255,255,.06)',borderRadius:11,padding:'.72rem',textAlign:'center',border:`1px solid ${col}28`}}>
                  {n===null?(
                    <><div style={{color:'#f87171',fontSize:15,fontWeight:700}}>Not achievable</div><div style={{color:'rgba(255,255,255,.36)',fontSize:12,marginTop:3}}>Even perfect score won't reach {wi.target}%</div></>
                  ):(
                    <><div style={{color:'rgba(255,255,255,.45)',fontSize:12,marginBottom:4}}>To reach {wi.target}% on a {wi.pts}-pt {wi.cat}:</div>
                    <div style={{fontSize:24,fontWeight:800,color:col}}>{n}/{wi.pts} pts</div>
                    <div style={{color:'rgba(255,255,255,.36)',fontSize:12,marginTop:3}}>({(n/Number(wi.pts)*100).toFixed(1)}%)</div></>
                  )}
                </div>
              );
            })()}
          </div>
        </div>
      )}

      {/* WEIGHTS tab */}
      {subTab==='weights'&&(
        <div key="wt" className="sl">
          <div style={{background:'rgba(255,255,255,.055)',borderRadius:14,padding:'1rem',border:'1px solid rgba(255,255,255,.08)'}}>
            <p style={{color:'rgba(200,200,220,.52)',fontSize:12,lineHeight:1.6,marginBottom:'1rem'}}>Set category weights. They must add up to 100. Setting SA to 0 disables it.</p>
            {['PP','AT','SA'].map(cat=>(
              <div key={cat} style={{marginBottom:'1rem'}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                  <label style={{color:'rgba(200,200,220,.7)',fontSize:13,fontWeight:600}}>{catLbls[cat]}</label>
                  <span style={{color:ac,fontWeight:700,fontSize:14}}>{weights[cat]||0}%</span>
                </div>
                <input type="range" min={0} max={100} step={1} value={weights[cat]||0} onChange={e=>adjustWeight(cat,e.target.value)} style={{width:'100%',accentColor:ac,cursor:'pointer'}}/>
              </div>
            ))}
            <div style={{display:'flex',justifyContent:'space-between',paddingTop:'.72rem',borderTop:'1px solid rgba(255,255,255,.07)'}}>
              <span style={{color:'rgba(255,255,255,.48)',fontSize:13}}>Total</span>
              <span style={{color:wSum===100?'#4ade80':'#ef4444',fontWeight:700,fontSize:14}}>{wSum}% {wSum!==100&&'(must be 100)'}</span>
            </div>
          </div>
        </div>
      )}

      {/* Add grade modal */}
      {addModal&&(
        <Modal onClose={()=>setAddModal(false)} sheet>
          <h3 style={{color:'#fff',marginBottom:'1.1rem',fontSize:17}}>Add Grade</h3>
          <label style={{display:'block',color:'rgba(200,200,220,.6)',fontSize:12,fontWeight:600,marginBottom:4}}>Assignment / Item Name *</label>
          <input className="inp" style={{marginBottom:'1rem'}} placeholder="e.g. Chapter 5 Quiz, Lab Report…" value={form.title} onChange={e=>setForm(p=>({...p,title:e.target.value}))} autoFocus/>
          <label style={{display:'block',color:'rgba(200,200,220,.6)',fontSize:12,fontWeight:600,marginBottom:6}}>Category</label>
          <div style={{display:'flex',gap:'.4rem',marginBottom:'1rem'}}>
            {['PP','AT','SA'].map(c=>(
              <button key={c} className="btn" onClick={()=>setForm(p=>({...p,category:c}))} style={{flex:1,padding:'.58rem',borderRadius:11,fontWeight:700,fontSize:14,background:form.category===c?`${ac}28`:'rgba(255,255,255,.07)',color:form.category===c?ac:'rgba(255,255,255,.52)',border:`1.5px solid ${form.category===c?ac+'55':'transparent'}`,transition:'all .18s'}}>{c}</button>
            ))}
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'.62rem',marginBottom:'1rem'}}>
            <div>
              <label style={{display:'block',color:'rgba(200,200,220,.6)',fontSize:12,fontWeight:600,marginBottom:4}}>Points Earned *</label>
              <input className="inp" type="number" min={0} placeholder="85" value={form.earned} onChange={e=>setForm(p=>({...p,earned:e.target.value}))}/>
            </div>
            <div>
              <label style={{display:'block',color:'rgba(200,200,220,.6)',fontSize:12,fontWeight:600,marginBottom:4}}>Points Possible *</label>
              <input className="inp" type="number" min={1} placeholder="100" value={form.possible} onChange={e=>setForm(p=>({...p,possible:e.target.value}))}/>
            </div>
          </div>
          {form.earned!==''&&form.possible&&Number(form.possible)>0&&(
            <div style={{background:'rgba(255,255,255,.06)',borderRadius:10,padding:'.62rem',marginBottom:'1rem',textAlign:'center',border:'1px solid rgba(255,255,255,.07)'}}>
              <span style={{color:getGC(Number(form.earned)/Number(form.possible)*100),fontWeight:700,fontSize:15}}>{(Number(form.earned)/Number(form.possible)*100).toFixed(1)}% — {getLetter(Number(form.earned)/Number(form.possible)*100)}</span>
            </div>
          )}
          <div style={{display:'flex',gap:'.62rem'}}>
            <button className="btn ghost" style={{flex:1}} onClick={()=>setAddModal(false)}>Cancel</button>
            <button className="btn" disabled={!form.title.trim()||form.earned===''||!form.possible} onClick={addGrade} style={{flex:2,padding:'.8rem',borderRadius:12,background:`linear-gradient(135deg,${ac}dd,${ac})`,color:'#fff',fontWeight:700,opacity:(form.title.trim()&&form.earned!==''&&form.possible)?1:.4}}>Add Grade</button>
          </div>
        </Modal>
      )}

      {/* Paste modal */}
      {pasteModal&&(
        <Modal onClose={()=>setPasteModal(false)} sheet>
          <h3 style={{color:'#fff',marginBottom:'.5rem',fontSize:17}}>📋 Paste Multiple Grades</h3>
          <p style={{color:'rgba(200,200,220,.5)',fontSize:13,marginBottom:'1rem',lineHeight:1.55}}>
            One grade per line. Format:<br/>
            <code style={{color:ac,fontSize:12}}>Name, Category, Earned, Possible</code><br/>
            <span style={{color:'rgba(255,255,255,.42)',fontSize:12}}>Category: PP / AT / SA</span><br/>
            <span style={{color:'rgba(255,255,255,.42)',fontSize:12}}>Example: <code style={{color:'rgba(255,255,255,.6)'}}>Chapter 5 Quiz, AT, 85, 100</code></span><br/>
            <span style={{color:'rgba(255,255,255,.42)',fontSize:12}}>Or fraction: <code style={{color:'rgba(255,255,255,.6)'}}>Chapter 5 Quiz, AT, 85/100</code></span>

/* ── Dashboard ──────────────────────────────────────── */
function Dashboard({user,classes,assignments,setAssignments,onClasses,onAdd,ac,timeWindow,setTimeWindow,toast,streak,panicMode,setPanicMode,onSprint,onAI,onLock}){
  const[tab,setTab]=useState('all');const[dir,setDir]=useState('l');
  const[taskDetail,setTaskDetail]=useState(null);const[showSkip,setShowSkip]=useState(null);
  const[doneAnim,setDoneAnim]=useState({});
  const TABS=[['all','All'],['missing','Missing'],['soon','Soon'],['done','Done']];
  const chTab=t=>{if(t===tab)return;const ti=TABS.findIndex(x=>x[0]===t),ci=TABS.findIndex(x=>x[0]===tab);setDir(ti>ci?'l':'r');setTab(t)};
  const markDone=id=>{setDoneAnim(p=>({...p,[id]:true}));setTimeout(()=>{setAssignments(p=>p.map(x=>x.id===id?{...x,submitted:true}:x));toast('Submitted ✓')},400)};
  const delayTask=id=>{setAssignments(p=>p.map(x=>x.id===id?{...x,dueDate:tp(Math.max(dU(x.dueDate),0)+1)}:x));toast('Delayed 1 day','warn')};
  const miss=assignments.filter(a=>!a.submitted&&dU(a.dueDate)<0).length;
  const urg=assignments.filter(a=>!a.submitted&&dU(a.dueDate)>=0&&dU(a.dueDate)<=3).length;
  const done=assignments.filter(a=>a.submitted).length;
  const pct=assignments.length?Math.round(done/assignments.length*100):0;
  const filtered=assignments.filter(a=>{const d=dU(a.dueDate);if(panicMode)return!a.submitted&&(d<0||d<=3);if(tab==='all')return true;if(tab==='missing')return!a.submitted&&d<0;if(tab==='soon')return!a.submitted&&d>=0&&d<=timeWindow;if(tab==='done')return a.submitted;return true});
  const badge=a=>{if(a.submitted)return{l:'Done',c:'#4ade80'};const d=dU(a.dueDate);if(d<0)return{l:'Missing',c:'#ef4444'};if(d===0)return{l:'Today!',c:'#f97316'};if(d===1)return{l:'Tomorrow',c:'#fb923c'};if(d<=3)return{l:`${d}d left`,c:'#facc15'};return{l:`${d}d left`,c:'rgba(255,255,255,.42)'}};

  return(
    <div className="fi" style={{padding:'1rem',paddingBottom:'6rem'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'1rem'}}>
        <div>
          <h2 style={{color:'#fff',fontSize:20,fontWeight:700}}>Hey, {user.name.split(' ')[0]} 👋</h2>
          <p style={{color:'rgba(255,255,255,.34)',fontSize:13,marginTop:2}}>{user.grade} Grade{user.email?` · ${user.email}`:''}</p>
        </div>
        {streak&&streak.count>0&&(
          <div style={{display:'flex',alignItems:'center',gap:4,padding:'4px 10px',borderRadius:20,background:'rgba(251,191,36,.1)',border:'1px solid rgba(251,191,36,.26)',animation:'streakGlow 2.5s ease-in-out infinite'}}>
            <span style={{fontSize:14}}>🔥</span><span style={{color:'#fbbf24',fontWeight:700,fontSize:13}}>{streak.count}</span>
          </div>
        )}
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'.52rem',marginBottom:'.88rem'}}>
        {[{l:'Missing',v:miss,c:'#ef4444',t:'missing'},{l:'Urgent',v:urg,c:'#facc15',t:'soon'},{l:'Done',v:done,c:'#4ade80',t:'done'}].map(s=>(
          <div key={s.l} className="csm lift" onClick={()=>!panicMode&&chTab(s.t)} style={{padding:'.78rem .5rem',textAlign:'center',cursor:'pointer',border:`1px solid ${s.c}1c`}}>
            <div style={{fontSize:23,fontWeight:800,color:s.c,lineHeight:1}}>{s.v}</div>
            <div style={{fontSize:11,color:'rgba(255,255,255,.36)',marginTop:2,fontWeight:500}}>{s.l}</div>
          </div>
        ))}
      </div>

      {assignments.length>0&&<div className="csm" style={{padding:'.78rem',marginBottom:'.8rem'}}>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:'.36rem'}}>
          <span style={{color:'rgba(255,255,255,.46)',fontSize:12}}>Completion</span>
          <span style={{color:ac,fontWeight:700,fontSize:13}}>{pct}%</span>
        </div>
        <div style={{background:'rgba(255,255,255,.07)',borderRadius:20,height:7,overflow:'hidden'}}>
          <div style={{width:`${pct}%`,height:'100%',background:`linear-gradient(90deg,${ac},${ac}99)`,borderRadius:20,transition:'width .7s cubic-bezier(.22,.61,.36,1)'}}/>
        </div>
      </div>}

      {panicMode&&<div className="pi" style={{background:'rgba(239,68,68,.14)',border:'1px solid rgba(239,68,68,.38)',borderRadius:12,padding:'.76rem 1rem',marginBottom:'.8rem',display:'flex',alignItems:'center',gap:'.58rem'}}>
        <span style={{fontSize:18}}>🚨</span>
        <div style={{flex:1}}><div style={{color:'#f87171',fontWeight:700,fontSize:13}}>PANIC MODE</div><div style={{color:'rgba(255,150,150,.5)',fontSize:12}}>Overdue + urgent only</div></div>
        <button className="btn" onClick={()=>setPanicMode(false)} style={{padding:'.32rem .65rem',borderRadius:9,background:'rgba(239,68,68,.2)',color:'#f87171',fontWeight:700,fontSize:12}}>Exit</button>
      </div>}

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'.46rem',marginBottom:'.46rem'}}>
        {[
          {l:'Do Next',ic:'⚡',fn:()=>{const n=topPri(assignments,1)[0];if(n)setTaskDetail(n);else toast('All done! 🏆','info')},col:ac,primary:true},
          {l:'25-min Sprint',ic:'⏱',fn:()=>onSprint(topPri(assignments,1)[0]||null),col:'#4ade80',primary:true},
          {l:'AI Assistant',ic:'🧠',fn:()=>onAI(topPri(assignments,1)[0]||null),col:'#818cf8'},
          {l:panicMode?'Exit Panic':'Panic Mode',ic:'🚨',fn:()=>setPanicMode(p=>!p),col:panicMode?'#ef4444':'rgba(255,255,255,.44)'},
        ].map(a=>(
          <button key={a.l} className="btn" onClick={a.fn} style={{padding:'.68rem .45rem',borderRadius:12,background:a.primary?`linear-gradient(135deg,${a.col}26,${a.col}14)`:'rgba(255,255,255,.07)',border:`1px solid ${a.primary?a.col+'42':'rgba(255,255,255,.09)'}`,color:a.primary?a.col:'rgba(255,255,255,.6)',fontWeight:700,fontSize:13,flexDirection:'column',gap:3,textAlign:'center'}}>
            <span style={{fontSize:17}}>{a.ic}</span><span>{a.l}</span>
          </button>
        ))}
      </div>
      <button className="btn" onClick={()=>onLock(topPri(assignments,1)[0]||null)} style={{width:'100%',padding:'.68rem',borderRadius:12,background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.08)',color:'rgba(255,255,255,.56)',fontWeight:600,fontSize:13,marginBottom:'.8rem',display:'flex',alignItems:'center',justifyContent:'center',gap:'.44rem'}}>🔒 Lock Distractions</button>

      {!panicMode&&<div className="csm" style={{padding:'.76rem',marginBottom:'.78rem',display:'flex',alignItems:'center',gap:'.58rem'}}>
        <span style={{color:'rgba(255,255,255,.38)',fontSize:12,whiteSpace:'nowrap',minWidth:46}}>Window</span>
        <input type="range" min={1} max={30} step={1} value={timeWindow} onChange={e=>setTimeWindow(+e.target.value)} style={{flex:1,accentColor:ac}}/>
        <span style={{color:ac,fontWeight:700,fontSize:13,minWidth:50,textAlign:'right'}}>{timeWindow===30?'1 mo':`${timeWindow}d`}</span>
      </div>}

      {!panicMode&&<div className="tabs">
        {TABS.map(([k,l])=>{const cnt=k==='missing'?miss:k==='soon'?urg:k==='done'?done:assignments.length;return(
          <button key={k} className="tab-btn btn" onClick={()=>chTab(k)} style={{background:tab===k?`linear-gradient(135deg,${ac}dd,${ac})`:'rgba(255,255,255,.07)',color:tab===k?'#fff':'rgba(255,255,255,.44)',transition:'all .24s'}}>
            {l}{k!=='all'&&cnt>0&&<span style={{position:'absolute',top:-5,right:-2,minWidth:15,height:15,borderRadius:8,background:k==='missing'?'#ef4444':k==='soon'?'#f59e0b':'#4ade80',fontSize:9,fontWeight:800,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',padding:'0 2px'}}>{cnt}</span>}
          </button>
        );})}
      </div>}

      {filtered.length>0&&!panicMode&&<p style={{color:'rgba(255,255,255,.18)',fontSize:11,textAlign:'center',marginBottom:'.52rem'}}>← swipe complete · swipe delay → · tap for actions</p>}

      <div key={panicMode?'panic':tab} className={panicMode?'fi':dir==='l'?'sl':'sr'}>
        {filtered.length===0&&<div style={{textAlign:'center',padding:'3rem 1rem',color:'rgba(255,255,255,.24)'}}>
          <div style={{fontSize:44,marginBottom:'.58rem'}}>{tab==='done'?'🏆':assignments.length===0?'📋':'📭'}</div>
          <p style={{fontSize:15,fontWeight:500,color:'rgba(255,255,255,.35)'}}>{panicMode?'No urgent work!':assignments.length===0&&tab==='all'?'No assignments yet':tab==='missing'?'No missing work!':tab==='soon'?'Nothing due soon':'Nothing here'}</p>
          {assignments.length===0&&tab==='all'&&<p style={{fontSize:12,marginTop:'.3rem',color:'rgba(255,255,255,.2)'}}>Tap + to add your first assignment</p>}
        </div>}
        {filtered.map((a,i)=>{
          const b=badge(a);const cl=classes.find(c=>c.id===a.classId)||{name:'?',color:'#888'};
          const isDone=doneAnim[a.id];
          return(
            <GestureCard key={a.id}
              onSwipeRight={!a.submitted?()=>markDone(a.id):null}
              onSwipeLeft={!a.submitted?()=>delayTask(a.id):null}
              onLongPress={!a.submitted?()=>onSprint(a):null}
              style={{background:'rgba(255,255,255,.06)',borderRadius:14,padding:'.86rem',marginBottom:'.5rem',borderLeft:`3px solid ${cl.color}`,border:'1px solid rgba(255,255,255,.07)',borderLeftColor:cl.color,borderLeftWidth:3,animation:`su .34s cubic-bezier(.22,.61,.36,1) ${i*.042}s both`,opacity:isDone?0:1,transform:isDone?'translateX(38px) scale(.95)':undefined,transition:isDone?'all .36s ease':undefined,cursor:'pointer'}}>
              <div onClick={()=>!a.submitted&&setTaskDetail(a)} style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:a.submitted?0:'.42rem'}}>
                <div style={{flex:1,marginRight:6}}>
                  <div style={{fontWeight:700,color:'#fff',fontSize:15,lineHeight:1.3}}>{a.title}</div>
                  <div style={{fontSize:12,color:'rgba(255,255,255,.38)',marginTop:3,display:'flex',gap:'5px 9px',flexWrap:'wrap'}}>
                    <span style={{display:'flex',alignItems:'center',gap:3}}><span style={{width:7,height:7,borderRadius:'50%',background:cl.color,display:'inline-block'}}></span>{cl.name}</span>
                    <span>{a.type}</span><span>{a.points}pts</span><span>Due {fD(a.dueDate)}</span>
                    {a.priority&&a.priority!=='Medium'&&<span style={{color:a.priority==='High'?'#f87171':'#94a3b8'}}>{a.priority}</span>}
                  </div>
                </div>
                <span style={{background:`${b.c}18`,color:b.c,fontSize:11,fontWeight:700,padding:'4px 10px',borderRadius:20,flexShrink:0,border:`1px solid ${b.c}28`}}>{b.l}</span>
              </div>
              {!a.submitted&&<div style={{display:'flex',gap:'.36rem'}}>
                <button className="btn" onClick={e=>{e.stopPropagation();markDone(a.id)}} style={{flex:1,padding:'.38rem',borderRadius:9,background:`${ac}18`,color:ac,fontSize:13,fontWeight:600,transition:'background .16s'}} onMouseOver={e=>e.currentTarget.style.background=`${ac}36`} onMouseOut={e=>e.currentTarget.style.background=`${ac}18`}>✓</button>
                <button className="btn" onClick={e=>{e.stopPropagation();setTaskDetail(a)}} style={{flex:2,padding:'.38rem',borderRadius:9,background:'rgba(255,255,255,.07)',color:'rgba(255,255,255,.56)',fontSize:13,fontWeight:600}}>Actions</button>
                <button className="btn" onClick={e=>{e.stopPropagation();setAssignments(p=>p.filter(x=>x.id!==a.id));toast('Removed','warn')}} style={{width:30,borderRadius:9,background:'rgba(239,68,68,.1)',color:'#f87171',fontSize:12}} onMouseOver={e=>e.currentTarget.style.background='rgba(239,68,68,.24)'} onMouseOut={e=>e.currentTarget.style.background='rgba(239,68,68,.1)'}>✕</button>
              </div>}
            </GestureCard>
          );
        })}
      </div>

      <div style={{display:'flex',gap:'.6rem',marginTop:'.78rem'}}>
        <button className="btn" onClick={onClasses} style={{flex:1,padding:'.8rem',borderRadius:13,background:'rgba(255,255,255,.08)',color:'#fff',fontWeight:600,border:'1px solid rgba(255,255,255,.1)',display:'flex',alignItems:'center',justifyContent:'center',gap:'.44rem'}} onMouseOver={e=>e.currentTarget.style.background='rgba(255,255,255,.14)'} onMouseOut={e=>e.currentTarget.style.background='rgba(255,255,255,.08)'}>
          📚 Classes <span style={{background:`${ac}28`,color:ac,fontSize:12,padding:'1px 7px',borderRadius:9,fontWeight:700}}>{classes.length}</span>
        </button>
        <button className="btn" onClick={onAdd} style={{flex:1,padding:'.8rem',borderRadius:13,background:`linear-gradient(135deg,${ac}dd,${ac})`,color:'#fff',fontWeight:700,boxShadow:`0 4px 17px ${ac}44`}} onMouseOver={e=>e.currentTarget.style.opacity='.85'} onMouseOut={e=>e.currentTarget.style.opacity='1'}>+ Add Work</button>
      </div>

      {taskDetail&&<TaskDetail asgn={taskDetail} cls={classes.find(c=>c.id===taskDetail.classId)} onClose={()=>setTaskDetail(null)} onSubmit={()=>markDone(taskDetail.id)} onSprint={()=>onSprint(taskDetail)} onSkip={()=>setShowSkip(taskDetail)} onAI={(m)=>onAI(taskDetail,m)} onLock={()=>onLock(taskDetail)} ac={ac}/>}
      {showSkip&&<SkipModal asgn={showSkip} cls={classes.find(c=>c.id===showSkip.classId)} onSkip={()=>{delayTask(showSkip.id);setShowSkip(null)}} onCancel={()=>setShowSkip(null)} ac={ac}/>}
    </div>
  );
}

/* ── Classes View ───────────────────────────────────── */
function ClassesView({classes,setClasses,assignments,onSelect,onBack,ac,toast}){
  const[showAdd,setShowAdd]=useState(false);const[delId,setDelId]=useState(null);
  const[f,setF]=useState({name:'',teacher:'',color:CC[0]});
  const set=k=>v=>setF(p=>({...p,[k]:v}));
  const add=()=>{if(!f.name.trim()||!f.teacher.trim())return;setClasses(p=>[...p,{id:gid(),name:f.name.trim(),teacher:f.teacher.trim(),color:f.color}]);setF({name:'',teacher:'',color:CC[0]});setShowAdd(false);toast('Class added')};
  return(
    <div className="sl" style={{padding:'1rem',paddingBottom:'6rem'}}>
      <div style={{display:'flex',alignItems:'center',gap:'.7rem',marginBottom:'1.2rem'}}>
        <button className="btn ghost" style={{width:38,height:38,padding:0,borderRadius:11,fontSize:18}} onClick={onBack}>←</button>
        <h2 style={{color:'#fff',flex:1,fontSize:20,fontWeight:700}}>My Classes</h2>
        <button className="btn" onClick={()=>setShowAdd(true)} style={{padding:'.44rem .86rem',borderRadius:10,background:`${ac}22`,color:ac,fontWeight:700,fontSize:14}} onMouseOver={e=>e.currentTarget.style.background=`${ac}44`} onMouseOut={e=>e.currentTarget.style.background=`${ac}22`}>+ Add</button>
      </div>
      {classes.length===0&&<div style={{textAlign:'center',padding:'3.5rem 1rem',color:'rgba(255,255,255,.28)'}}>
        <div style={{fontSize:50,marginBottom:'.62rem'}}>📚</div>
        <p style={{fontSize:16,fontWeight:500,color:'rgba(255,255,255,.4)'}}>No classes yet</p>
        <p style={{fontSize:13,marginTop:'.3rem'}}>Tap "+ Add" to create your first class</p>
      </div>}
      {classes.map((c,i)=>{
        const cnt=assignments.filter(a=>a.classId===c.id).length;
        const pend=assignments.filter(a=>a.classId===c.id&&!a.submitted).length;
        const mis=assignments.filter(a=>a.classId===c.id&&!a.submitted&&dU(a.dueDate)<0).length;
        return(
          <div key={c.id} className="su lift" style={{animationDelay:`${i*.052}s`,background:'rgba(255,255,255,.06)',borderRadius:14,padding:'.9rem',marginBottom:'.5rem',borderLeft:`4px solid ${c.color}`,display:'flex',alignItems:'center',gap:'.66rem',cursor:'pointer',border:'1px solid rgba(255,255,255,.08)',borderLeftColor:c.color,borderLeftWidth:4}} onClick={()=>onSelect(c)}>
            <div style={{width:40,height:40,borderRadius:11,background:`${c.color}1e`,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,color:c.color,fontSize:16,fontWeight:800}}>{c.name.charAt(0)}</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:700,color:'#fff',fontSize:15,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.name}</div>
              <div style={{fontSize:12,color:'rgba(255,255,255,.38)',marginTop:1}}>👤 {c.teacher}</div>
            </div>
            <div style={{textAlign:'right',flexShrink:0}}>
              {mis>0&&<div style={{background:'rgba(239,68,68,.17)',color:'#f87171',fontSize:11,fontWeight:700,padding:'2px 7px',borderRadius:20,marginBottom:2}}>{mis} missing</div>}
              <div style={{color:'rgba(255,255,255,.34)',fontSize:12}}>{cnt} · {pend} pending</div>
            </div>
            <button className="btn" onClick={e=>{e.stopPropagation();setDelId(c.id)}} style={{width:28,height:28,borderRadius:8,background:'rgba(239,68,68,.1)',color:'#f87171',fontSize:12,flexShrink:0}} onMouseOver={e=>{e.stopPropagation();e.currentTarget.style.background='rgba(239,68,68,.24)'}} onMouseOut={e=>{e.stopPropagation();e.currentTarget.style.background='rgba(239,68,68,.1)'}}>✕</button>
          </div>
        );
      })}

      {showAdd&&(
        <Modal onClose={()=>setShowAdd(false)} sheet>
          <h3 style={{color:'#fff',marginBottom:'1.1rem',fontSize:17}}>Add Class</h3>
          <label style={{display:'block',color:'rgba(200,200,220,.58)',fontSize:12,fontWeight:600,marginBottom:4}}>Class Name *</label>
          <input className="inp" style={{marginBottom:'1rem'}} placeholder="e.g. Algebra II, AP English…" value={f.name} onChange={e=>set('name')(e.target.value)} autoFocus/>
          <label style={{display:'block',color:'rgba(200,200,220,.58)',fontSize:12,fontWeight:600,marginBottom:4}}>Teacher *</label>
          <input className="inp" style={{marginBottom:'1.2rem'}} placeholder="e.g. Mr. Smith, Ms. Rivera…" value={f.teacher} onChange={e=>set('teacher')(e.target.value)}/>
          <label style={{display:'block',color:'rgba(200,200,220,.58)',fontSize:12,fontWeight:600,marginBottom:'10px'}}>Color</label>
          <div style={{display:'flex',gap:7,flexWrap:'wrap',marginBottom:'1.4rem'}}>
            {CC.map(col=><button key={col} className="btn" onClick={()=>set('color')(col)} style={{width:30,height:30,borderRadius:'50%',background:col,border:`3px solid ${f.color===col?'#fff':'transparent'}`,boxShadow:f.color===col?`0 0 0 2px ${col}`:'none',transition:'all .2s'}}/>)}
          </div>
          <div style={{display:'flex',gap:'.62rem'}}>
            <button className="btn ghost" style={{flex:1}} onClick={()=>setShowAdd(false)}>Cancel</button>
            <button className="btn" disabled={!f.name.trim()||!f.teacher.trim()} onClick={add} style={{flex:2,padding:'.8rem',borderRadius:12,background:`linear-gradient(135deg,${ac}dd,${ac})`,color:'#fff',fontWeight:700,opacity:(!f.name.trim()||!f.teacher.trim())?.4:1}}>Add Class</button>
          </div>
        </Modal>
      )}

      {delId&&(
        <Modal onClose={()=>setDelId(null)}>
          <div style={{textAlign:'center',padding:'.5rem 0'}}>
            <div style={{fontSize:42,marginBottom:'.58rem'}}>⚠️</div>
            <h3 style={{color:'#fff',marginBottom:'.4rem',fontSize:17}}>Delete this class?</h3>
            <p style={{color:'rgba(200,200,220,.45)',fontSize:14,marginBottom:'1.35rem',lineHeight:1.5}}>All assignments and grade data will also be deleted.</p>
            <div style={{display:'flex',gap:'.62rem'}}>
              <button className="btn ghost" style={{flex:1}} onClick={()=>setDelId(null)}>Cancel</button>
              <button className="btn dnger" style={{flex:1}} onClick={()=>{setClasses(p=>p.filter(c=>c.id!==delId));setDelId(null);toast('Class deleted','warn')}}>Delete</button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

/* ── Class Detail ───────────────────────────────────── */
function ClassDetail({cls,assignments,setAssignments,onBack,onAddHere,ac,toast,gradeData,setGradeData}){
  const[mainTab,setMainTab]=useState('assignments');
  const[sort,setSort]=useState('date');
  const mine=assignments.filter(a=>a.classId===cls.id);
  const sorted=[...mine].sort((a,b)=>sort==='date'?new Date(a.dueDate)-new Date(b.dueDate):sort==='type'?a.type.localeCompare(b.type):b.points-a.points);
  const badge=a=>{if(a.submitted)return{l:'Done',c:'#4ade80'};const d=dU(a.dueDate);if(d<0)return{l:'Miss',c:'#ef4444'};if(d===0)return{l:'Today',c:'#f97316'};if(d<=3)return{l:`${d}d`,c:'#facc15'};return{l:`${d}d left`,c:'rgba(255,255,255,.42)'}};
  const tot=mine.reduce((s,a)=>s+(Number(a.points)||0),0);
  const ear=mine.filter(a=>a.submitted).reduce((s,a)=>s+(Number(a.points)||0),0);
  const gd=gradeData[cls.id]||{weights:{PP:10,AT:90,SA:0},items:[]};
  const gr=calcGrade(gd.items||[],gd.weights||{PP:10,AT:90,SA:0});

  return(
    <div className="sl" style={{padding:'1rem',paddingBottom:'6rem'}}>
      <div style={{display:'flex',alignItems:'center',gap:'.66rem',marginBottom:'1.1rem'}}>
        <button className="btn ghost" style={{width:38,height:38,padding:0,borderRadius:11,fontSize:18}} onClick={onBack}>←</button>
        <div style={{flex:1}}>
          <h2 style={{color:'#fff',fontSize:19,fontWeight:700}}>{cls.name}</h2>
          <p style={{color:'rgba(255,255,255,.36)',fontSize:13}}>👤 {cls.teacher}</p>
        </div>
        {gr.overall!==null&&<div style={{textAlign:'right',flexShrink:0}}>
          <div style={{fontSize:17,fontWeight:800,color:getGC(gr.overall)}}>{gr.overall.toFixed(1)}%</div>
          <div style={{fontSize:11,color:'rgba(255,255,255,.36)'}}>{getLetter(gr.overall)}</div>
        </div>}
        <div style={{width:13,height:13,borderRadius:'50%',background:cls.color,boxShadow:`0 0 9px ${cls.color}88`,flexShrink:0}}/>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'.4rem',marginBottom:'.82rem'}}>
        {[{l:'Total',v:mine.length,c:'#818cf8'},{l:'Pending',v:mine.filter(a=>!a.submitted).length,c:'#facc15'},{l:'Missing',v:mine.filter(a=>!a.submitted&&dU(a.dueDate)<0).length,c:'#ef4444'},{l:'Done',v:mine.filter(a=>a.submitted).length,c:'#4ade80'}].map(s=>(
          <div key={s.l} className="csm" style={{padding:'.58rem .28rem',textAlign:'center',border:`1px solid ${s.c}1c`}}>
            <div style={{fontSize:18,fontWeight:800,color:s.c}}>{s.v}</div>
            <div style={{fontSize:10,color:'rgba(255,255,255,.36)',marginTop:1}}>{s.l}</div>
          </div>
        ))}
      </div>

      {tot>0&&<div className="csm" style={{padding:'.72rem',marginBottom:'.82rem'}}>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:'.32rem'}}><span style={{color:'rgba(255,255,255,.44)',fontSize:12}}>Assignment Points</span><span style={{color:ac,fontWeight:700,fontSize:12}}>{ear}/{tot}</span></div>
        <div style={{background:'rgba(255,255,255,.07)',borderRadius:8,height:5,overflow:'hidden'}}><div style={{width:`${tot>0?Math.round(ear/tot*100):0}%`,height:'100%',background:`linear-gradient(90deg,${cls.color},${cls.color}88)`,borderRadius:8,transition:'width .55s'}}/></div>
      </div>}

      <div className="tabs">

                  <button className="btn" onClick={()=>{setAssignments(p=>p.filter(x=>x.id!==a.id));toast('Removed','warn')}} style={{width:26,height:26,borderRadius:7,background:'rgba(239,68,68,.1)',color:'#f87171',fontSize:11}} onMouseOver={e=>e.currentTarget.style.background='rgba(239,68,68,.24)'} onMouseOut={e=>e.currentTarget.style.background='rgba(239,68,68,.1)'}>✕</button>

        <div key="gc" className="sl">
          <GradeCalc cls={cls} gradeData={gradeData} setGradeData={setGradeData} ac={ac}/>

  );
}

/* ── Add Assignment ─────────────────────────────────── */
function AddAssignment({classes,preClass,onAdd,onBack,ac,toast}){
  const[f,setF]=useState({classId:preClass?.id||'',title:'',type:'Homework',points:'10',dueDate:tp(1),priority:'Medium',notes:''});
  const set=k=>v=>setF(p=>({...p,[k]:v}));
  const valid=f.classId&&f.title.trim()&&f.dueDate&&Number(f.points)>0;
  const lbl={display:'block',color:'rgba(200,200,220,.58)',fontSize:12,fontWeight:600,marginBottom:4};
  return(
    <div className="su" style={{padding:'1rem',paddingBottom:'6rem',maxWidth:500,margin:'0 auto'}}>
      <div style={{display:'flex',alignItems:'center',gap:'.7rem',marginBottom:'1.4rem'}}>
        <button className="btn ghost" style={{width:38,height:38,padding:0,borderRadius:11,fontSize:18}} onClick={onBack}>←</button>
        <h2 style={{color:'#fff',fontSize:20,fontWeight:700}}>Add Assignment</h2>
      </div>
      {classes.length===0?(
        <div style={{textAlign:'center',padding:'3rem 1rem',color:'rgba(255,255,255,.38)'}}>
          <div style={{fontSize:46,marginBottom:'.62rem'}}>📚</div>
          <p style={{marginBottom:'1.1rem',fontSize:15}}>Add a class first</p>
          <button className="btn" onClick={onBack} style={{padding:'.62rem 1.4rem',borderRadius:12,background:`${ac}22`,color:ac,fontWeight:700}}>← Back</button>
        </div>
      ):(
        <>
          <label style={{...lbl,marginTop:0}}>Class *</label>
          <select className="inp" style={{marginBottom:'1rem'}} value={f.classId} onChange={e=>set('classId')(e.target.value)}>
            <option value="">Select class…</option>
            {classes.map(c=><option key={c.id} value={c.id}>{c.name} — {c.teacher}</option>)}
          </select>
          <label style={lbl}>Title *</label>
          <input className="inp" style={{marginBottom:'1rem'}} placeholder="e.g. Chapter 5 Homework…" value={f.title} onChange={e=>set('title')(e.target.value)} autoFocus/>
          <label style={lbl}>Type</label>
          <div style={{display:'flex',gap:'.3rem',flexWrap:'wrap',marginBottom:'1rem'}}>
            {ATYPES.map(t=><button key={t} className="btn" onClick={()=>set('type')(t)} style={{padding:'.38rem .74rem',borderRadius:20,fontSize:13,fontWeight:600,background:f.type===t?`${ac}28`:'rgba(255,255,255,.07)',color:f.type===t?ac:'rgba(255,255,255,.46)',border:`1.5px solid ${f.type===t?ac+'55':'transparent'}`,transition:'all .18s'}}>{t}</button>)}
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'.6rem',marginBottom:'1rem'}}>
            <div><label style={lbl}>Points *</label><input className="inp" type="number" min={1} placeholder="10" value={f.points} onChange={e=>set('points')(e.target.value)}/></div>
            <div><label style={lbl}>Due Date *</label><input className="inp" type="date" value={f.dueDate} onChange={e=>set('dueDate')(e.target.value)}/></div>
          </div>
          <label style={lbl}>Priority</label>
          <div style={{display:'flex',gap:'.3rem',marginBottom:'1rem'}}>
            {['Low','Medium','High'].map(p=><button key={p} className="btn" onClick={()=>set('priority')(p)} style={{padding:'.38rem .85rem',borderRadius:20,fontSize:13,fontWeight:600,background:f.priority===p?(p==='High'?'rgba(239,68,68,.2)':p==='Low'?'rgba(148,163,184,.17)':'rgba(251,191,36,.17)'):'rgba(255,255,255,.07)',color:f.priority===p?(p==='High'?'#f87171':p==='Low'?'#94a3b8':'#fbbf24'):'rgba(255,255,255,.46)',transition:'all .18s'}}>{p}</button>)}
          </div>
          <label style={lbl}>Notes <span style={{color:'rgba(255,255,255,.25)',fontWeight:400}}>(optional)</span></label>
          <textarea className="inp" style={{resize:'none',height:62,marginBottom:'1.2rem'}} placeholder="Any notes…" value={f.notes} onChange={e=>set('notes')(e.target.value)}/>
          <button className="btn" disabled={!valid} onClick={()=>valid&&(onAdd({id:gid(),classId:f.classId,title:f.title.trim(),type:f.type,points:Number(f.points),dueDate:f.dueDate,priority:f.priority,notes:f.notes,submitted:false,createdAt:new Date().toISOString()}),toast('Assignment added'))} style={{width:'100%',padding:'1rem',borderRadius:13,fontSize:16,fontWeight:700,background:valid?`linear-gradient(135deg,${ac},${ac}bb)`:'rgba(255,255,255,.08)',color:valid?'#fff':'rgba(255,255,255,.22)',boxShadow:valid?`0 4px 20px ${ac}44`:'none',transition:'all .28s'}}>Add Assignment</button>
        </>
      )}
    </div>
  );
}

/* ── Home Tab ───────────────────────────────────────── */

  const HABIT_ICS=['📚','🏃','💪','🥗','💧','🧘','🎵','✍️','🌙','⭐','🎯','🧹','🌿','💊','🎮','🐾'];
  const QUOTES=[
    {q:"The secret of getting ahead is getting started.",a:"Mark Twain"},
    {q:"You don't have to be great to start, but you have to start to be great.",a:"Zig Ziglar"},
    {q:"Push yourself — no one else is going to do it for you.",a:"Unknown"},
    {q:"Great things never come from comfort zones.",a:"Unknown"},
    {q:"Success doesn't just find you. You have to go out and get it.",a:"Unknown"},
    {q:"The harder you work for something, the greater you'll feel.",a:"Unknown"},
    {q:"Don't stop when you're tired. Stop when you're done.",a:"Unknown"},
  ];
  const todayQuote=QUOTES[new Date().getDay()%QUOTES.length];
  const S=s=>({flex:'0 0 auto',padding:'.48rem .72rem',borderRadius:10,fontSize:12,fontWeight:700,cursor:'pointer',transition:'all .22s',background:sec===s?`linear-gradient(135deg,${ac}dd,${ac})`:'rgba(255,255,255,.07)',color:sec===s?'#fff':'rgba(255,255,255,.44)',position:'relative',whiteSpace:'nowrap'});

  const markHabitDone=id=>{
    setHabits(p=>(p||[]).map(h=>h.id===id?{...h,completedDates:[...(h.completedDates||[]).filter(d=>d!==todayS),todayS]}:h));
    toast('Habit done! 🔥');
  };
  const habitStreak=h=>{let s=0,d=new Date();while(true){const ds=d.toISOString().slice(0,10);if(!(h.completedDates||[]).includes(ds))break;s++;d.setDate(d.getDate()-1);}return s;};

  return(

            {k==='projects'&&pP>0&&<span style={{position:'absolute',top:-5,right:-2,minWidth:15,height:15,borderRadius:8,background:'#818cf8',fontSize:9,fontWeight:800,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',padding:'0 2px'}}>{pP}</span>}
          </button>

      </div>

      <div key={sec} className="sl">

        {/* ── OVERVIEW ────────────────────── */}
        {sec==='overview'&&(
          <div>
            {/* Motivational card */}
            <div style={{background:`linear-gradient(135deg,${ac}18,${ac}08)`,borderRadius:16,padding:'1.1rem 1.2rem',marginBottom:'.9rem',border:`1px solid ${ac}28`}}>

            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'.52rem',marginBottom:'.9rem'}}>

                {ic:'✅',l:'Tasks Done',  v:`${tasks.filter(t=>t.completed).length}/${tasks.length}`,c:'#4ade80'},

              <div style={{marginBottom:'.9rem'}}>

        )}

        {/* ── TASKS ────────────────────────── */}
        {sec==='tasks'&&(
          <>

              <div key={t.id} className="su lift" style={{animationDelay:`${i*.048}s`,background:'rgba(255,255,255,.06)',borderRadius:13,padding:'.86rem 1rem',marginBottom:'.48rem',display:'flex',alignItems:'center',gap:'.68rem',border:'1px solid rgba(255,255,255,.07)',borderLeft:`3px solid ${t.completed?'#4ade80':'#facc15'}`,borderLeftWidth:3}}>

            <button className="btn" onClick={()=>{setFt(p=>({...p,title:''}));setModal('task')}} style={{width:'100%',padding:'.86rem',borderRadius:13,background:`linear-gradient(135deg,${ac}dd,${ac})`,color:'#fff',fontWeight:700,marginTop:'.5rem',boxShadow:`0 4px 16px ${ac}44`}} onMouseOver={e=>e.currentTarget.style.opacity='.85'} onMouseOut={e=>e.currentTarget.style.opacity='1'}>+ Add Task</button>
